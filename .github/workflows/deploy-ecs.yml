name: Deploy Torre de Control (ECS/Fargate)

# Production deploy for the post-App-Runner architecture. It builds/pushes a
# new image and rolls the existing ECS/Fargate service to it. The CloudFormation
# stack itself is provisioned out-of-band with elevated AWS permissions via
# scripts/aws/deploy-ecs-fargate-stack.sh.
#
# Normal deploy path is a push to `main`, which uses the env fallbacks below
# (stack `torre-de-control-v2-ecs` in `us-east-1`). Manual `workflow_dispatch`
# remains available for ad-hoc runs against a different stack or region.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stack_name:
        description: CloudFormation stack name created from infra/aws/ecs-fargate-torre.yml
        required: true
        default: torre-de-control-v2-ecs
      aws_region:
        description: AWS region of the stack
        required: true
        default: us-east-1
      n8n_torre_webhook_secret:
        description: Optional one-time N8N_TORRE_WEBHOOK_SECRET seed; leave empty to preserve existing task env/repo secret.
        required: false
      lw_base_url:
        description: Optional one-time LW_BASE_URL seed; leave empty to preserve existing task env/repo secret.
        required: false
      lw_access_token:
        description: Optional one-time LW_ACCESS_TOKEN seed; leave empty to preserve existing task env/repo secret.
        required: false
      lw_client_id:
        description: Optional one-time LW_CLIENT_ID seed; leave empty to preserve existing task env/repo secret.
        required: false
      google_drive_client_email:
        description: Optional one-time GOOGLE_DRIVE_CLIENT_EMAIL seed; leave empty to preserve existing task env/repo secret.
        required: false
      google_drive_private_key:
        description: Optional one-time GOOGLE_DRIVE_PRIVATE_KEY seed; leave empty to preserve existing task env/repo secret.
        required: false

concurrency:
  group: torre-de-control-ecs
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_ACCOUNT_ID: "861273430072"
  AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
  STACK_NAME: ${{ github.event.inputs.stack_name || 'torre-de-control-v2-ecs' }}
  ECR_REPOSITORY: torre-de-control-v2

jobs:
  deploy:
    name: Build, push image, and roll ECS service
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci --include=dev

      - name: Validate Prisma schema
        working-directory: app
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npx prisma validate

      - name: Verify tests and types
        working-directory: app
        run: npm run verify

      - name: Build Next.js app
        working-directory: app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Confirm CloudFormation stack exists
        id: stack
        run: |
          set -euo pipefail
          STACK_NAME="${STACK_NAME}"
          REGION="${AWS_REGION}"
          if ! aws cloudformation describe-stacks \
              --region "${REGION}" --stack-name "${STACK_NAME}" >/dev/null 2>&1; then
            echo "Stack '${STACK_NAME}' not found in ${REGION}." >&2
            echo "Provision it first with scripts/aws/deploy-ecs-fargate-stack.sh." >&2
            exit 1
          fi
          get_output() {
            aws cloudformation describe-stacks \
              --region "${REGION}" --stack-name "${STACK_NAME}" \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue | [0]" \
              --output text
          }
          CLUSTER="$(get_output ClusterName)"
          SERVICE="$(get_output ServiceName)"
          TASK_DEF_ARN="$(get_output TaskDefinitionArn)"
          ALB_DNS="$(get_output LoadBalancerDNSName)"
          for pair in "ClusterName=${CLUSTER}" "ServiceName=${SERVICE}" \
                      "TaskDefinitionArn=${TASK_DEF_ARN}" "LoadBalancerDNSName=${ALB_DNS}"; do
            value="${pair#*=}"
            if [[ -z "${value}" || "${value}" == "None" ]]; then
              echo "Missing stack output: ${pair%%=*}" >&2
              exit 1
            fi
          done
          {
            echo "cluster=${CLUSTER}"
            echo "service=${SERVICE}"
            echo "task_def_arn=${TASK_DEF_ARN}"
            echo "alb_dns=${ALB_DNS}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: image
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHORT_SHA="${IMAGE_TAG::7}"
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${SHORT_SHA}"
          docker build -f app/Dockerfile -t "${IMAGE_URI}" app
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Render and register new task definition
        id: taskdef
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          TASK_DEF_ARN: ${{ steps.stack.outputs.task_def_arn }}
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
          N8N_TORRE_WEBHOOK_SECRET_REPO: ${{ secrets.N8N_TORRE_WEBHOOK_SECRET }}
          N8N_TORRE_WEBHOOK_SECRET_INPUT: ${{ github.event.inputs.n8n_torre_webhook_secret || '' }}
          LW_BASE_URL_SECRET: ${{ secrets.LW_BASE_URL }}
          LW_ACCESS_TOKEN_SECRET: ${{ secrets.LW_ACCESS_TOKEN }}
          LW_CLIENT_ID_SECRET: ${{ secrets.LW_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_EMAIL_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_EMAIL }}
          GOOGLE_DRIVE_PRIVATE_KEY_SECRET: ${{ secrets.GOOGLE_DRIVE_PRIVATE_KEY }}
          LW_BASE_URL_INPUT: ${{ github.event.inputs.lw_base_url || '' }}
          LW_ACCESS_TOKEN_INPUT: ${{ github.event.inputs.lw_access_token || '' }}
          LW_CLIENT_ID_INPUT: ${{ github.event.inputs.lw_client_id || '' }}
          GOOGLE_DRIVE_CLIENT_EMAIL_INPUT: ${{ github.event.inputs.google_drive_client_email || '' }}
          GOOGLE_DRIVE_PRIVATE_KEY_INPUT: ${{ github.event.inputs.google_drive_private_key || '' }}
        run: |
          set -euo pipefail
          # Decide whether to (re)seed N8N_TORRE_WEBHOOK_SECRET into the task
          # definition. The repo secret may not exist (the available PAT can't
          # create Actions secrets), so we never assume it's present.
          # Priority: workflow_dispatch input > repo secret > preserve existing.
          # Never print the value itself.
          if [[ -n "${N8N_TORRE_WEBHOOK_SECRET_INPUT:-}" ]]; then
            N8N_SECRET_TO_SET="${N8N_TORRE_WEBHOOK_SECRET_INPUT}"
            echo "Using N8N_TORRE_WEBHOOK_SECRET from workflow_dispatch input."
          elif [[ -n "${N8N_TORRE_WEBHOOK_SECRET_REPO:-}" ]]; then
            N8N_SECRET_TO_SET="${N8N_TORRE_WEBHOOK_SECRET_REPO}"
            echo "Using N8N_TORRE_WEBHOOK_SECRET from repo secret."
          else
            N8N_SECRET_TO_SET=""
            echo "No N8N_TORRE_WEBHOOK_SECRET input/repo secret; preserving existing task env if present."
          fi

          # If a value is provided, enforce the minimum length without printing it.
          if [[ -n "${N8N_SECRET_TO_SET}" && ${#N8N_SECRET_TO_SET} -lt 16 ]]; then
            echo "N8N_TORRE_WEBHOOK_SECRET is too short (must be >= 16 chars)." >&2
            exit 1
          fi

          # LearnWorlds and Google Drive secrets follow the same priority as N8N:
          # workflow_dispatch input > repo secret > preserve existing task env.
          # Resolve each variable independently. The value is captured on stdout
          # while the source (input/repo/preserve) is logged on stderr, so the
          # value itself is never printed.
          resolve_secret() {
            local name="$1" input="$2" repo="$3"
            if [[ -n "${input}" ]]; then
              echo "Using ${name} from workflow_dispatch input." >&2
              printf '%s' "${input}"
            elif [[ -n "${repo}" ]]; then
              echo "Using ${name} from repo secret." >&2
              printf '%s' "${repo}"
            else
              echo "No ${name} input/repo secret; preserving existing task env if present." >&2
            fi
          }

          LW_BASE_URL_TO_SET="$(resolve_secret "LW_BASE_URL" "${LW_BASE_URL_INPUT:-}" "${LW_BASE_URL_SECRET:-}")"
          LW_ACCESS_TOKEN_TO_SET="$(resolve_secret "LW_ACCESS_TOKEN" "${LW_ACCESS_TOKEN_INPUT:-}" "${LW_ACCESS_TOKEN_SECRET:-}")"
          LW_CLIENT_ID_TO_SET="$(resolve_secret "LW_CLIENT_ID" "${LW_CLIENT_ID_INPUT:-}" "${LW_CLIENT_ID_SECRET:-}")"
          GOOGLE_DRIVE_CLIENT_EMAIL_TO_SET="$(resolve_secret "GOOGLE_DRIVE_CLIENT_EMAIL" "${GOOGLE_DRIVE_CLIENT_EMAIL_INPUT:-}" "${GOOGLE_DRIVE_CLIENT_EMAIL_SECRET:-}")"
          GOOGLE_DRIVE_PRIVATE_KEY_TO_SET="$(resolve_secret "GOOGLE_DRIVE_PRIVATE_KEY" "${GOOGLE_DRIVE_PRIVATE_KEY_INPUT:-}" "${GOOGLE_DRIVE_PRIVATE_KEY_SECRET:-}")"

          # Take the stack-managed task definition, swap only the container
          # image, and register a new revision. CloudFormation still owns the
          # base definition; this revision is a roll-forward to the new image.
          aws ecs describe-task-definition \
            --region "${AWS_REGION}" \
            --task-definition "${TASK_DEF_ARN}" \
            --query 'taskDefinition' --output json > current-taskdef.json

          # Only upsert a variable when we have a value to set. When empty, leave
          # the environment untouched so any value already in the current task
          # definition is preserved across deploys. The `upsert` helper replaces
          # an existing entry with the same name or appends a new one.
          jq --arg IMAGE "${IMAGE_URI}" \
             --arg N8N_SECRET "${N8N_SECRET_TO_SET}" \
             --arg LW_BASE_URL "${LW_BASE_URL_TO_SET:-}" \
             --arg LW_ACCESS_TOKEN "${LW_ACCESS_TOKEN_TO_SET:-}" \
             --arg LW_CLIENT_ID "${LW_CLIENT_ID_TO_SET:-}" \
             --arg GOOGLE_DRIVE_CLIENT_EMAIL "${GOOGLE_DRIVE_CLIENT_EMAIL_TO_SET:-}" \
             --arg GOOGLE_DRIVE_PRIVATE_KEY "${GOOGLE_DRIVE_PRIVATE_KEY_TO_SET:-}" '
            def upsert($name; $value):
              if $value != "" then
                .containerDefinitions[0].environment = (
                  (.containerDefinitions[0].environment // [])
                  | map(select(.name != $name))
                  + [{ name: $name, value: $value }]
                )
              else . end;
            .containerDefinitions[0].image = $IMAGE
            | upsert("N8N_TORRE_WEBHOOK_SECRET"; $N8N_SECRET)
            | upsert("LW_BASE_URL"; $LW_BASE_URL)
            | upsert("LW_ACCESS_TOKEN"; $LW_ACCESS_TOKEN)
            | upsert("LW_CLIENT_ID"; $LW_CLIENT_ID)
            | upsert("GOOGLE_DRIVE_CLIENT_EMAIL"; $GOOGLE_DRIVE_CLIENT_EMAIL)
            | upsert("GOOGLE_DRIVE_PRIVATE_KEY"; $GOOGLE_DRIVE_PRIVATE_KEY)
            | {
                family,
                taskRoleArn,
                executionRoleArn,
                networkMode,
                containerDefinitions,
                requiresCompatibilities,
                cpu,
                memory,
                runtimePlatform
              }
            | with_entries(select(.value != null))
          ' current-taskdef.json > new-taskdef.json

          NEW_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --region "${AWS_REGION}" \
            --cli-input-json file://new-taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)"
          echo "new_task_def_arn=${NEW_TASK_DEF_ARN}" >> "$GITHUB_OUTPUT"
          echo "Registered: ${NEW_TASK_DEF_ARN}"

      - name: Update ECS service
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          CLUSTER: ${{ steps.stack.outputs.cluster }}
          SERVICE: ${{ steps.stack.outputs.service }}
          NEW_TASK_DEF_ARN: ${{ steps.taskdef.outputs.new_task_def_arn }}
        run: |
          set -euo pipefail
          aws ecs update-service \
            --region "${AWS_REGION}" \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --query 'service.serviceName' --output text

      - name: Wait for service to stabilize
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          CLUSTER: ${{ steps.stack.outputs.cluster }}
          SERVICE: ${{ steps.stack.outputs.service }}
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --region "${AWS_REGION}" \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}"

      - name: Smoke test ALB health
        env:
          ALB_DNS: ${{ steps.stack.outputs.alb_dns }}
        run: |
          set -euo pipefail
          curl -fsS -m 20 "http://${ALB_DNS}/api/health"
