name: Verify Torre dashboard data

on:
  workflow_dispatch:
    inputs:
      year:
        description: Year to verify
        required: true
        default: "2026"
      month:
        description: 1-indexed month to verify
        required: true
        default: "4"
      aws_region:
        description: AWS region
        required: true
        default: us-east-1
      ecs_stack_name:
        description: ECS CloudFormation stack
        required: true
        default: torre-de-control-v2-ecs

permissions:
  contents: read

jobs:
  verify:
    name: Query production dashboard tables from ECS network
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Run verification task
        shell: bash
        env:
          AWS_REGION: ${{ github.event.inputs.aws_region }}
          STACK_NAME: ${{ github.event.inputs.ecs_stack_name }}
          VERIFY_YEAR: ${{ github.event.inputs.year }}
          VERIFY_MONTH: ${{ github.event.inputs.month }}
        run: |
          set -euo pipefail
          CLUSTER="$(aws cloudformation describe-stacks --region "$AWS_REGION" --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='ClusterName'].OutputValue | [0]" --output text)"
          SERVICE="$(aws cloudformation describe-stacks --region "$AWS_REGION" --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='ServiceName'].OutputValue | [0]" --output text)"
          TASK_DEF="$(aws cloudformation describe-stacks --region "$AWS_REGION" --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='TaskDefinitionArn'].OutputValue | [0]" --output text)"
          SERVICE_JSON="$(aws ecs describe-services --region "$AWS_REGION" --cluster "$CLUSTER" --services "$SERVICE" --query 'services[0]')"
          SUBNETS="$(jq -r '.networkConfiguration.awsvpcConfiguration.subnets | join(",")' <<<"$SERVICE_JSON")"
          SECURITY_GROUPS="$(jq -r '.networkConfiguration.awsvpcConfiguration.securityGroups | join(",")' <<<"$SERVICE_JSON")"
          ASSIGN_PUBLIC_IP="$(jq -r '.networkConfiguration.awsvpcConfiguration.assignPublicIp // "ENABLED"' <<<"$SERVICE_JSON")"
          CONTAINER="$(aws ecs describe-task-definition --region "$AWS_REGION" --task-definition "$TASK_DEF" --query 'taskDefinition.containerDefinitions[0].name' --output text)"

          cat > verify.js <<'NODE'
          const { PrismaClient } = require('@prisma/client');
          const prisma = new PrismaClient();
          const year = Number(process.env.VERIFY_YEAR);
          const month1 = Number(process.env.VERIFY_MONTH);
          const month0 = month1 - 1;
          const start = new Date(Date.UTC(year, month1 - 1, 1));
          const end = new Date(Date.UTC(year, month1, 1));
          async function main() {
            const dailyRows = await prisma.$queryRaw`
              select count(*)::int as rows,
                coalesce(sum(agendas_otros),0)::int as agendas_otros,
                coalesce(sum(cal_otros),0)::int as cal_otros,
                coalesce(sum(hoy_otros),0)::int as hoy_otros,
                coalesce(sum(show_otros),0)::int as show_otros,
                coalesce(sum(agendas_calificadas),0)::int as agendas_calificadas,
                coalesce(sum(agendas_final),0)::int as agendas_final,
                coalesce(sum(citas_asistidas),0)::int as citas_asistidas
              from daily_closer
              where date >= ${start}::date and date < ${end}::date`;
            const payments = await prisma.$queryRaw`
              select count(*)::int as rows,
                coalesce(sum(case when "contributesToCash" then "amountUsd" else 0 end),0)::numeric as cash_total,
                coalesce(sum(case when classification = 'high_ticket' and "contributesToCash" then "amountUsd" else 0 end),0)::numeric as high_ticket,
                coalesce(sum(case when classification = 'low_ticket' and "contributesToCash" then "amountUsd" else 0 end),0)::numeric as low_ticket,
                coalesce(sum(case when classification = 'reserva' and "contributesToCash" then "amountUsd" else 0 end),0)::numeric as reservas,
                coalesce(sum(case when "reviewRequired" then 1 else 0 end),0)::int as review_required
              from dashboard_payment_transactions
              where "paidAt" >= ${start} and "paidAt" < ${end}`;
            const kpi = await prisma.$queryRaw`
              select count(*)::int as rows,
                max(meta_revenue)::numeric as meta_revenue,
                max(inversion_planeada)::numeric as inversion_planeada,
                max(roas_objetivo)::numeric as roas_objetivo
              from kpi_data
              where year = ${year} and month = ${month0}`;
            const result = { year, month: month1, daily_closer: dailyRows[0], payments: payments[0], kpi_data: kpi[0] };
            console.log('TORRE_VERIFY_RESULT=' + JSON.stringify(result, (_, v) => typeof v === 'bigint' ? Number(v) : v));
            if (Number(dailyRows[0].rows) !== new Date(year, month1, 0).getDate()) {
              console.error('Expected one daily_closer row per day');
              process.exit(1);
            }
          }
          main().catch((error) => { console.error(error); process.exit(1); }).finally(() => prisma.$disconnect());
          NODE

          SCRIPT="$(jq -Rs . < verify.js)"
          OVERRIDES="$(jq -n --arg c "$CONTAINER" --arg y "$VERIFY_YEAR" --arg m "$VERIFY_MONTH" --arg script "node -e $SCRIPT" '{containerOverrides:[{name:$c,command:["sh","-lc",$script],environment:[{name:"VERIFY_YEAR",value:$y},{name:"VERIFY_MONTH",value:$m}]}]}')"
          TASK_ARN="$(aws ecs run-task \
            --region "$AWS_REGION" \
            --cluster "$CLUSTER" \
            --launch-type FARGATE \
            --task-definition "$TASK_DEF" \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SECURITY_GROUPS],assignPublicIp=$ASSIGN_PUBLIC_IP}" \
            --overrides "$OVERRIDES" \
            --query 'tasks[0].taskArn' --output text)"
          echo "Task: $TASK_ARN"
          aws ecs wait tasks-stopped --region "$AWS_REGION" --cluster "$CLUSTER" --tasks "$TASK_ARN"
          EXIT_CODE="$(aws ecs describe-tasks --region "$AWS_REGION" --cluster "$CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)"
          TASK_ID="${TASK_ARN##*/}"
          LOG_GROUP="/ecs/torre-de-control-v2"
          LOG_STREAM="app/${CONTAINER}/${TASK_ID}"
          echo "--- task logs ---"
          aws logs get-log-events --region "$AWS_REGION" --log-group-name "$LOG_GROUP" --log-stream-name "$LOG_STREAM" --query 'events[].message' --output text || true
          test "$EXIT_CODE" = "0"
