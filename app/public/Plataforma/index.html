// ─── Authenticated data client ───────────────────────────────────────────────
// The browser no longer talks to Supabase directly. All reads/writes go through
// same-origin Next routes (/api/dashboard/*) that enforce session + permissions
// + data scope server-side. This `db` shim mirrors the small slice of the
// Supabase query API the dashboard actually used, so call sites stay unchanged.
const DASH_API = "/api/dashboard";
const _post = (path, body) =>
  fetch(DASH_API + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "same-origin",
    body: JSON.stringify(body),
  });
async function _errFrom(r) {
  const j = await r.json().catch(() => ({}));
  return { message: j.error || `HTTP ${r.status}`, status: r.status };
}
const db = {
  from(table) {
    return {
      // .select("*") — read a whole table (server scope-filters the rows).
      select() {
        return (async () => {
          try {
            const r = await fetch(
              `${DASH_API}/select?table=${encodeURIComponent(table)}`,
              { credentials: "same-origin" },
            );
            if (!r.ok) return { data: null, error: await _errFrom(r) };
            const j = await r.json();
            return { data: j.rows || [], error: null };
          } catch (e) {
            return { data: null, error: { message: String(e) } };
          }
        })();
      },
      // .upsert(values, {onConflict}) — insert or merge.
      upsert(values, opts) {
        return (async () => {
          try {
            const r = await _post("/mutate", {
              op: "upsert",
              table,
              values,
              onConflict: opts && opts.onConflict,
            });
            if (!r.ok) return { data: null, error: await _errFrom(r) };
            return { data: null, error: null };
          } catch (e) {
            return { data: null, error: { message: String(e) } };
          }
        })();
      },
      // .insert(values) — supports both `await insert()` and `insert().select().single()`.
      insert(values) {
        const exec = async (single) => {
          try {
            const r = await _post("/mutate", { op: "insert", table, values });
            if (!r.ok) return { data: null, error: await _errFrom(r) };
            const j = await r.json();
            const rows = j.rows || [];
            return { data: single ? rows[0] || null : rows, error: null };
          } catch (e) {
            return { data: null, error: { message: String(e) } };
          }
        };
        return {
          select() {
            return {
              single: () => exec(true),
              then: (res, rej) => exec(false).then(res, rej),
            };
          },
          then: (res, rej) => exec(false).then(res, rej),
        };
      },
      // .delete().eq(col,val) / .delete().match({...})
      delete() {
        const run = (match) =>
          (async () => {
            try {
              const r = await _post("/mutate", { op: "delete", table, match });
              if (!r.ok) return { data: null, error: await _errFrom(r) };
              return { data: null, error: null };
            } catch (e) {
              return { data: null, error: { message: String(e) } };
            }
          })();
        return {
          eq: (col, val) => run({ [col]: val }),
          match: (obj) => run(obj),
        };
      },
    };
  },
};

const dv=(a,b)=>{const x=nv(a),y=nv(b);return(!x||!y||y===0)?null:x/y};
const pv=(a,b)=>{const r=dv(a,b);return r==null?null:r*100};
const fD=v=>{const x=nv(v);if(x==null)return"—";return"$"+Math.round(Math.abs(x)).toLocaleString("en-US")};
const fP=(v,d=1)=>{const x=nv(v);if(x==null)return"—";return x.toFixed(d)+"%"};

const ResumenEquipo=({year,month,allDaily})=>{
  const [view,setView]=useState("resumen");
  const prefix=`${year}-${String(month+1).padStart(2,"0")}`;
  const entries=Object.entries(allDaily).filter(([k])=>k.startsWith(prefix)).map(([,v])=>v);
  const byMember={};TEAM.forEach(m=>{byMember[m]=[];});
  entries.forEach(e=>{if(byMember[e.member])byMember[e.member].push(e);});

  const memberTotals=TEAM.map(m=>{
    const rows=byMember[m];if(!rows.length)return null;
    const t={member:m,days:rows.length,
      posts:sumF(rows,"posts"),mensajes:sumF(rows,"mensajes"),
      followUps:sumF(rows,"followUps"),bkOffers:sumF(rows,"bkOffers"),
      newBk:sumF(rows,"newBkTotal"),qualBk:sumF(rows,"qualBkTotal"),
      shows:sumF(rows,"showsTotal"),investment:sumF(rows,"paidBkInvestment")};
    t.showRate=t.qualBk>0?pv(t.shows,t.qualBk):null;
    t.qualRate=t.newBk>0?pv(t.qualBk,t.newBk):null;
    t.msgPerDay=t.days>0?t.mensajes/t.days:0;
    return t;
  }).filter(Boolean);

  const team=memberTotals.reduce((a,m)=>({
    mensajes:(a.mensajes||0)+m.mensajes,followUps:(a.followUps||0)+m.followUps,
    bkOffers:(a.bkOffers||0)+m.bkOffers,newBk:(a.newBk||0)+m.newBk,
    qualBk:(a.qualBk||0)+m.qualBk,shows:(a.shows||0)+m.shows,posts:(a.posts||0)+m.posts
  }),{});
  const teamShowRate=pv(team.shows,team.qualBk),teamQualRate=pv(team.qualBk,team.newBk),dm=MDAYS[month];
  const byDate={};entries.forEach(e=>{if(!byDate[e.date])byDate[e.date]={};byDate[e.date][e.member]=e;});
  const sortedDates=Object.keys(byDate).sort().reverse();
  const subBtn=v=>({background:view===v?TXT:"transparent",border:`1px solid ${view===v?TXT:BORDER}`,
    borderRadius:8,padding:"6px 14px",cursor:"pointer",color:view===v?"#fff":TXT2,
    fontSize:11,fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:view===v?700:400,outline:"none"});

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",gap:6}}>
        {[["resumen","Resumen"],["miembro","Por miembro"],["historial","Historial"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={subBtn(v)}>{l}</button>
        ))}
      </div>


      {entries.length===0&&(
        <Card><div style={{textAlign:"center",padding:"40px 20px",color:TXT3,fontSize:12,fontFamily:"'Hanken Grotesk',sans-serif"}}>
          Sin entradas para {MONTHS[month]} {year}.<br/>
          <span style={{fontSize:10,marginTop:6,display:"block"}}>El equipo debe usar "Entrada Diaria" para registrar.</span>

const localPayDate=iso=>{
  if(!iso)return null;const d=new Date(iso);if(isNaN(d.getTime()))return null;
  return new Intl.DateTimeFormat("en-CA",{timeZone:"America/Bogota",year:"numeric",month:"2-digit",day:"2-digit"}).format(d);

const Torre=({kpi,year,month,allCloser,allDaily,dm,onSaveConfig})=>{
  const [editConfig,setEditConfig]=useState(false);
  const [cfg,setCfg]=useState({});
  const [savingCfg,setSavingCfg]=useState(false);
  const [cash,setCash]=useState(null);   // /api/payments/summary response (null until loaded)
  const [drill,setDrill]=useState(null);  // open drawer: {title, rows} | null

  // Load Cash Collected truth for the selected month. month is 0-indexed here; the
  // API expects 1-12. On 401/403/error we leave `cash` falsy so the UI falls back
  // to the legacy closer-entered totals and the cells stay non-clickable.
  useEffect(()=>{
    let active=true;
    setCash(null);
    fetch(`/api/payments/summary?year=${year}&month=${month+1}`,{credentials:"same-origin"})
      .then(r=>r.ok?r.json():null)
      .then(j=>{if(active)setCash(j);})
      .catch(()=>{if(active)setCash({available:false});});
    return()=>{active=false;};
  },[year,month]);

  useEffect(()=>{
    setCfg({
      metaMensual:kpi.meta?.revenue||"150000",
      inversionPlaneada:kpi.inversion_planeada||"0",
      roasObj:kpi.roas_objetivo||"4",
      pctLeadsAg:kpi.pct_leads_agendadas||"45",
      pctAgAsis:kpi.pct_agendadas_asistidas||"70",
      closeRateMeta:kpi.close_rate_meta||"25",
      day:kpi.day||new Date().getDate(),
    });
  },[kpi]);

  const prefix=`${year}-${String(month+1).padStart(2,"0")}`;
  const closerEntries=Object.entries(allCloser).filter(([k])=>k.startsWith(prefix)).map(([,v])=>v);
  const dailyEntries=Object.entries(allDaily).filter(([k])=>k.startsWith(prefix)).map(([,v])=>v);
  const adDailyEntries=dailyEntries.filter(e=>e&&!isCommercialMember(e.member));
  // Preserve approved historical months through May 2026. The collaborator
  // fallback exists for the new June-onward Area Comercial por colaborador flow
  // (e.g. Daniel's June 1 report) and must not rewrite closed May metrics.
  const allowCommercialFallback=year>2026||(year===2026&&month>=5);
  const collabCommercialEntries=allowCommercialFallback?dailyEntries.filter(e=>e&&isCommercialReportingMember(e.member,e.date)):[];
  const commercialEntriesByDay={};
  collabCommercialEntries.forEach(e=>{if(e&&e.date){commercialEntriesByDay[e.date]=commercialEntriesByDay[e.date]||[];commercialEntriesByDay[e.date].push(e);}});
  const commercialValueByDay=(date,field)=>commercialDayValue(date,commercialEntriesByDay[date]||[],field)||0;
  // Torre CEO must mirror Detalle Diario → Agendas / Leads High Ticket exactly:
  // Citas agendadas reales = total Hoy (en agenda), Leads calificados reales =
  // total Calificadas Total, Citas Show Up (asistidas) = total Show Ups.
  // Do not recalculate with Área Comercial completa/Admin or Math.min/Max.
  const highTicketCloserMonthlyEntries=allowCommercialFallback?dailyEntries.filter(e=>e&&isHighTicketCloserReportingMember(e.member,e.date)):[];
  const totalAgendasFromDetalle=sumF(highTicketCloserMonthlyEntries,"agendasHoy");
  const totalLeadsFromDetalle=sumF(highTicketCloserMonthlyEntries,"calificadas");
  const totalShowsFromDetalle=sumF(highTicketCloserMonthlyEntries,"showUps");
  const totalAgendas=totalAgendasFromDetalle||sumF(closerEntries,"agendas_final");
  const totalLeads=totalLeadsFromDetalle||sumF(closerEntries,"agendas_calificadas");
  const totalAsistidas=totalShowsFromDetalle||sumF(closerEntries,"citas_asistidas");
  // Gasto Ads viene del tab Marketing (daily_entries, por miembro)
  const totalGastoMeta=sumF(adDailyEntries,"gastoMeta");
  const totalGastoGoogle=sumF(adDailyEntries,"gastoGoogle");
  const totalGastoTiktok=sumF(adDailyEntries,"gastoTikTok");
  const totalGastoOtros=sumF(adDailyEntries,"gastoOtros");
  const totalGasto=totalGastoMeta+totalGastoGoogle+totalGastoTiktok+totalGastoOtros;

  const metaMensual=nv(cfg.metaMensual)||150000;
  const inversionPlaneada=nv(cfg.inversionPlaneada)||0;
  const roasObj=nv(cfg.roasObj)||4;
  const pctLeadsAg=nv(cfg.pctLeadsAg)||45;
  const pctAgAsis=nv(cfg.pctAgAsis)||70;
  const closeRateMeta=nv(cfg.closeRateMeta)||25;
  // Resolve the selected period's state relative to "today" in America/Bogota
  // so past/future months never reuse today's day-of-month. See
  // app/src/lib/dashboard-month.ts (unit-tested mirror of this logic).
  const [_curY,_curMM,_curD]=today().split("-").map(Number);
  const _curM=_curMM-1;
  const monthState=year<_curY||(year===_curY&&month<_curM)?"past":year===_curY&&month===_curM?"current":"future";
  const isPast=monthState==="past",isFuture=monthState==="future",isCurrent=monthState==="current";
  // Current-month rhythm must follow the real Bogotá date. `cfg.day` is a
  // legacy/manual snapshot and can go stale (e.g. May 30 still showing day 28).
  const day=isPast?dm:isFuture?0:Math.min(_curD,dm);

  // Cash/ventas money metrics are owned by Valentina/Admin + closers in Área Comercial.
  // The payment ledger stays available as fallback/drill-down, but must not
  // override the operational values registered by the commercial team.
  const cashApi=cash&&cash.available&&cash.totals?cash.totals:null;
  const cashGroups=(cash&&cash.groups)||{};
  const ledgerHTByDay={};
  const ledgerLTByDay={};
  const ledgerReservasByDay={};
  const addByDay=(map,date,value)=>{if(date)map[date]=(map[date]||0)+(Number(value)||0);};
  (cashGroups.highTicket||[]).forEach(r=>addByDay(ledgerHTByDay,localPayDate(r.paidAt),r.amountUsd));
  (cashGroups.lowTicket||[]).forEach(r=>addByDay(ledgerLTByDay,localPayDate(r.paidAt),r.amountUsd));
  (cashGroups.reservas||[]).forEach(r=>addByDay(ledgerReservasByDay,localPayDate(r.paidAt),r.amountUsd));
  const commercialValorHTByDay={};
  const commercialCashByDay={};
  const commercialLowTicketByDay={};
  const commercialRecurringByDay={};
  const commercialReservasByDay={};
  Object.keys(commercialEntriesByDay).forEach(date=>{
    addByDay(commercialValorHTByDay,date,commercialValueByDay(date,"valorVentaHT"));
    addByDay(commercialCashByDay,date,commercialValueByDay(date,"cashCollected")||commercialValueByDay(date,"upfrontCash"));
    addByDay(commercialLowTicketByDay,date,commercialValueByDay(date,"valorVentaLT"));
    addByDay(commercialRecurringByDay,date,commercialValueByDay(date,"recurringCash"));
    addByDay(commercialReservasByDay,date,commercialValueByDay(date,"cashReservas"));
  });
  const monthlyCommercialMoneyDates=[...new Set([
    ...Object.keys(allCloser).filter(k=>k.startsWith(prefix)),
    ...Object.keys(commercialEntriesByDay).filter(k=>k.startsWith(prefix)),
    ...Object.keys(commercialValorHTByDay).filter(k=>k.startsWith(prefix)),
    ...Object.keys(commercialCashByDay).filter(k=>k.startsWith(prefix)),
    ...Object.keys(commercialRecurringByDay).filter(k=>k.startsWith(prefix)),
    ...Object.keys(commercialLowTicketByDay).filter(k=>k.startsWith(prefix)),
    ...Object.keys(commercialReservasByDay).filter(k=>k.startsWith(prefix)),
    ...Object.keys(ledgerHTByDay).filter(k=>k.startsWith(prefix)),
    ...Object.keys(ledgerLTByDay).filter(k=>k.startsWith(prefix)),
    ...Object.keys(ledgerReservasByDay).filter(k=>k.startsWith(prefix)),
  ])];
  const monthlyCommercialMoneyDay=(date,closerRow)=>{
    if(areaComercialHasPriority(date)){
      return {
        valorHT:commercialValorHTByDay[date]||0,
        cashHT:commercialCashByDay[date]||0,
        recurring:commercialRecurringByDay[date]||0,
        lowTicket:commercialLowTicketByDay[date]||0,
        reservas:commercialReservasByDay[date]||0,
      };
    }
    return {
      valorHT:(closerRow&&closerRow.valor_venta_ht)||commercialValorHTByDay[date]||0,
      cashHT:(closerRow&&closerRow.ventas_cash)||commercialCashByDay[date]||ledgerHTByDay[date]||0,
      recurring:(closerRow&&closerRow.recurring_cash)||commercialRecurringByDay[date]||0,
      lowTicket:(closerRow&&closerRow.valor_venta_lt)||commercialLowTicketByDay[date]||ledgerLTByDay[date]||0,
      reservas:(closerRow&&closerRow.cash_reservas)||commercialReservasByDay[date]||ledgerReservasByDay[date]||0,
    };
  };
  const monthlyCommercialSalesDay=(date,closerRow)=>areaComercialHasPriority(date)?commercialValueByDay(date,"ventasHT"):(commercialValueByDay(date,"ventasHT")||((closerRow&&closerRow.q_ventas_ht)||0));
  const totalVentas=monthlyCommercialMoneyDates.reduce((s,date)=>s+monthlyCommercialSalesDay(date,allCloser[date]),0);
  const totalValor=monthlyCommercialMoneyDates.reduce((s,date)=>s+monthlyCommercialMoneyDay(date,allCloser[date]).valorHT,0);
  const dispCash=monthlyCommercialMoneyDates.reduce((s,date)=>s+monthlyCommercialMoneyDay(date,allCloser[date]).cashHT,0)||(cashApi?cashApi.highTicket:0);
  const totalRecurring=monthlyCommercialMoneyDates.reduce((s,date)=>s+monthlyCommercialMoneyDay(date,allCloser[date]).recurring,0);
  const dispLowT=monthlyCommercialMoneyDates.reduce((s,date)=>s+monthlyCommercialMoneyDay(date,allCloser[date]).lowTicket,0)||(cashApi?cashApi.lowTicket:0);
  const dispHighT=dispCash;
  const dispReservas=monthlyCommercialMoneyDates.reduce((s,date)=>s+monthlyCommercialMoneyDay(date,allCloser[date]).reservas,0)||(cashApi?cashApi.reservas:0);
  const reviewCount=cashApi&&cashApi.counts?cashApi.counts.reviewRequired:0;
  const reviewAmount=cashApi?cashApi.reviewRequired:0;
  const manualCommercialCash=dispCash+dispLowT+dispReservas;
  const hasManualCommercialCash=manualCommercialCash>0;
  const openDrill=(title,key)=>{if(!cashApi)return;setDrill({title,rows:cashGroups[key]||[]});};

  const ticketProm=totalVentas>0?totalValor/totalVentas:0;
  const pctTranscurrido=dm>0?day/dm:0;
  const metaEsperadaHoy=metaMensual*pctTranscurrido;
  // Cash Total = Cash Low Ticket + Ventas $ (cash cobrado) + Recurring Cash.
  const cashTotal=dispLowT+dispCash+totalRecurring;
  // Header adds reservas visually without mixing them into the core Cash Total KPI.
  const cashHeaderTotal=cashTotal+(dispReservas||0);
  // Ritmo del mes uses total real sold: committed High Ticket sales plus
  // Cash Low Ticket. Applies equally to closed months and future/current views.
  const ventasRealesAcum=totalValor+dispLowT;
  const gapVsRitmo=ventasRealesAcum-metaEsperadaHoy;
  // Only the current month projects forward — past months are closed and
  // future months must not fabricate progress.
  const proyeccion=isCurrent&&day>0&&ventasRealesAcum>0?(ventasRealesAcum/day)*dm:null;
  const pctCumpl=pv(ventasRealesAcum,metaMensual);

  // Salud del embudo formulas requested by Juan:
  // % Leads → Agendadas = Leads calificados reales / Citas agendadas reales
  // % Agendadas → Asistidas = Citas Show Up (asistidas) / Leads calificados reales
  const pctLeadsAgReal=totalAgendas>0?pv(totalLeads,totalAgendas):null;
  const pctAgAsisReal=totalLeads>0?pv(totalAsistidas,totalLeads):null;
  const closeRateReal=totalAsistidas>0?pv(totalVentas,totalAsistidas):null;

  const roasReal=totalGasto>0&&dispCash>0?dispCash/totalGasto:null;
  const invEsperadaHoy=inversionPlaneada*pctTranscurrido;
  const gapInversion=totalGasto-invEsperadaHoy;

  const leadsPorDolar=metaMensual>0?leadsPerDollarForRevenue(metaMensual):0;
  const leadsMeta=metaMensual>0?metaMensual*leadsPorDolar:0;
  const agendaMeta=pctLeadsAg>0?leadsMeta*(pctLeadsAg/100):0;
  const asistidaMeta=pctAgAsis>0?agendaMeta*(pctAgAsis/100):0;
  const ventasUniMeta=closeRateMeta>0?asistidaMeta*(closeRateMeta/100):0;
  const ventasReqHoy=ticketProm>0?metaEsperadaHoy/ticketProm:0;
  const asistidasReqHoy=closeRateMeta>0?ventasReqHoy/(closeRateMeta/100):0;
  const citasAgendadasReqHoy=pctAgAsis>0?asistidasReqHoy/(pctAgAsis/100):0;
  const leadsReqHoy=pctLeadsAg>0?citasAgendadasReqHoy/(pctLeadsAg/100):0;
  // Same display rule as real-month values: larger upstream funnel number is
  // shown as "Citas agendadas reales" and smaller one as "Leads calificados reales".
  const citasAgendadasDisplayReqHoy=Math.max(citasAgendadasReqHoy,leadsReqHoy);
  const leadsCalificadosDisplayReqHoy=Math.min(citasAgendadasReqHoy,leadsReqHoy);

  const roasCash=totalGasto>0&&dispCash>0?dispCash/totalGasto:null;
  const roasComprometido=totalGasto>0&&totalValor>0?totalValor/totalGasto:null;

  const pctCumplProy=pv(proyeccion,metaMensual);
  const gapProy=proyeccion?proyeccion-metaMensual:null;

  const funnelRows=[
    {l:"Ventas $ (comprometido)",req:metaEsperadaHoy,real:totalValor,fmt:"$"},
    {l:"Ventas (unidades)",req:ventasReqHoy,real:totalVentas,fmt:"n"},
    {l:"Citas Show Up (asistidas)",req:asistidasReqHoy,real:totalAsistidas,fmt:"n"},
    {l:"Leads calificados reales",req:leadsCalificadosDisplayReqHoy,real:totalLeads,fmt:"n"},
    {l:"Citas agendadas reales",req:citasAgendadasDisplayReqHoy,real:totalAgendas,fmt:"n"},
  ];

  const handleSaveCfg=async()=>{
    setSavingCfg(true);
    await onSaveConfig({
      meta_revenue:nv(cfg.metaMensual),
      inversion_planeada:nv(cfg.inversionPlaneada),
      roas_objetivo:nv(cfg.roasObj),
      pct_leads_agendadas:nv(cfg.pctLeadsAg),
      pct_agendadas_asistidas:nv(cfg.pctAgAsis),
      close_rate_meta:nv(cfg.closeRateMeta),
      day:nv(cfg.day),
    });
    setSavingCfg(false);
    setEditConfig(false);
  };

  const block={background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:10,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.04)"};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>

      {/* HEADER — flat white ledger header: eyebrow + H1 + chips + KPI strip */}
      <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:14,padding:"18px 22px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:11,color:TXT3,letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:700,fontFamily:"'Hanken Grotesk',sans-serif",marginBottom:4}}>Torre de Control — Comercial</div>
            <div style={{fontSize:30,fontWeight:800,color:TXT,fontFamily:"'Hanken Grotesk',sans-serif",lineHeight:1.05,letterSpacing:"-0.02em"}}>{MONTHS[month]} {year}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{display:"inline-flex",alignItems:"center",gap:6,background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:999,padding:"6px 13px",fontSize:11,fontWeight:700,color:TXT2,fontFamily:"'Hanken Grotesk',sans-serif"}}>
              {isPast?"Cierre":isFuture?"Futuro":"Día"} {isFuture?"—":day}/{dm}
            </span>
            {!editConfig&&<button onClick={()=>setEditConfig(true)} style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:999,padding:"6px 13px",fontSize:11,fontWeight:700,cursor:"pointer",color:TXT2,fontFamily:"'Hanken Grotesk',sans-serif"}}>Config</button>}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",marginTop:16,borderTop:`1px solid ${BORDER}`}}>
          {[
            {l:"Cash Total",v:fD(cashHeaderTotal),c:C.green},
            {l:"Venta comprometida",v:fD(totalValor),c:TXT},
            {l:"% Cumplimiento",v:fP(pctCumpl),c:cH(pctCumpl,85,65)},
            {l:"Meta mensual",v:fD(metaMensual),c:TXT},
          ].map((k,i)=>(
            <div key={k.l} style={{padding:"13px 14px 15px",borderLeft:i>0?`1px solid ${BORDER}`:"none"}}>
              <div style={{fontSize:10,color:TXT3,letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:700,marginBottom:4,fontFamily:"'Hanken Grotesk',sans-serif"}}>{k.l}</div>
              <div style={{fontSize:19,fontWeight:800,color:k.c,fontFamily:"'Hanken Grotesk',sans-serif",letterSpacing:"-0.01em"}}>{k.v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* DATO COMERCIAL MANUAL — Valentina/Admin + closers are the primary cash source; ledger remains a validation aid */}
      {cashApi&&hasManualCommercialCash&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,
          background:C.amber+"10",border:`1px dashed ${C.amber}77`,borderRadius:10,padding:"12px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>📝</span>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:TXT,fontFamily:"'Hanken Grotesk',sans-serif"}}>Dato comercial principal</div>
              <div style={{fontSize:11,color:TXT2,fontFamily:"'Hanken Grotesk',sans-serif"}}>Valentina/Admin y closers registraron datos en Área Comercial. Este cash operativo tiene prioridad; el ledger queda como apoyo para verificación.</div>
            </div>
          </div>
          <span style={{fontSize:12,color:C.amber,fontWeight:700,fontFamily:"'Hanken Grotesk',sans-serif"}}>{fD(manualCommercialCash)}</span>
        </div>
      )}

      {/* PAGOS A REVISAR — amber alert, clickable to open the reviewRequired drill-down */}
      {reviewCount>0&&(
        <div onClick={()=>openDrill("Pagos a revisar","reviewRequired")} role="button" tabIndex={0}
          onKeyDown={(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();openDrill("Pagos a revisar","reviewRequired");}}}
          style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,cursor:"pointer",
            background:C.amber+"14",border:`1px solid ${C.amber}66`,borderRadius:10,padding:"12px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>⚠️</span>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:TXT,fontFamily:"'Hanken Grotesk',sans-serif"}}>Pagos a revisar</div>
              <div style={{fontSize:11,color:TXT2,fontFamily:"'Hanken Grotesk',sans-serif"}}>{reviewCount} {reviewCount===1?"pago de fuente no oficial":"pagos de fuente no oficial"} · {fD(reviewAmount)}</div>
            </div>
          </div>
          <span style={{fontSize:12,color:C.amber,fontWeight:700,fontFamily:"'Hanken Grotesk',sans-serif"}}>Ver detalle ›</span>
        </div>
      )}

      {/* CONFIG EDIT PANEL */}
      {editConfig&&(
        <div style={{...block,padding:"16px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontSize:12,fontWeight:700,color:TXT}}>Configuración del mes</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={handleSaveCfg} disabled={savingCfg} style={{background:BRAND,color:"#fff",border:"none",borderRadius:7,padding:"6px 14px",fontSize:11,cursor:"pointer",fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:700,opacity:savingCfg?0.7:1}}>{savingCfg?"...":"✓ Guardar"}</button>
              <button onClick={()=>setEditConfig(false)} style={{background:"transparent",border:`1px solid ${BORDER}`,borderRadius:7,padding:"6px 12px",fontSize:11,cursor:"pointer",color:TXT2}}>Cancelar</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10}}>
            <Inp label="Meta mensual $" prefix="$" value={cfg.metaMensual} onChange={v=>setCfg(p=>({...p,metaMensual:v}))}/>
            <Inp label="Inversión planeada $" prefix="$" value={cfg.inversionPlaneada} onChange={v=>setCfg(p=>({...p,inversionPlaneada:v}))}/>
            <Inp label="ROAS objetivo" value={cfg.roasObj} onChange={v=>setCfg(p=>({...p,roasObj:v}))}/>
            <Inp label="Día actual del mes" value={cfg.day} onChange={v=>setCfg(p=>({...p,day:v}))}/>
            <Inp label="% Leads → Agendadas meta" value={cfg.pctLeadsAg} onChange={v=>setCfg(p=>({...p,pctLeadsAg:v}))} hint="%"/>
            <Inp label="% Agendadas → Asistidas meta" value={cfg.pctAgAsis} onChange={v=>setCfg(p=>({...p,pctAgAsis:v}))} hint="%"/>
            <Inp label="Close Rate meta" value={cfg.closeRateMeta} onChange={v=>setCfg(p=>({...p,closeRateMeta:v}))} hint="%"/>
          </div>
        </div>
      )}

      {/* TOP GRID: CONFIG + REALIDAD */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>

        {/* CONFIGURACIÓN */}
        <div style={block}>
          <SectionTitle>Configuración</SectionTitle>
          <Row2 label="Mes" value={MONTHS[month]}/>
          <Row2 label="Año" value={year}/>
          <Row2 label="Días del mes" value={dm}/>
          <Row2 label="Meta mensual ventas ($)" value={fD(metaMensual)} bold color={BRAND}/>
          <Row2 label="ROAS objetivo" value={`${roasObj}x`}/>
          <Row2 label="% Leads → Agendadas (meta)" value={fP(pctLeadsAg)}/>
          <Row2 label="% Agendadas → Asistidas (meta)" value={fP(pctAgAsis)}/>
          <Row2 label="Close rate (meta)" value={fP(closeRateMeta)}/>
          <Row2 label="Leads necesarios por dólar" value={leadsPorDolar>0?leadsPorDolar.toFixed(5):"—"}/>
        </div>

        {/* REALIDAD DEL MES */}
        <div style={block}>
          <SectionTitle>Realidad del mes (ejecución)</SectionTitle>
          <Row2 label="Valor Total Venta (comprometido)" value={fD(totalValor)} bold color={BRAND}/>
          <Row2 label="Ventas $ (cash cobrado)" value={fD(dispCash)} bold color={C.green} onClick={cashApi?()=>openDrill("Cash Collected","cashCollected"):null}/>
          <Row2 label="Recurring Cash" value={fD(totalRecurring)} color={C.purple}/>
          <Row2 label="Cash Low Ticket" value={fD(dispLowT)} color={C.teal} onClick={cashApi?()=>openDrill("Cash Low Ticket","lowTicket"):null}/>
          {cashApi&&<Row2 label="Reservas (cash)" value={fD(dispReservas)} color={C.amber} onClick={()=>openDrill("Reservas","reservas")}/>}
          <Row2 label="Ventas reales (unidades)" value={fN(totalVentas)}/>
          <Row2 label="Citas Show Up (asistidas)" value={fN(totalAsistidas)}/>
          <Row2 label="Leads calificados reales" value={fN(totalLeads)}/>
          <Row2 label="Citas agendadas reales" value={fN(totalAgendas)}/>
          <Row2 label="Ticket promedio (comprometido)" value={fD(ticketProm)} bold/>
          <Row2 label="Close rate real" value={fP(closeRateReal)} bold color={cH(closeRateReal,closeRateMeta*0.9,closeRateMeta*0.7)}/>
        </div>
      </div>

      {/* RITMO + PROYECCIÓN */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>

        <div style={block}>
          <SectionTitle>Ritmo del mes (tiempo + dinero)</SectionTitle>
          <Row2 label={isCurrent?"Fecha hoy":"Período"} value={isCurrent?today():`${MONTHS[month]} ${year}`}/>
          <Row2 label="Días totales mes" value={dm}/>
          <Row2 label={isPast?"Día final del mes":isFuture?"Día del mes":"Día del mes"} value={isFuture?"—":day}/>
          <Row2 label="% mes transcurrido" value={fP(pctTranscurrido*100,1)}/>
          <div style={{height:1,background:BORDER,margin:"4px 0"}}/>
          <Row2 label="Meta mensual ($)" value={fD(metaMensual)}/>
          <Row2 label={isCurrent?"Meta esperada a hoy ($)":isPast?"Meta total del mes ($)":"Meta esperada al cierre ($)"} value={fD(metaEsperadaHoy)} bold/>
          <Row2 label={isPast?"Ventas reales al cierre ($)":"Ventas reales acumuladas ($)"} value={fD(ventasRealesAcum)} bold color={C.green} onClick={cashApi?()=>openDrill("Cash Collected","cashCollected"):null}/>
          <Row2 label={isPast?"Gap vs meta ($)":"Gap vs ritmo ($)"} value={fD(gapVsRitmo)} bold color={gapVsRitmo>=0?C.green:C.red} bg={gapVsRitmo>=0?"#f0fdf4":"#fef2f2"}/>
        </div>

        <div style={block}>
          <SectionTitle>{isCurrent?"Proyección fin de mes (si seguimos así)":isPast?"Cierre del mes (real)":"Proyección fin de mes (sin datos aún)"}</SectionTitle>
          <div style={{padding:"18px 14px",display:"flex",flexDirection:"column",gap:0}}>
            {isPast?(<>
              <Row2 label="Ventas reales al cierre ($)" value={fD(ventasRealesAcum)} bold color={ventasRealesAcum>=metaMensual?C.green:C.red}/>
              <Row2 label="% cumplimiento real" value={fP(pctCumpl)} bold color={cH(pctCumpl,85,65)}/>
              <Row2 label="Gap real vs meta ($)" value={fD(ventasRealesAcum-metaMensual)} bold color={ventasRealesAcum>=metaMensual?C.green:C.red} bg={ventasRealesAcum>=metaMensual?"#f0fdf4":"#fef2f2"}/>
            </>):isFuture?(<>
              <Row2 label="Ventas proyectadas fin de mes ($)" value="—"/>
              <Row2 label="% cumplimiento proyectado" value="—"/>
              <Row2 label="Gap proyectado vs meta ($)" value="—"/>
            </>):(<>
              <Row2 label="Ventas proyectadas fin de mes ($)" value={proyeccion?fD(proyeccion):"—"} bold color={proyeccion&&proyeccion>=metaMensual?C.green:C.red}/>
              <Row2 label="% cumplimiento proyectado" value={fP(pctCumplProy)} bold color={cH(pctCumplProy,85,65)}/>
              <Row2 label="Gap proyectado vs meta ($)" value={gapProy!=null?fD(gapProy):"—"} bold color={gapProy!=null&&gapProy>=0?C.green:C.red} bg={gapProy!=null&&gapProy>=0?"#f0fdf4":"#fef2f2"}/>
            </>)}
          </div>
          {dispCash>0&&(
            <div style={{padding:"0 10px 12px"}}>
              <Barz value={dispCash} max={metaMensual} color={cH(pctCumpl,85,60)} h={10} label={`${isPast?"Cash final":"Cash actual"}: ${fP(pctCumpl)}`} right={fD(dispCash)}/>
              {proyeccion&&<div style={{marginTop:6}}><Barz value={proyeccion} max={metaMensual} color={C.blue} h={5} label={`Proyección: ${fP(pctCumplProy)}`} right={fD(proyeccion)}/></div>}
            </div>
          )}
        </div>
      </div>

      {/* FUNNEL A HOY */}
      <div style={block}>
        <SectionTitle>{isPast?`Funnel del mes (cerrado) — Plan vs Real · ${dm}/${dm} días`:isFuture?`Funnel del mes (sin datos aún) — Plan vs Real · Día 0/${dm}`:`Funnel a hoy — Plan vs Real · Día ${day}/${dm} (${fP(pctTranscurrido*100,0)} transcurrido)`}</SectionTitle>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11}}>
            <thead>
              <tr style={{background:SURFACE2,borderBottom:`1px solid ${BORDER}`}}>
                {["Métrica",isCurrent?"Requerido a hoy":isPast?"Requerido mes":"Requerido (mes)",isCurrent?"Real a hoy":isPast?"Real mes":"Real","Gap","Estado"].map(h=>(
                  <th key={h} style={{padding:"9px 14px",color:TXT3,textAlign:h==="Métrica"?"left":"center",fontSize:8,letterSpacing:"0.1em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {funnelRows.map(r=>{
                const gap=r.real-r.req;
                const pctR=r.req>0?(r.real/r.req)*100:null;
                const fmt=v=>r.fmt==="$"?fD(v):fN(v);
                return(
                  <tr key={r.l} style={{borderBottom:`1px solid ${BORDER2}`}}>
                    <td style={{padding:"10px 14px",color:TXT,fontWeight:600}}>{r.l}</td>
                    <td style={{padding:"10px 14px",color:TXT2,textAlign:"center"}}>{fmt(r.req)}</td>
                    <td style={{padding:"10px 14px",color:TXT,fontWeight:700,textAlign:"center"}}>{fmt(r.real)}</td>
                    <td style={{padding:"10px 14px",color:gap>=0?C.green:C.red,fontWeight:700,textAlign:"center",background:gap>=0?"#f0fdf4":"#fef2f2"}}>
                      {gap>=0?"▲":"▼"} {fmt(Math.abs(gap))}
                    </td>
                    <td style={{padding:"10px 14px",textAlign:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
                        <div style={{background:"#ECEEEE",borderRadius:100,height:5,width:60,overflow:"hidden"}}>
                          <div style={{width:Math.min(100,pctR||0)+"%",height:"100%",background:cH(pctR,90,70)}}/>
                        </div>
                        <span style={{fontSize:10,color:cH(pctR,90,70),fontWeight:600}}>{fP(pctR,0)}</span>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* SALUD DEL EMBUDO + ADS */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>

        <div style={block}>
          <SectionTitle>Salud del embudo — Meta vs Real · Ticket promedio: {fD(ticketProm)}</SectionTitle>
          <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"'Hanken Grotesk',sans-serif",fontSize:11}}>
            <thead>
              <tr style={{background:SURFACE2,borderBottom:`1px solid ${BORDER}`}}>
                {["Métrica","Meta","Real","Estado"].map(h=>(
                  <th key={h} style={{padding:"8px 12px",color:TXT3,textAlign:h==="Métrica"?"left":"center",fontSize:8,letterSpacing:"0.1em",textTransform:"uppercase"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[
                {l:"% Leads → Agendadas",meta:pctLeadsAg,real:pctLeadsAgReal},
                {l:"% Agendadas → Asistidas",meta:pctAgAsis,real:pctAgAsisReal},
                {l:"Close Rate",meta:closeRateMeta,real:closeRateReal},
              ].map(r=>{
                const color=cH(r.real,r.meta*0.95,r.meta*0.75);
                return(
                  <tr key={r.l} style={{borderBottom:`1px solid ${BORDER2}`}}>
                    <td style={{padding:"9px 12px",color:TXT,fontWeight:600}}>{r.l}</td>
                    <td style={{padding:"9px 12px",color:TXT2,textAlign:"center"}}>{fP(r.meta)}</td>
                    <td style={{padding:"9px 12px",textAlign:"center",background:r.real!=null?(r.real>=r.meta*0.95?"#f0fdf4":"#fef2f2"):"transparent"}}>
                      <span style={{color,fontWeight:700}}>{fP(r.real)}</span>
                    </td>
                    <td style={{padding:"9px 12px",textAlign:"center"}}>
                      <div style={{background:"#ECEEEE",borderRadius:100,height:5,overflow:"hidden",width:50,margin:"0 auto"}}>
                        <div style={{width:Math.min(100,r.real||0)+"%",height:"100%",background:color}}/>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div style={block}>

  const metrics=[
    {l:"ROAS",v:fX(dv(rev,ads)),c:cH(dv(rev,ads),3.5,2.5),h:"Revenue/Ads"},
    {l:"CPL",v:fD(dv(ads,leads)),c:cL(dv(ads,leads),5,15),h:"Ads/Leads"},
    {l:"Costo/Agenda",v:fD(dv(ads,ag)),c:TXT2,h:"Ads/Agendas"},
    {l:"Costo/Show",v:fD(dv(ads,shows)),c:TXT2,h:"Ads/Shows"},

          <Inp label="Shows"      value={f.shows}    onChange={v=>onUpdate("shows",v)}/>

                  {i>0&&stages[i-1].v&&s.v&&<div style={{fontSize:8,color:TXT3,marginTop:2}}>{fP(pv(s.v,stages[i-1].v))} conv</div>}

    const prefix=`${y}-${String(mi+1).padStart(2,"0")}`;
    const entries=Object.entries(allDaily).filter(([k])=>k.startsWith(prefix)).map(([,v])=>v);
    return{key:ym,label:`${MONTHS[mi].substring(0,3)} ${y}`,
      rev:nv(d.funnel?.revenue),ads:nv(d.funnel?.adSpend),meta:nv(d.meta?.revenue),

                      {r.meta&&<div style={{width:"38%",height:mH,background:BORDER,borderRadius:"3px 3px 0 0",minHeight:2}}/>}

                    </div>
                    <div style={{fontSize:8,color:TXT3,textAlign:"center"}}>{r.label}</div>

            <div style={{display:"flex",gap:12,marginTop:4}}>
              <div style={{display:"flex",gap:4,alignItems:"center"}}><div style={{width:7,height:7,background:BORDER,borderRadius:2,border:`1px solid ${TXT3}`}}/><span style={{fontSize:8,color:TXT3}}>Meta</span></div>

// ─── DETALLE DIARIO ────────────────────────────────────────────────────────────
const DetalleView=({allDaily,allCloser,year,month})=>{
  const [cash,setCash]=useState(null);
  const dm=MDAYS[month];
  const pad=n=>String(n).padStart(2,"0");
  const mp=`${year}-${pad(month+1)}`;
  const DOW=["D","L","M","M","J","V","S"];
  const getDoW=d=>{const dt=new Date(d+"T12:00:00");return DOW[dt.getDay()];};
  const isWeekend=d=>{const dt=new Date(d+"T12:00:00");return dt.getDay()===0||dt.getDay()===6;};

  useEffect(()=>{
    let active=true;
    setCash(null);
    fetch(`/api/payments/summary?year=${year}&month=${month+1}`,{credentials:"same-origin"})
      .then(r=>r.ok?r.json():null)
      .then(j=>{if(active)setCash(j);})
      .catch(()=>{if(active)setCash({available:false});});
    return()=>{active=false;};
  },[year,month]);

  const cashGroups=(cash&&cash.available&&cash.groups)||{};
  const ledgerByDay={};
  const addLedger=(metric,rows)=>{(rows||[]).forEach(r=>{const d=localPayDate(r.paidAt);if(!d)return;ledgerByDay[d]=ledgerByDay[d]||{};ledgerByDay[d][metric]=(ledgerByDay[d][metric]||0)+(Number(r.amountUsd)||0);});};
  addLedger("cashCollected",cashGroups.cashCollected);
  addLedger("highTicket",cashGroups.highTicket);
  addLedger("lowTicket",cashGroups.lowTicket);
  addLedger("reservas",cashGroups.reservas);
  addLedger("reviewRequired",cashGroups.reviewRequired);

  const dayData=Array.from({length:dm},(_,i)=>{
    const d=`${mp}-${pad(i+1)}`;
    const entries=Object.entries(allDaily).filter(([k])=>k.startsWith(d+":")).map(([,v])=>v);
    // Actividad Marketing is manual and only Lucas Soria can report it.
    // Do not aggregate other setters/collaborators into Detalle Diario.
    const mktEntries=entries.filter(e=>e&&isMarketingActivityMember(e.member));
    const commercialEntries=entries.filter(e=>e&&isCommercialReportingMember(e.member,d));
    const highTicketCloserEntries=entries.filter(e=>e&&isHighTicketCloserReportingMember(e.member,d));
    const setterEntries=entries.filter(e=>e&&isSetterMember(e.member));
    const lowTicketEntries=setterEntries.filter(e=>e&&isLowTicketSetter(e.member));
    // Jan-Mar historical ad spend was imported as month totals. Keep those
    // Marketing Histórico rows out of daily cells, but allow Auto Ads daily
    // rows to remain visible. Total / Mes prioritizes the historical monthly
    // total when present, so the daily trace does not alter the official total.
    const dailyAdEntries=entries.filter(e=>!isMonthlyOnlyAdSpendEntry(e)&&!isCommercialMember(e.member));
    const closer=allCloser[d]||{};
    const ledger=ledgerByDay[d]||{};
    const allowCommercialFallback=d>="2026-06-01";
    const sd=f=>sumF(entries,f);
    const sdAds=f=>sumF(dailyAdEntries,f);
    const sdMkt=f=>sumF(mktEntries,f);
    const hasPrimaryCommercial=commercialDayHasPrimary(d,commercialEntries);
    const sdCommercial=f=>allowCommercialFallback?commercialDayValue(d,commercialEntries,f):0;
    const sdHighTicketCloser=f=>sumF(highTicketCloserEntries,f);
    const sdSetter=f=>sumF(setterEntries,f);
    const sdLowTicket=f=>sumF(lowTicketEntries,f);
    const totalGastoDay=sdAds("gastoMeta")+sdAds("gastoGoogle")+sdAds("gastoTikTok")+sdAds("gastoOtros");
    return{day:i+1,d,entries,mktEntries,commercialEntries,highTicketCloserEntries,setterEntries,lowTicketEntries,dailyAdEntries,closer,ledger,sd,sdAds,sdMkt,sdCommercial,sdHighTicketCloser,sdSetter,sdLowTicket,hasPrimaryCommercial,totalGastoDay};
  });

  const cellTxt=(v,fmt)=>{
    if(v===null||v===undefined||v===0)return null;
    if(fmt==="$")return fD(v);
    if(fmt==="%")return fP(v);
    return fN(v);
  };

  // Total / Mes must sum the visible daily cells for every non-% row. Only
  // percentage rows may use a monthly denominator formula via totFn.
  const rowTotalVal=(row)=>{
    if(row.fmt==="%"&&row.totFn) return row.totFn();
    if(row.fmt==="%"){
      const vals=dayData.map(d=>row.fn(d)).filter(v=>v!==null&&v!==undefined);
      return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
    }
    const t=dayData.reduce((s,d)=>{const v=row.fn(d);return s+(v||0);},0);
    return t||null;
  };

  // Monthly aggregates for cost calculations
  const mDailyGastoMeta=dayData.reduce((s,d)=>s+d.sdAds("gastoMeta"),0);
  const mDailyGastoGoogle=dayData.reduce((s,d)=>s+d.sdAds("gastoGoogle"),0);
  const mDailyGastoTikTok=dayData.reduce((s,d)=>s+d.sdAds("gastoTikTok"),0);
  const mDailyGastoOtros=dayData.reduce((s,d)=>s+d.sdAds("gastoOtros"),0);
  const mHistoricalGastoMeta=dayData.reduce((s,d)=>s+d.entries.filter(isHistoricalMonthlyAdSpendEntry).reduce((a,e)=>a+(nv(e.gastoMeta)||0),0),0);
  const mHistoricalGastoGoogle=dayData.reduce((s,d)=>s+d.entries.filter(isHistoricalMonthlyAdSpendEntry).reduce((a,e)=>a+(nv(e.gastoGoogle)||0),0),0);
  const mHistoricalGastoTikTok=dayData.reduce((s,d)=>s+d.entries.filter(isHistoricalMonthlyAdSpendEntry).reduce((a,e)=>a+(nv(e.gastoTikTok)||0),0),0);
  const mHistoricalGastoOtros=dayData.reduce((s,d)=>s+d.entries.filter(isHistoricalMonthlyAdSpendEntry).reduce((a,e)=>a+(nv(e.gastoOtros)||0),0),0);
  const hasHistoricalGasto=(mHistoricalGastoMeta+mHistoricalGastoGoogle+mHistoricalGastoTikTok+mHistoricalGastoOtros)>0;
  const mGastoMeta=hasHistoricalGasto?mHistoricalGastoMeta:mDailyGastoMeta;
  const mGastoGoogle=hasHistoricalGasto?mHistoricalGastoGoogle:mDailyGastoGoogle;
  const mGastoTikTok=hasHistoricalGasto?mHistoricalGastoTikTok:mDailyGastoTikTok;
  const mGastoOtros=hasHistoricalGasto?mHistoricalGastoOtros:mDailyGastoOtros;
  const mGastoTotal=mGastoMeta+mGastoGoogle+mGastoTikTok+mGastoOtros;
  const cv=(d,closerField,entryField)=>areaComercialHasPriority(d.d)?d.sdCommercial(entryField):d.closer[closerField]||d.sdCommercial(entryField)||0;
  const manualAgendasHoy=d=>d.sdHighTicketCloser("agendasHoy");
  const manualCalificadas=d=>d.sdHighTicketCloser("calificadas");
  const manualShowUps=d=>d.sdHighTicketCloser("showUps");
  const agTotal=d=>["organicas","meta","google","tiktok","otros"].reduce((s,c)=>s+(d.closer[`agendas_${c}`]||0),0);
  const mAgTotal=dayData.reduce((s,d)=>s+agTotal(d),0);
  const mAgMeta=dayData.reduce((s,d)=>s+(d.closer.agendas_meta||0),0);
  const mAgGoogle=dayData.reduce((s,d)=>s+(d.closer.agendas_google||0),0);
  const mAgTikTok=dayData.reduce((s,d)=>s+(d.closer.agendas_tiktok||0),0);
  const mAgOtros=dayData.reduce((s,d)=>s+(d.closer.agendas_otros||0),0);
  const mCalTotal=dayData.reduce((s,d)=>s+manualCalificadas(d),0);
  const mCalMeta=dayData.reduce((s,d)=>s+(d.closer.cal_meta||0),0);
  const mCalGoogle=dayData.reduce((s,d)=>s+(d.closer.cal_google||0),0);
  const mCalTikTok=dayData.reduce((s,d)=>s+(d.closer.cal_tiktok||0),0);
  const mCalOtros=dayData.reduce((s,d)=>s+(d.closer.cal_otros||0),0);
  const mHoyTotal=dayData.reduce((s,d)=>s+manualAgendasHoy(d),0);
  const mShows=dayData.reduce((s,d)=>s+manualShowUps(d),0);
  const mVentasHT=dayData.reduce((s,d)=>s+cv(d,"q_ventas_ht","ventasHT"),0);
  const valorHTDay=d=>areaComercialHasPriority(d.d)?d.sdCommercial("valorVentaHT"):d.closer.valor_venta_ht||d.sdCommercial("valorVentaHT")||0;
  const cashHTDay=d=>areaComercialHasPriority(d.d)?(d.sdCommercial("cashCollected")||d.sdCommercial("upfrontCash")):d.closer.ventas_cash||d.sdCommercial("cashCollected")||d.sdCommercial("upfrontCash")||d.ledger.highTicket||0;
  const recurringDay=d=>areaComercialHasPriority(d.d)?d.sdCommercial("recurringCash"):d.closer.recurring_cash||d.sdCommercial("recurringCash")||0;
  const cashLowTicketDay=d=>areaComercialHasPriority(d.d)?d.sdCommercial("valorVentaLT"):d.closer.valor_venta_lt||d.sdCommercial("valorVentaLT")||d.ledger.lowTicket||0;
  const cashReservasDay=d=>areaComercialHasPriority(d.d)?d.sdCommercial("cashReservas"):d.closer.cash_reservas||d.sdCommercial("cashReservas")||d.ledger.reservas||0;
  const mValorHT=dayData.reduce((s,d)=>s+valorHTDay(d),0);
  const mLedgerCash=dayData.reduce((s,d)=>s+(d.ledger.cashCollected||0),0);
  const mLedgerHT=dayData.reduce((s,d)=>s+(d.ledger.highTicket||0),0);
  const mLedgerLT=dayData.reduce((s,d)=>s+(d.ledger.lowTicket||0),0);
  const mLedgerReservas=dayData.reduce((s,d)=>s+(d.ledger.reservas||0),0);
  const mReservasCash=dayData.reduce((s,d)=>s+cashReservasDay(d),0);
  const mCashHT=dayData.reduce((s,d)=>s+cashHTDay(d),0);
  const mRecurring=dayData.reduce((s,d)=>s+recurringDay(d),0);

  const GROUPS=[
    {title:"Gasto Publicitario",bg:"#1e40af",rows:[
      {l:"$ Total Gasto",fn:d=>d.totalGastoDay||null,fmt:"$",totFn:()=>mGastoTotal||null},
      {l:"Meta",fn:d=>d.sdAds("gastoMeta")||null,fmt:"$",sub:true,totFn:()=>mGastoMeta||null},
      {l:"Google",fn:d=>d.sdAds("gastoGoogle")||null,fmt:"$",sub:true,totFn:()=>mGastoGoogle||null},
      {l:"TikTok",fn:d=>d.sdAds("gastoTikTok")||null,fmt:"$",sub:true,totFn:()=>mGastoTikTok||null},
      {l:"Otros",fn:d=>d.sdAds("gastoOtros")||null,fmt:"$",sub:true,totFn:()=>mGastoOtros||null},
    ]},
    {title:"Actividad Marketing",bg:"#6d28d9",rows:[
      {l:"# IG Seguidores",fn:d=>d.sdMkt("igFollowers")||null,fmt:"n"},
      {l:"# Posts + CTA",fn:d=>d.sdMkt("posts")||null,fmt:"n"},
      {l:"# Mensajes",fn:d=>d.sdMkt("mensajes")||null,fmt:"n"},
      {l:"# Follow Ups",fn:d=>d.sdMkt("followUps")||null,fmt:"n"},
      {l:"# Booking Offers",fn:d=>d.sdMkt("bkOffers")||null,fmt:"n"},
    ]},
    {title:"Actividad de llamadas — High Ticket",bg:"#0369a1",rows:[
      {l:"# Agendas hoy",fn:d=>d.sdHighTicketCloser("agendasHoy")||null,fmt:"n"},
      {l:"# Show Ups",fn:d=>d.sdHighTicketCloser("showUps")||null,fmt:"n"},
      {l:"# Follow Ups contactados",fn:d=>d.sdHighTicketCloser("followUps")||null,fmt:"n"},
      {l:"# Leads calientes",fn:d=>d.sdHighTicketCloser("pendAcumulados")||null,fmt:"n"},
    ]},
    {title:"Actividad de llamadas — Low Ticket",bg:"#0f766e",rows:[
      {l:"# Ventas",fn:d=>d.sdLowTicket("lowTicketVentas")||null,fmt:"n"},
      {l:"# Agendas hoy",fn:d=>d.sdLowTicket("lowTicketAgendasHoy")||null,fmt:"n"},
      {l:"# Show Ups",fn:d=>d.sdLowTicket("lowTicketShowUps")||null,fmt:"n"},
      {l:"# Follow Ups contactados",fn:d=>d.sdLowTicket("lowTicketFollowUps")||null,fmt:"n"},
    ]},
    {title:"Métricas Setter",bg:"#334155",rows:[
      {l:"# Nuevas Conversaciones del Día",fn:d=>d.sdSetter("setterNewConversations")||null,fmt:"n"},
      {l:"# Nuevos Inbound",fn:d=>d.sdSetter("setterNewInbound")||null,fmt:"n"},
      {l:"# Nuevos Outbound",fn:d=>d.sdSetter("setterNewOutbound")||null,fmt:"n"},
      {l:"# Respuestas de Outbound",fn:d=>d.sdSetter("setterOutboundReplies")||null,fmt:"n"},
      {l:"# Follow-ups",fn:d=>d.sdSetter("followUps")||null,fmt:"n"},
      {l:"# Llamadas Propuestas",fn:d=>d.sdSetter("setterCallsProposed")||null,fmt:"n"},
      {l:"# Links Enviados",fn:d=>d.sdSetter("setterLinksSent")||null,fmt:"n"},
    ]},
    {title:"Agendas / Leads High Ticket",bg:"#0f766e",rows:[
      {l:"Agendas Total",fn:d=>agTotal(d)||null,fmt:"n"},
      {l:"Orgánicas",fn:d=>d.closer.agendas_organicas||null,fmt:"n",sub:true},
      {l:"Meta",fn:d=>d.closer.agendas_meta||null,fmt:"n",sub:true},
      {l:"Google",fn:d=>d.closer.agendas_google||null,fmt:"n",sub:true},
      {l:"TikTok",fn:d=>d.closer.agendas_tiktok||null,fmt:"n",sub:true},
      {l:"Otros",fn:d=>d.closer.agendas_otros||null,fmt:"n",sub:true},
      {l:"Hoy (en agenda)",fn:d=>manualAgendasHoy(d)||null,fmt:"n"},
      {l:"Calificadas Total",fn:d=>manualCalificadas(d)||null,fmt:"n"},
      {l:"% Calificadas",fn:d=>{const h=manualAgendasHoy(d),c=manualCalificadas(d);return h>0?pv(c,h):null;},fmt:"%",
        totFn:()=>mHoyTotal>0?pv(mCalTotal,mHoyTotal):null},

// ─── DETALLE POR COLABORADOR ──────────────────────────────────────────────────
// Manual collaborator reporting center.
//   - Marketing role (Karen Anquiz, stored as "Karen"): IG / posts / mensajes /
//     follow ups / booking offers. Ad spend is automatic (sync job) and shown
//     read-only.
//   - Valentina Sanchez (stored as "Admin"): uses the same Area Comercial form
//     so this tab can eventually replace the standalone Area Comercial tab.
//   - Closer role (Carlos Velez, Daryi Perez, Juan Diego Afanador / Wiston
//     Quintero legacy): agendas, calificadas, agendas hoy, show ups, ventas HT,
//     $ venta HT, upfront/cash, recurring cash, follow ups, pendientes cierre
//     día anterior, pendientes cierre acumulados, reservas.
// Persists through onSave(`${date}:${memberId}`, entry) → daily_entries (the
// closer fields reuse the schema columns mapped in rowToEntry/saveEntry).
// Detalle Diario continues to aggregate daily_closer for commercial totals and
// filters commercial members out of its marketing rows so closer activity
// here does not inflate the marketing aggregates there.

const closerCanonId=m=>{
  if(!m)return m;
  const cl=COMMERCIAL_COLLABORATORS.find(c=>c.legacy===m);
  return cl?cl.id:m;
};
const commercialEntryAliases=m=>{
  const cl=COMMERCIAL_COLLABORATORS.find(c=>c.id===m||c.legacy===m);
  return cl?[cl.id,cl.legacy].filter(Boolean):[m].filter(Boolean);
};
const resolveDailyEntry=(allDaily,date,member)=>{
  const ids=commercialEntryAliases(member);
  for(const id of ids){
    const entry=allDaily[`${date}:${id}`];
    if(entry)return entry;
  }
  return null;
};

const DetalleColaborador=({allDaily,allCloser,year,month,onSave,onSaveCloser})=>{
  const [view,setView]=useState("llenar"); // llenar | tabla | dia
  const dm=MDAYS[month];
  const pad=n=>String(n).padStart(2,"0");
  const mp=`${year}-${pad(month+1)}`;

  const entriesByCollab={};
  MANUAL_COLLABORATORS.forEach(c=>{entriesByCollab[c.id]=[];});
  Object.entries(allDaily)
    .filter(([k])=>k.startsWith(mp+"-"))
    .forEach(([,v])=>{
      if(!v||!v.member)return;
      const cid=closerCanonId(v.member);
      if(entriesByCollab[cid])entriesByCollab[cid].push(v);
    });
  const valentinaCloserEntries=Object.entries(allCloser)
    .filter(([date])=>date.startsWith(mp+"-"))
    .map(([date,row])=>closerToValentinaEntry(date,row));
  if(valentinaCloserEntries.length){
    const closerDates=new Set(valentinaCloserEntries.map(e=>e.date));
    entriesByCollab.Admin=(entriesByCollab.Admin||[]).filter(e=>!closerDates.has(e.date));
    entriesByCollab.Admin.push(...valentinaCloserEntries);
  }

  const monthEntries=Object.entries(allDaily).filter(([k])=>k.startsWith(mp+"-")).map(([,v])=>v);
  const mGastoMeta=sumF(monthEntries,"gastoMeta");
  const mGastoGoogle=sumF(monthEntries,"gastoGoogle");
  const mGastoTikTok=sumF(monthEntries,"gastoTikTok");
  const mGastoOtros=sumF(monthEntries,"gastoOtros");
  const monthAdSpend={meta:mGastoMeta,google:mGastoGoogle,tiktok:mGastoTikTok,otros:mGastoOtros,
    total:mGastoMeta+mGastoGoogle+mGastoTikTok+mGastoOtros};

  const collabAgg=cid=>{
    const rows=entriesByCollab[cid]||[];
    const s=k=>sumF(rows,k);
    return{
      member:cid,days:rows.length,
      igFollowers:s("igFollowers"),posts:s("posts"),mensajes:s("mensajes"),
      followUps:s("followUps"),bkOffers:s("bkOffers"),
      agendas:s("agendas"),calificadas:s("calificadas"),agendasHoy:s("agendasHoy"),
      showUps:s("showUps"),
      ventasHT:s("ventasHT"),valorVentaHT:s("valorVentaHT"),
      upfrontCash:s("upfrontCash"),recurringCash:s("recurringCash"),
      pendDiaAnterior:s("pendDiaAnterior"),pendAcumulados:s("pendAcumulados"),
      reservas:s("reservas"),cashReservas:s("cashReservas"),
      setterNewConversations:s("setterNewConversations"),setterNewInbound:s("setterNewInbound"),
      setterNewOutbound:s("setterNewOutbound"),setterOutboundReplies:s("setterOutboundReplies"),
      setterCallsProposed:s("setterCallsProposed"),setterLinksSent:s("setterLinksSent"),
      callsScheduled:s("callsScheduled"),hotLeads:s("hotLeads"),
      outboundContactados:s("outboundContactados"),
      outboundAgendados:s("outboundAgendados"),
      setterLeadsContacted:s("setterLeadsContacted"),setterConfirmedAgendas:s("setterConfirmedAgendas"),
      setterCallsToLeads:s("setterCallsToLeads"),setterMessagesSent:s("setterMessagesSent"),
      setterOrganicLeads:s("setterOrganicLeads"),setterAdsLeads:s("setterAdsLeads"),
    };
  };

  const subBtn=v=>({background:view===v?TXT:"transparent",border:`1px solid ${view===v?TXT:BORDER}`,
    borderRadius:8,padding:"6px 14px",cursor:"pointer",color:view===v?"#fff":TXT2,
    fontSize:11,fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:view===v?700:400,outline:"none"});

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {[["llenar","Llenar reporte"],["tabla","Tabla mensual"],["dia","Detalle por día"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={subBtn(v)}>{l}</button>
        ))}
      </div>
      {view==="llenar"&&<LlenarReporte allDaily={allDaily} allCloser={allCloser} year={year} month={month} onSave={onSave} onSaveCloser={onSaveCloser} monthAdSpend={monthAdSpend}/>}
      {view==="tabla"&&<TablaMensual collabAgg={collabAgg} monthAdSpend={monthAdSpend} year={year} month={month}/>}
      {view==="dia"&&<DetallePorDia entriesByCollab={entriesByCollab} year={year} month={month} dm={dm} mp={mp} pad={pad}/>}
    </div>
  );
};

// ─── TABLA MENSUAL (KPI rows × collaborator columns) ──────────────────────────
const TablaMensual=({collabAgg,monthAdSpend,year,month})=>{
  const cellTxt=(v,fmt)=>{
    if(v===null||v===undefined||v===0||(typeof v==="number"&&isNaN(v)))return null;
    if(fmt==="$")return fD(v);
    if(fmt==="%")return fP(v);
    return fN(v);
  };
  const HDR_BG=IS_DARK?"#0D1526":"#1e293b";
  const HDR_TXT="#f1f5f9";
  const thBase={padding:"5px 6px",textAlign:"center",fontSize:9,fontWeight:700,
    fontFamily:"'Hanken Grotesk',sans-serif",borderRight:`1px solid rgba(255,255,255,0.1)`};
  const tdBase={padding:"4px 8px",textAlign:"right",fontSize:10,fontFamily:"'Hanken Grotesk',sans-serif",
    borderRight:`1px solid ${BORDER2}`,borderBottom:`1px solid ${BORDER2}`,height:23};
  const stickyCol={position:"sticky",left:0,zIndex:2};

  const aggByCollab={};
  MANUAL_COLLABORATORS.forEach(c=>{aggByCollab[c.id]=collabAgg(c.id);});
  const setterCols=SETTER_COLLABORATORS;
  const closerCols=COMMERCIAL_COLLABORATORS;
  const allCols=[...setterCols,...closerCols];

  const sumCloser=k=>closerCols.reduce((s,c)=>s+(aggByCollab[c.id][k]||0),0);
  const sumSetter=k=>setterCols.reduce((s,c)=>s+(aggByCollab[c.id][k]||0),0);

  const SECTIONS=[
    {title:"Reporte de Setter",bg:"#7c3aed",role:"setter",rows:[
      {l:"Leads contactados",k:"setterLeadsContacted",fmt:"n"},
      {l:"Agendas confirmadas",k:"setterConfirmedAgendas",fmt:"n"},
      {l:"Llamadas a leads",k:"setterCallsToLeads",fmt:"n"},
      {l:"Mensajes enviados",k:"setterMessagesSent",fmt:"n"},
      {l:"Orgánicos",k:"setterOrganicLeads",fmt:"n"},
      {l:"Ads",k:"setterAdsLeads",fmt:"n"},
    ]},
    {title:"Métricas Setter",bg:"#334155",role:"setter",rows:[
      {l:"# Nuevas Conversaciones del Día",k:"setterNewConversations",fmt:"n"},
      {l:"# Nuevos Inbound",k:"setterNewInbound",fmt:"n"},
      {l:"# Nuevos Outbound",k:"setterNewOutbound",fmt:"n"},
      {l:"# Respuestas de Outbound",k:"setterOutboundReplies",fmt:"n"},
      {l:"# Follow-ups",k:"followUps",fmt:"n"},
      {l:"# Llamadas Propuestas",k:"setterCallsProposed",fmt:"n"},
      {l:"# Links Enviados",k:"setterLinksSent",fmt:"n"},
    ]},
    {title:"Actividad de llamadas",bg:"#0369a1",role:"closer",rows:[
      {l:"# Agendas hoy",k:"agendasHoy",fmt:"n"},
      {l:"# Show Ups",k:"showUps",fmt:"n"},
      {l:"# Follow Ups contactados",k:"followUps",fmt:"n"},
      {l:"# Leads calientes",k:"pendAcumulados",fmt:"n"},
    ]},
    {title:"Agendas / Leads",bg:"#0f766e",role:"closer",rows:[
      {l:"# Agendas hoy",k:"agendasHoy",fmt:"n"},
      {l:"# Calificadas / Agendas Confirmadas",k:"calificadas",fmt:"n"},
      {l:"# Show Ups",k:"showUps",fmt:"n"},
      {l:"# No Show",k:"agendas",fmt:"n"},
    ]},
    {title:"Ventas — Área Comercial",bg:"#c2410c",role:"closer",rows:[
      {l:"# Ventas HT",k:"ventasHT",fmt:"n"},
      {l:"$ Venta HT",k:"valorVentaHT",fmt:"$"},
      {l:"Cash Collected",k:"upfrontCash",fmt:"$"},
      {l:"Recurring Cash",k:"recurringCash",fmt:"$"},
      {l:"# Follow Ups",k:"followUps",fmt:"n"},
      {l:"Pendientes cierre día anterior",k:"pendDiaAnterior",fmt:"n"},
      {l:"Pendientes cierre acumulados",k:"pendAcumulados",fmt:"n"},
      {l:"# Reservas",k:"reservas",fmt:"n"},
      {l:"$ Cash Reservas",k:"cashReservas",fmt:"$"},
    ]},
    {title:"Otros",bg:"#334155",role:"closer",rows:[
      {l:"# Outbound contactados",k:"outboundContactados",fmt:"n"},
      {l:"# Outbound agendados",k:"outboundAgendados",fmt:"n"},
    ]},
  ];

  const ADS_ROWS=[
    {l:"$ Total Gasto",v:monthAdSpend.total,fmt:"$"},
    {l:"Meta",v:monthAdSpend.meta,fmt:"$",sub:true},
    {l:"Google",v:monthAdSpend.google,fmt:"$",sub:true},
    {l:"TikTok",v:monthAdSpend.tiktok,fmt:"$",sub:true},
    {l:"Otros",v:monthAdSpend.otros,fmt:"$",sub:true},
  ];
  const totalAgendas=sumCloser("agendas");
  const totalCal=sumCloser("calificadas");
  const COSTS_ROWS=[
    {l:"CPL (Costo / Agenda)",v:totalAgendas>0?monthAdSpend.total/totalAgendas:null,fmt:"$"},
    {l:"CP Calificada",v:totalCal>0?monthAdSpend.total/totalCal:null,fmt:"$"},
  ];

  return(
    <div>
      <div style={{fontSize:11,color:TXT2,fontFamily:"'Hanken Grotesk',sans-serif",marginBottom:8,padding:"0 2px"}}>
        {MONTHS[month]} {year} · {allCols.length} colaboradores · acumulado mensual manual
      </div>
      <div style={{overflow:"auto",borderRadius:10,border:`1px solid ${BORDER}`,background:SURFACE,
        height:"calc(100vh - 200px)"}}>
        <table style={{borderCollapse:"separate",borderSpacing:0,minWidth:"100%"}}>

                KPI
              </th>
              {allCols.map(c=>{
                const agg=aggByCollab[c.id];
                return(
                  <th key={c.id} style={{...thBase,background:HDR_BG,color:HDR_TXT,minWidth:120,padding:"8px 8px"}}>

                      <span style={{width:7,height:7,borderRadius:100,background:c.color,display:"inline-block"}}/>
                      <span>{c.label}</span>
                    </div>
                    <div style={{opacity:0.55,fontSize:8,fontWeight:500,marginTop:2}}>
                      {c.displayRole||c.role} · {agg.days} días
                    </div>
                  </th>
                );
              })}
              <th style={{...thBase,background:BRAND,color:"#fff",minWidth:110,
                borderLeft:`2px solid ${BORDER}`,padding:"8px 8px"}}>
                Total / Mes
              </th>
            </tr>
          </thead>
          <tbody>
            {SECTIONS.map(g=>(
              <React.Fragment key={g.title}>
                <tr>
                  <td colSpan={allCols.length+2} style={{background:g.bg,color:"#fff",padding:"5px 10px",
                    fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",
                    fontFamily:"'Hanken Grotesk',sans-serif",position:"sticky",left:0,zIndex:3}}>
                    {g.title}
                  </td>
                </tr>
                {g.rows.map(row=>{
                  const includeCol=c=>g.role===c.role;
                  const tot=g.role==="setter"?(sumSetter(row.k)||null):(sumCloser(row.k)||null);
                  return(
                    <tr key={row.l}>
                      <td style={{...tdBase,...stickyCol,textAlign:"left",
                        paddingLeft:row.sub?20:10,
                        color:row.sub?TXT2:TXT,
                        fontWeight:row.sub?400:600,
                        fontSize:row.sub?9:10,
                        background:SURFACE,
                        borderRight:`2px solid ${BORDER}`,
                        fontFamily:"'Hanken Grotesk',sans-serif",
                        whiteSpace:"nowrap"}}>
                        {row.l}
                      </td>
                      {allCols.map(c=>{
                        if(!includeCol(c))return(
                          <td key={c.id} style={{...tdBase,background:SURFACE,color:TXT3}}>—</td>
                        );
                        const v=aggByCollab[c.id][row.k];
                        const txt=cellTxt(v,row.fmt);
                        return(
                          <td key={c.id} style={{...tdBase,background:SURFACE,color:txt?TXT:TXT3}}>
                            {txt||"·"}

                      })}
                      <td style={{...tdBase,background:SURFACE2,
                        color:tot?TXT:TXT3,fontWeight:700,
                        borderLeft:`2px solid ${BORDER}`,textAlign:"right"}}>
                        {cellTxt(tot,row.fmt)||"—"}
                      </td>
                    </tr>
                  );
                })}
              </React.Fragment>
            ))}

            <tr>
              <td colSpan={allCols.length+2} style={{background:"#1e40af",color:"#fff",padding:"5px 10px",
                fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",
                fontFamily:"'Hanken Grotesk',sans-serif",position:"sticky",left:0,zIndex:3}}>
                Gasto Publicitario (automático · total mes)
              </td>
            </tr>
            {ADS_ROWS.map(row=>(
              <tr key={row.l}>
                <td style={{...tdBase,...stickyCol,textAlign:"left",
                  paddingLeft:row.sub?20:10,
                  color:row.sub?TXT2:TXT,
                  fontWeight:row.sub?400:600,
                  fontSize:row.sub?9:10,
                  background:SURFACE,
                  borderRight:`2px solid ${BORDER}`,
                  fontFamily:"'Hanken Grotesk',sans-serif",
                  whiteSpace:"nowrap"}}>
                  {row.l}

                {allCols.map(c=>(
                  <td key={c.id} style={{...tdBase,background:SURFACE,color:TXT3}}>—</td>
                ))}
                <td style={{...tdBase,background:SURFACE2,
                  color:row.v?TXT:TXT3,fontWeight:700,
                  borderLeft:`2px solid ${BORDER}`,textAlign:"right"}}>
                  {cellTxt(row.v,row.fmt)||"—"}
                </td>
              </tr>
            ))}

            <tr>
              <td colSpan={allCols.length+2} style={{background:"#92400e",color:"#fff",padding:"5px 10px",
                fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",
                fontFamily:"'Hanken Grotesk',sans-serif",position:"sticky",left:0,zIndex:3}}>
                Costos por Lead (automático · total mes)
              </td>
            </tr>
            {COSTS_ROWS.map(row=>(
              <tr key={row.l}>
                <td style={{...tdBase,...stickyCol,textAlign:"left",

// ─── DETALLE POR DÍA (collaborator-specific day-by-day KPIs) ──────────────────
const DetallePorDia=({entriesByCollab,year,month,dm,mp,pad})=>{
  const [picked,setPicked]=useState(MANUAL_COLLABORATORS[0].id);
  const collab=MANUAL_COLLABORATORS.find(c=>c.id===picked)||MANUAL_COLLABORATORS[0];
  const role=collab.role;

  const rowsM=entriesByCollab[picked]||[];
  const byDate={};
  rowsM.forEach(e=>{if(e&&e.date)byDate[e.date]=e;});
  const days=Array.from({length:dm},(_,i)=>{
    const d=`${mp}-${pad(i+1)}`;
    return{day:i+1,d,e:byDate[d]||null};
  });

  const DOW=["D","L","M","M","J","V","S"];
  const getDoW=d=>{const dt=new Date(d+"T12:00:00");return DOW[dt.getDay()];};
  const isWeekend=d=>{const dt=new Date(d+"T12:00:00");return dt.getDay()===0||dt.getDay()===6;};
  const WKD_BG=IS_DARK?"#0A1020":SURFACE2;

  const cellTxt=(v,fmt)=>{
    if(v===null||v===undefined||v===0||(typeof v==="number"&&isNaN(v)))return null;
    if(fmt==="$")return fD(v);

    {title:"Ventas — Área Comercial",bg:"#c2410c",rows:[

      {l:"$ Venta HT",fn:d=>d.e?d.e.valorVentaHT:0,fmt:"$"},
      {l:"Cash Collected",fn:d=>d.e?d.e.upfrontCash:0,fmt:"$"},
      {l:"Recurring Cash",fn:d=>d.e?d.e.recurringCash:0,fmt:"$"},

      {l:"Pend. cierre día anterior",fn:d=>d.e?d.e.pendDiaAnterior:0,fmt:"n"},
      {l:"Pend. cierre acumulados",fn:d=>d.e?d.e.pendAcumulados:0,fmt:"n"},
      {l:"# Reservas",fn:d=>d.e?d.e.reservas:0,fmt:"n"},
      {l:"$ Cash Reservas",fn:d=>d.e?d.e.cashReservas:0,fmt:"$"},
    ]},
    {title:"Otros",bg:"#334155",rows:[
      {l:"# Outbound contactados",fn:d=>d.e?d.e.outboundContactados:0,fmt:"n"},
      {l:"# Outbound agendados",fn:d=>d.e?d.e.outboundAgendados:0,fmt:"n"},
    ]},
  ];
  const SETTER_ROWS=[
    {title:"Métricas Setter",bg:"#334155",rows:[
      {l:"# Nuevas Conversaciones del Día",fn:d=>d.e?d.e.setterNewConversations:0,fmt:"n"},
      {l:"# Nuevos Inbound",fn:d=>d.e?d.e.setterNewInbound:0,fmt:"n"},
      {l:"# Nuevos Outbound",fn:d=>d.e?d.e.setterNewOutbound:0,fmt:"n"},
      {l:"# Respuestas de Outbound",fn:d=>d.e?d.e.setterOutboundReplies:0,fmt:"n"},
      {l:"# Follow-ups",fn:d=>d.e?d.e.followUps:0,fmt:"n"},
      {l:"# Llamadas Propuestas",fn:d=>d.e?d.e.setterCallsProposed:0,fmt:"n"},
      {l:"# Links Enviados",fn:d=>d.e?d.e.setterLinksSent:0,fmt:"n"},
    ]},
  ];
  const ROWS=role==="marketing"?MARKETING_ROWS:(role==="setter"?SETTER_ROWS:CLOSER_ROWS);
  const totForRow=row=>days.reduce((s,d)=>s+(row.fn(d)||0),0)||null;

  const HDR_BG=IS_DARK?"#0D1526":"#1e293b";
  const HDR_TXT="#f1f5f9";
  const thBase={padding:"5px 6px",textAlign:"center",fontSize:9,fontWeight:700,

    borderRight:`1px solid ${BORDER2}`,borderBottom:`1px solid ${BORDER2}`,height:23};
  const stickyCol={position:"sticky",left:0,zIndex:2};

  return(
    <div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:10,color:TXT3,letterSpacing:"0.13em",textTransform:"uppercase",
          fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,marginRight:4}}>Colaborador</span>
        {MANUAL_COLLABORATORS.map(c=>{
          const sel=picked===c.id;
          return(<button key={c.id} onClick={()=>setPicked(c.id)} style={{
            background:sel?c.color+"18":SURFACE2,border:`1.5px solid ${sel?c.color:BORDER}`,
            borderRadius:8,padding:"5px 12px",cursor:"pointer",color:sel?c.color:TXT2,

        {collab.label} · {MONTHS[month]} {year} · {rowsM.length} días con registro
      </div>
      <div style={{overflow:"auto",borderRadius:10,border:`1px solid ${BORDER}`,background:SURFACE,
        height:"calc(100vh - 220px)"}}>
        <table style={{borderCollapse:"separate",borderSpacing:0,minWidth:"100%"}}>
          <thead style={{position:"sticky",top:0,zIndex:10}}>
            <tr>
              <th style={{...thBase,...stickyCol,background:HDR_BG,color:HDR_TXT,textAlign:"left",
                padding:"8px 10px",minWidth:175,zIndex:11,borderRight:`2px solid ${BORDER}`}}>
                KPI
              </th>
              {days.map(d=>(
                <th key={d.day} style={{...thBase,
                  background:isWeekend(d.d)?WKD_BG:HDR_BG,

              <th style={{...thBase,background:BRAND,color:"#fff",minWidth:80,
                borderLeft:`2px solid ${BORDER}`}}>
                Total / Mes
              </th>
            </tr>
          </thead>
          <tbody>
            {ROWS.map(g=>(
              <React.Fragment key={g.title}>
                <tr>
                  <td colSpan={dm+2} style={{background:g.bg,color:"#fff",padding:"5px 10px",
                    fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",
                    fontFamily:"'Hanken Grotesk',sans-serif",position:"sticky",left:0,zIndex:3}}>
                    {g.title}
                  </td>
                </tr>
                {g.rows.map(row=>{
                  const tot=totForRow(row);
                  return(
                    <tr key={row.l}>
                      <td style={{...tdBase,...stickyCol,textAlign:"left",

                        fontFamily:"'Hanken Grotesk',sans-serif",
                        whiteSpace:"nowrap"}}>
                        {row.l}
                      </td>
                      {days.map(d=>{
                        const v=row.fn(d);
                        const txt=cellTxt(v,row.fmt);
                        return(
                          <td key={d.day} style={{...tdBase,
                            background:isWeekend(d.d)?WKD_BG:SURFACE,
                            color:txt?TXT:TXT3,fontSize:9}}>

                          </td>

                      })}
                      <td style={{...tdBase,background:SURFACE2,
                        color:tot?TXT:TXT3,fontWeight:700,
