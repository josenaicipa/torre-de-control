      </div>
    </div>
  );
};
// ─── CONTROL COMERCIAL (audit-only — does NOT write to GHL) ────────────────
const ControlComercial=()=>{
  const [date,setDate]=useState(today());
  const [pipeline,setPipeline]=useState(null);
  const [loading,setLoading]=useState(true);
  const [loadError,setLoadError]=useState(null);
  const [saving,setSaving]=useState(false);
  const [savedFlag,setSavedFlag]=useState(false);
  const [activeItemId,setActiveItemId]=useState(null);
  const [syncGhl,setSyncGhl]=useState(true);
  const [syncStatus,setSyncStatus]=useState(null);
  const [showAllGhlNotes,setShowAllGhlNotes]=useState(false);
  const [form,setForm]=useState({
    lead:"",closer:COMERCIAL_CLOSERS[0],appointmentAt:"",
    outcome:normalizeComercialOutcome(""),nextAction:"",followUpAt:"",note:"",
  });
  const sf=(k,v)=>setForm(p=>({...p,[k]:v}));

  const loadPipeline=async(d)=>{
    setLoading(true);
    try{
      const r=await fetch(`${CONTROL_PIPELINE_URL}?date=${encodeURIComponent(d||date)}`,{method:"GET"});
      if(!r.ok)throw new Error("HTTP "+r.status);
      const j=await r.json();
      if(!j.ok)throw new Error(j.error||"API error");
      setPipeline(j);
      setLoadError(null);
    }catch(e){
      setLoadError("No se pudo conectar al pipeline. ("+(e.message||"error")+")");
      setPipeline(null);
    }
    setLoading(false);
  };

  useEffect(()=>{loadPipeline(date);/* eslint-disable-next-line */},[date]);

  const openUpdate=item=>{
    setActiveItemId(item.id);
    setShowAllGhlNotes(false);
    setForm({
      lead:item.lead||"",
      closer:item.closer||COMERCIAL_CLOSERS[0],
      appointmentAt:item.appointmentAt||"",
      outcome:normalizeComercialOutcome(item.outcome||""),
      nextAction:item.nextAction||"",
      followUpAt:item.followUpAt?String(item.followUpAt).slice(0,10):"",
      note:item.note||"",
    });
  };
  const closeUpdate=()=>{setActiveItemId(null);setShowAllGhlNotes(false);};

  const handleSave=async()=>{
    if(!form.lead.trim()){alert("Falta el lead/cliente");return;}
    setSaving(true);
    setSyncStatus(null);
    const activeNow=activeItemId?(pipeline&&Array.isArray(pipeline.items)?pipeline.items.find(it=>it.id===activeItemId):null):null;
    const currentStageNow=activeNow?(activeNow.stage||(activeNow.pipelineStage!==activeNow.bucket?activeNow.pipelineStage:"")||activeNow.ghlStatus||""):"";
    const followUpAtIso=form.followUpAt?`${form.followUpAt}T09:00:00`:null;
    const payload={
      date,
      appointmentAt:form.appointmentAt||null,
      lead:form.lead.trim(),
      closer:form.closer,
      outcome:form.outcome,
      nextAction:form.nextAction.trim(),
      followUpAt:followUpAtIso,
      note:form.note.trim(),
      source:"dashboard",
      contactId:(activeNow&&activeNow.contactId)||null,
      opportunityId:(activeNow&&activeNow.opportunityId)||null,
      email:(activeNow&&activeNow.email)||null,
      phone:(activeNow&&activeNow.phone)||null,
      currentStage:currentStageNow||null,
    };
    try{
      const r=await fetch(CONTROL_NOTES_URL,{
        method:"POST",
        headers:{"content-type":"application/json"},
        body:JSON.stringify(payload),
      });
      if(!r.ok)throw new Error("HTTP "+r.status);
      const j=await r.json();
      if(!j.ok)throw new Error("API error");
      setSavedFlag(true);
      // Sync to GHL after internal save (best-effort, never fails the save).
      if(syncGhl && activeNow && activeNow.contactId){
        try{
          const token=(typeof localStorage!=="undefined"
            ?(localStorage.getItem("unlocked_admin_token")
              ||localStorage.getItem("commercial_control_sync_token")
              ||"")
            :"");
          const syncHeaders={"content-type":"application/json"};
          if(token)syncHeaders["X-Unlocked-Dashboard-Admin-Token"]=token;
          const syncPayload={
            contactId:activeNow.contactId,
            opportunityId:activeNow.opportunityId||null,
            lead:payload.lead,
            closer:payload.closer,
            outcome:payload.outcome,
            nextAction:payload.nextAction,
            followUpAt:payload.followUpAt,
            note:payload.note,
            date:payload.date,
            appointmentAt:payload.appointmentAt,
            currentStage:payload.currentStage,
          };
          const sr=await fetch(CONTROL_SYNC_URL,{
            method:"POST",
            headers:syncHeaders,
            body:JSON.stringify(syncPayload),
          });
          if(sr.status===401){
            setSyncStatus({kind:"warn",msg:"Guardado interno OK · GHL necesita token de sync."});
          }else if(sr.status===503){
            setSyncStatus({kind:"warn",msg:"Guardado interno OK · GHL no configurado en servidor."});
          }else if(!sr.ok){
            setSyncStatus({kind:"warn",msg:"Guardado interno OK · GHL respondió "+sr.status+"."});
          }else{
            const sj=await sr.json().catch(()=>({ok:false}));
            if(sj&&sj.ok){
              const oks=(Array.isArray(sj.actions)?sj.actions:[]).filter(a=>a&&a.ok).map(a=>a.kind);
              setSyncStatus({kind:"ok",msg:oks.length?("GHL sincronizado: "+oks.join(", ")):"GHL: nada que sincronizar."});
            }else{
              setSyncStatus({kind:"warn",msg:"Guardado interno OK · GHL no aceptó la sincronización."});
            }
          }
        }catch(_){
          setSyncStatus({kind:"warn",msg:"Guardado interno OK · no se pudo contactar al sync de GHL."});
        }
      }else if(syncGhl && activeNow && !activeNow.contactId){
        setSyncStatus({kind:"warn",msg:"Guardado interno OK · sin contactId para sincronizar."});
      }
      setActiveItemId(null);
      await loadPipeline(date);
      setTimeout(()=>setSavedFlag(false),2200);
    }catch(e){
      alert("Error guardando: "+(e.message||"error"));
    }
    setSaving(false);
  };

  const fmtTime=iso=>{
    if(!iso)return "—";
    const m=String(iso).match(/T(\d{2}):(\d{2})/)||String(iso).match(/\s(\d{2}):(\d{2})/);
    return m?`${m[1]}:${m[2]}`:"—";
  };
  const fmtDate=iso=>{
    if(!iso)return "—";
    return String(iso).slice(0,10)||"—";
  };
  const bucketMeta=k=>COMERCIAL_BUCKETS.find(b=>b.k===k)||COMERCIAL_BUCKETS[0];
  const outcomeColor=v=>(COMERCIAL_OUTCOMES.find(o=>o.v===v)||{}).c||"#64748B";

  const items=(pipeline&&Array.isArray(pipeline.items))?pipeline.items:[];
  const stats=(pipeline&&pipeline.stats)||{
    total:0,porAtender:0,atendidos:0,pendientes:0,followUp:0,
    hot:0,noShow:0,cerrados:0,sinProximaAccion:0,
  };
  const closers=(pipeline&&Array.isArray(pipeline.closers))?pipeline.closers:[];
  const source=(pipeline&&pipeline.source)||{agenda:"manual-only",fresh:false,warnings:[]};

  const byBucket=COMERCIAL_BUCKETS.reduce((acc,b)=>{acc[b.k]=[];return acc;},{});
  items.forEach(it=>{
    const k=byBucket[it.bucket]?it.bucket:"por_atender";
    byBucket[k].push(it);
  });

  const activeItem=activeItemId?items.find(it=>it.id===activeItemId)||null:null;
  const activePipelineStage=activeItem&&activeItem.pipelineStage!==activeItem.bucket?activeItem.pipelineStage:"";
  const activeStage=activeItem?(activeItem.stage||activePipelineStage||activeItem.ghlStatus||""):"";

  const fieldBox={background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:9,
    color:TXT,padding:"9px 11px",fontSize:13,outline:"none",
    fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:500,height:38,width:"100%"};

  const renderItemCard=(it)=>{
    const meta=bucketMeta(it.bucket);
    const noNext=!it.nextAction||!String(it.nextAction).trim();
    const hasRisk=Array.isArray(it.riskFlags)&&it.riskFlags.length>0;
    const tempBadge=it.temperature==="HOT"?{c:C.red,label:"HOT"}:
      it.temperature==="WARM"?{c:C.amber,label:"WARM"}:null;
    return(
      <div key={it.id} className="cc-pipeline-card" style={{background:SURFACE2,border:`1px solid ${BORDER}`,
        borderRadius:10,padding:"10px 12px 10px 16px",position:"relative",overflow:"hidden",flexShrink:0}}>
        <div className="cc-pipeline-card-rail" style={{position:"absolute",left:0,top:0,bottom:0,width:1,background:meta.c}}/>
        <div className="cc-pipeline-card-head" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>
          <div className="cc-pipeline-card-headinfo" style={{display:"flex",alignItems:"center",gap:8,minWidth:0,flexWrap:"wrap"}}>
            <span className="cc-pipeline-time" style={{fontSize:12,fontWeight:700,color:TXT,fontFamily:"'Hanken Grotesk',sans-serif"}}>{fmtTime(it.appointmentAt)}</span>
            <span className="cc-pipeline-lead-name" style={{fontSize:13,fontWeight:600,color:TXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:180}} title={it.lead}>{it.lead||"—"}</span>
            {tempBadge&&<span style={{fontSize:9,fontWeight:800,letterSpacing:"0.08em",
              color:tempBadge.c,background:tempBadge.c+"18",border:`1px solid ${tempBadge.c}40`,
              padding:"2px 6px",borderRadius:6}}>{tempBadge.label}</span>}
          </div>
          <button className="cc-pipeline-card-actualizar" onClick={()=>openUpdate(it)} style={{background:BRAND+"15",
            border:`1px solid ${BRAND}40`,borderRadius:7,padding:"3px 9px",fontSize:10,
            cursor:"pointer",color:BRAND,fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:700,whiteSpace:"nowrap"}}>
            Actualizar
          </button>
        </div>
        <div className="cc-pipeline-card-meta" style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:TXT3,marginBottom:6,flexWrap:"wrap"}}>
          <span style={{fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,color:TXT2}}>{it.closer||"Sin asignar"}</span>
          {it.ghlStatus&&<><span>•</span><span>{it.ghlStatus}</span></>}
          {it.stage&&it.stage!==it.ghlStatus&&<><span>•</span><span title={it.stage}>{String(it.stage).slice(0,18)}</span></>}
          {it.automationSource==="manual"&&<><span>•</span><span style={{color:C.amber,fontWeight:700}}>MANUAL</span></>}
        </div>
        {(it.outcome||it.nextAction||it.followUpAt||it.note)&&(
          <div style={{paddingTop:6,borderTop:`1px dashed ${BORDER}`,display:"flex",flexDirection:"column",gap:4}}>
            {it.outcome&&<div style={{fontSize:11,fontWeight:700,color:outcomeColor(it.outcome)}}>{it.outcome}</div>}
            {it.nextAction&&<div style={{fontSize:11,color:TXT}}>→ {it.nextAction}</div>}
            {it.followUpAt&&<div style={{fontSize:10,color:TXT2,fontFamily:"'Hanken Grotesk',sans-serif"}}>Follow-up: {fmtDate(it.followUpAt)}</div>}
            {it.note&&<div style={{fontSize:10,color:TXT2,lineHeight:1.45,whiteSpace:"pre-wrap"}}>{it.note}</div>}
          </div>
        )}
        {hasRisk&&(
          <div style={{marginTop:6,fontSize:10,fontWeight:700,color:C.red,letterSpacing:"0.04em"}}>
            ⚠ {it.riskFlags.join(" · ")}
          </div>
        )}
        {!hasRisk&&noNext&&(it.bucket==="atendido"||it.bucket==="follow_up"||it.bucket==="no_show")&&(
          <div style={{marginTop:6,fontSize:10,fontWeight:700,color:C.amber}}>
            ⚠ Falta próxima acción
          </div>
        )}
      </div>
    );
  };

  const sourceBadge=(()=>{
    if(source.agenda==="appointments")return{c:C.green,label:"GHL agenda en vivo"};
    if(source.agenda==="crm-calls-fallback")return{c:C.amber,label:"Fallback: CRM calls"};
    return{c:C.red,label:"Solo notas manuales"};
  })();

  return(
    <div className="cc-control" style={{display:"flex",flexDirection:"column",gap:14}}>

      {/* Concept banner */}
      <Card style={{borderColor:BRAND+"55",background:BRAND+"08"}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
          <div style={{width:30,height:30,borderRadius:8,background:BRAND+"22",
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Icon name="clipboardCheck" size={14} color={BRAND}/>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:BRAND,letterSpacing:"-0.01em",marginBottom:3}}>
              Pipeline operativo del día
            </div>
            <div style={{fontSize:11,color:TXT2,lineHeight:1.55}}>
              GHL alimenta la cola; el closer confirma resultado y próximo paso. <b>Puede sincronizar nota/tarea/etapa con GHL cuando está activado.</b> Esto es la capa operativa diaria — no es Excel.
            </div>
          </div>
        </div>
      </Card>

      {/* Controls bar */}
      <Card>
        <div className="cc-controls-bar" style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <Lbl>Fecha operativa</Lbl>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)}
                style={{...fieldBox,width:170}}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <Lbl>Fuente</Lbl>
              <span style={{fontSize:11,fontWeight:700,color:sourceBadge.c,
                background:sourceBadge.c+"15",border:`1px solid ${sourceBadge.c}40`,
                padding:"7px 11px",borderRadius:8}}>
                {sourceBadge.label}{source.fresh?"":" · stale"}
              </span>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
            <button onClick={()=>loadPipeline(date)} disabled={loading} style={{
              background:"transparent",border:`1px solid ${BORDER}`,borderRadius:10,
              padding:"9px 16px",fontWeight:600,fontSize:12,cursor:"pointer",
              color:TXT2,fontFamily:"'Hanken Grotesk',sans-serif",opacity:loading?0.5:1}}>
              ↻ {loading?"Cargando...":"Refrescar"}
            </button>
            {savedFlag&&<div style={{fontSize:11,color:C.green,fontWeight:700}}>✓ Guardado</div>}

              <div style={{fontSize:11,fontWeight:700,

                  <span style={{fontSize:9,color:TXT3,fontFamily:"'Hanken Grotesk',sans-serif"}}>solo lectura</span>

            </div>
            );
          })()}
          <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:10}}>

              style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:9,

              <span style={{display:"flex",flexDirection:"column",gap:1}}>
                <span style={{fontSize:12,fontWeight:700,color:TXT}}>Sincronizar con GHL</span>
                <span style={{fontSize:10,color:TXT3,lineHeight:1.35}}>
                  crea nota/tarea y mueve etapa cuando aplique

              </span>
            </label>
            {syncStatus&&(
              <div style={{fontSize:11,fontWeight:700,
                color:syncStatus.kind==="ok"?C.green:C.amber,
                background:(syncStatus.kind==="ok"?C.green:C.amber)+"15",
                border:`1px solid ${(syncStatus.kind==="ok"?C.green:C.amber)}40`,
                padding:"6px 10px",borderRadius:8,
                fontFamily:"'Hanken Grotesk',sans-serif"}}>

            )}

        </Card>
      )}

      {/* Pipeline columns — horizontal scroll on mobile, grid on desktop */}
      {!loading&&!loadError&&items.length===0&&(
        <Card>
          <div style={{textAlign:"center",padding:"30px",color:TXT3,fontSize:12,
            fontFamily:"'Hanken Grotesk',sans-serif"}}>

      {items.length>0&&(
        <div className="cc-pipeline-board" style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:6}}>

              <div key={b.k} className="cc-pipeline-col" style={{flex:"0 0 280px",maxWidth:320,

// ─── APP PRINCIPAL ────────────────────────────────────────────────────────────
const TABS=[
  {id:"torre",   l:"Torre CEO",          icon:"home"},
  {id:"colab",   l:"Area Comercial",sub:"Por Colaborador",icon:"dollar"},
  {id:"agendas", l:"Agendas / Leads",    icon:"calendar"},
  {id:"control", l:"Control Comercial",  icon:"clipboardCheck"},
  {id:"operaciones", l:"Operaciones", icon:"users", children:[
    {id:"operaciones-estudiantes", l:"Estudiantes", href:"/operaciones/estudiantes"},
    {id:"operaciones-cartera", l:"Cartera", href:"/operaciones/cartera"},
    {id:"operaciones-mentores", l:"Mentores", href:"/operaciones/mentores"},
    {id:"operaciones-catalogo", l:"Catálogo", href:"/operaciones/catalogo"},
    {id:"operaciones-importar", l:"Importar Excel", href:"/operaciones/importar"},
    {id:"operaciones-configuracion", l:"Configuración", href:"/operaciones/configuracion"},
  ]},
  {id:"comunidad-dropi", l:"Comunidad Dropi", icon:"users", href:"/comunidad-dropi"},
  {id:"detalle", l:"Detalle Diario",     icon:"barChart"},
  {id:"equipo",  l:"Resumen Equipo",     icon:"users"},
  {id:"funnel",  l:"Funnel",             icon:"filter"},
  {id:"hist",    l:"Histórico",          icon:"trendUp"},
  {id:"admin",   l:"Admin",              icon:"settings", href:"/admin/users"},
];

const MOBILE_TABS=[
  TABS.find(t=>t.id==="torre"),
  TABS.find(t=>t.id==="colab"),
  TABS.find(t=>t.id==="agendas"),
  TABS.find(t=>t.id==="control"),
  TABS.find(t=>t.id==="operaciones"),
  TABS.find(t=>t.id==="comunidad-dropi"),
  TABS.find(t=>t.id==="detalle"),
  TABS.find(t=>t.id==="equipo"),
  TABS.find(t=>t.id==="funnel"),
  TABS.find(t=>t.id==="hist"),
  TABS.find(t=>t.id==="admin"),
].filter(Boolean);

function App(){
  const [isDark,setIsDark]=useState(()=>localStorage.getItem("theme")==="dark");
  applyTheme(isDark);
  const toggleTheme=()=>{const n=!isDark;setIsDark(n);localStorage.setItem("theme",n?"dark":"light");};
  const [tab,setTab]=useState(()=>{
    const params=new URLSearchParams(window.location.search);
    const requested=params.get("tab");
    const requestedEmbed=params.get("embed");
    if(requestedEmbed&&TABS.some(t=>t.id===requested))return requested;
    return TABS.some(t=>t.id===requested&&!t.children)?requested:"torre";
  });
  const [openSubmenu,setOpenSubmenu]=useState(()=>new URLSearchParams(window.location.search).get("tab")==="operaciones"?"operaciones":null);
  const [embedUrl,setEmbedUrl]=useState(()=>new URLSearchParams(window.location.search).get("embed"));
  const [mobileOpsMenuOpen,setMobileOpsMenuOpen]=useState(false);
  // Cambia la pestaña legacy activa y refleja el cambio en la URL con History API
  // para que un refresh restaure la misma vista. Operaciones usa rutas reales,
  // así que las pestañas con hijos se omiten a propósito aquí.
  const changeTab=(id)=>{
    setTab(id);
    setEmbedUrl(null);
    if(!TABS.some(t=>t.id===id&&!t.children))return;
    const url=new URL(window.location.href);
    url.searchParams.delete("embed");
    if(id==="torre")url.searchParams.delete("tab");
    else url.searchParams.set("tab",id);
    const next=url.pathname+url.search+url.hash;
    const current=window.location.pathname+window.location.search+window.location.hash;
    if(next!==current)window.history.replaceState({tab:id},"",next);
  };
  const openEmbeddedRoute=(href,sectionId)=>{
    setTab(sectionId);
    setEmbedUrl(href);
    setMobileOpsMenuOpen(false);
    if(sectionId==="operaciones")setOpenSubmenu("operaciones");
    const url=new URL(window.location.href);
    url.searchParams.set("tab",sectionId);
    url.searchParams.set("embed",href);
    const next=url.pathname+url.search+url.hash;
    const current=window.location.pathname+window.location.search+window.location.hash;
    if(next!==current)window.history.replaceState({tab:sectionId,embed:href},"",next);
  };
  const [year,setYear]=useState(new Date().getFullYear());
  const [month,setMonth]=useState(new Date().getMonth());
  const [kpiData,setKpiData]=useState({});
  const [daily,setDaily]=useState({});
  const [ready,setReady]=useState(false);
  const [closerData,setCloserData]=useState({});
  const [error,setError]=useState(null);
  const [me,setMe]=useState(null);
  const [meLoaded,setMeLoaded]=useState(false);

  // Identity + capabilities (drives the admin link and the scope banner). The
  // server is the real authorization boundary; this only shapes the UI.
  useEffect(()=>{
    let alive=true;
    fetch("/api/auth/me",{credentials:"same-origin"})
      .then(r=>r.ok?r.json():null)
      .then(d=>{if(alive&&d&&d.user)setMe(d.user);})
      .catch(()=>{})
      .finally(()=>{if(alive)setMeLoaded(true);});
    return()=>{alive=false;};
  },[]);

  const canManage=!!(me&&me.canManageUsers);
  const handleLogout=async()=>{
    try{await fetch("/api/auth/logout",{method:"POST",credentials:"same-origin"});}
    finally{window.location.href="/login";}
  };
  const caps=(me&&me.capabilities)||null;
  const scopeLimited=!!(caps&&!caps.isGlobalData);

  const filterMenuTab=(t)=>{
    if(!t)return null;
    if(t.id==="admin")return isMenuAllowed("admin")?t:null;
    if(t.children&&t.children.length>0){
      const children=t.children.filter(c=>isMenuAllowed(c.id));
      return isMenuAllowed(t.id)||children.length>0?{...t,children}:null;
    }
    return isMenuAllowed(t.id)?t:null;
  };
  const visibleTabs=TABS.map(filterMenuTab).filter(Boolean);
  const visibleMobileTabs=MOBILE_TABS.map(filterMenuTab).filter(Boolean);
  const openFirstVisibleRoute=(fallback)=>{
    if(!fallback)return;
    if(fallback.href)openEmbeddedRoute(fallback.href,fallback.id);
    else if(fallback.children&&fallback.children[0]?.href)openEmbeddedRoute(fallback.children[0].href,fallback.id);

  };

    }

          .cc-closer-metric{background:${SURFACE}!important;border:1px solid ${BORDER}!important;border-radius:10px!important;padding:7px 6px!important;min-width:0!important;text-align:left!important}
          .cc-closer-metric > div:first-child{font-size:8px!important;letter-spacing:.08em!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
          .cc-closer-metric > div:last-child{font-size:15px!important;line-height:1.1!important}
          .cc-update-grid{grid-template-columns:minmax(0,1fr)!important}
          .cc-pipeline-board{display:flex!important;flex-direction:column!important;overflow-x:visible!important;gap:12px!important;padding-bottom:0!important}
          .cc-pipeline-col{flex:1 1 auto!important;width:100%!important;max-width:none!important;padding:12px!important;border-radius:16px!important}
          .cc-pipeline-col-head{padding-bottom:2px!important}
          .cc-pipeline-list{max-height:none!important;overflow-y:visible!important;gap:8px!important}
          .cc-pipeline-empty{padding:8px 0!important}
          .cc-pipeline-card{padding:12px!important;border-radius:14px!important;overflow:visible!important}
          .cc-pipeline-card-rail{display:none!important}
          .cc-pipeline-card-head{display:grid!important;grid-template-columns:minmax(0,1fr) auto!important;align-items:start!important;gap:10px!important;margin-bottom:8px!important}
          .cc-pipeline-card-headinfo{display:grid!important;grid-template-columns:auto minmax(0,1fr)!important;align-items:start!important;gap:4px 8px!important;min-width:0!important}
          .cc-pipeline-time{font-size:13px!important;line-height:1.2!important;padding-top:1px!important}
          .cc-pipeline-lead-name{max-width:none!important;white-space:normal!important;overflow:visible!important;text-overflow:clip!important;font-size:14px!important;line-height:1.25!important}
          .cc-pipeline-card-actualizar{font-size:11px!important;padding:6px 10px!important;border-radius:999px!important}
          .cc-pipeline-card-meta{font-size:11px!important;line-height:1.45!important;margin-bottom:7px!important}
        }
        @media (min-width:768px){
          .mobile-nav{display:none!important}
          .mobile-period-bar{display:none!important}
          .mobile-menu-btn{display:none!important}
          .mobile-ops-drawer{display:none!important}
          .mobile-ops-overlay{display:none!important}
        }
      `}</style>
      <div style={{height:"100vh",background:BG,color:TXT,display:"flex",overflow:"hidden"}}>

        {/* Sidebar */}
        <div className="sidebar" style={{width:220,flexShrink:0,background:SURFACE,borderRight:`1px solid ${BORDER}`,
          display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,bottom:0,zIndex:100,
          overflowY:"auto"}}>

          {/* Logo */}
          <div style={{padding:"20px 18px 16px",borderBottom:`1px solid ${BORDER}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <img src="logo.png" alt="Unlocked" style={{width:30,height:30,objectFit:"contain"}}
                onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="flex";}}/>
              <div style={{display:"none",width:30,height:30,borderRadius:8,
                background:`linear-gradient(135deg,${BRAND},${BRAND2})`,
                alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:"#fff"}}>U</div>
              <div>
                <div style={{fontSize:11,fontWeight:800,color:TXT,letterSpacing:"-0.02em",lineHeight:1}}>UNLOCKED ECOM</div>
                <div style={{fontSize:9,color:TXT3,letterSpacing:"0.08em",marginTop:2,textTransform:"uppercase",fontWeight:600}}>Torre de Control</div>
              </div>
            </div>
          </div>

          {/* Month/Year selectors */}
          <div style={{padding:"14px 14px 10px",borderBottom:`1px solid ${BORDER}`}}>
            <Lbl style={{marginBottom:8}}>Período</Lbl>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <select value={month} onChange={e=>setMonth(Number(e.target.value))}
                style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,
                  color:TXT,padding:"7px 10px",fontSize:11,outline:"none",
                  fontFamily:"'Hanken Grotesk',sans-serif",cursor:"pointer",width:"100%",fontWeight:500}}>
                {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
              <select value={year} onChange={e=>setYear(Number(e.target.value))}
                style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,
                  color:TXT,padding:"7px 10px",fontSize:11,outline:"none",
                  fontFamily:"'Hanken Grotesk',sans-serif",cursor:"pointer",width:"100%",fontWeight:500}}>
                {[2025,2026,2027].map(y=><option key={y}>{y}</option>)}
              </select>
            </div>
          </div>

          {/* Nav items */}
          <nav style={{padding:"10px 10px",flex:1}}>
            <Lbl style={{marginLeft:8,marginBottom:6}}>Navegación</Lbl>
            {visibleTabs.map(t=>{
              const active=tab===t.id;
              const hasAlert=(t.id==="equipo"||t.id==="torre")&&alertShow;
              if(t.href){
                return(
                  <button type="button" key={t.id} onClick={()=>openEmbeddedRoute(t.href,t.id)}
                    className={`sidebar-item${embedUrl===t.href?" active":""}`}
                    style={{width:"100%",textAlign:"left",background:embedUrl===t.href?BRAND+"18":"transparent",
                      border:"none",borderLeft:embedUrl===t.href?`2px solid ${BRAND}`:"2px solid transparent",borderRadius:"0 9px 9px 0",
                      padding:"9px 12px",color:embedUrl===t.href?BRAND:TXT2,fontSize:12,fontWeight:embedUrl===t.href?700:500,
                      fontFamily:"'Hanken Grotesk',sans-serif",display:"flex",alignItems:"center",
                      gap:9,marginBottom:2,textDecoration:"none",transition:"all .15s",cursor:"pointer"}}>
                    <Icon name={t.icon} size={15} color={embedUrl===t.href?BRAND:TXT3}/>
                    <span>{t.l}</span>
                  </button>
                );
              }
              if(t.children&&t.children.length>0){
                const expanded=openSubmenu===t.id;
                return(
                  <div key={t.id} style={{display:"flex",flexDirection:"column",marginBottom:2}}>
                    <button type="button" onClick={()=>setOpenSubmenu(expanded?null:t.id)}
                      aria-expanded={expanded} aria-controls={`submenu-${t.id}`}
                      className={`sidebar-item${expanded?" active":""}`}
                      style={{width:"100%",textAlign:"left",background:expanded?BRAND+"18":"transparent",
                        border:"none",borderLeft:expanded?`2px solid ${BRAND}`:"2px solid transparent",
                        borderRadius:"0 9px 9px 0",padding:"9px 12px",cursor:"pointer",
                        color:expanded?BRAND:TXT2,fontSize:12,fontWeight:expanded?700:500,
                        fontFamily:"'Hanken Grotesk',sans-serif",display:"flex",alignItems:"center",
                        gap:9,transition:"all .15s"}}>
                      <Icon name={t.icon} size={15} color={expanded?BRAND:TXT3}/>
                      <span style={{flex:1}}>{t.l}</span>
                      <span style={{fontSize:10,opacity:.6}}>{expanded?"▼":"▶"}</span>
                    </button>
                    {expanded&&<div id={`submenu-${t.id}`}>{t.children.map(c=>{
                      const subActive=embedUrl===c.href;
                      return(
                        <button type="button" key={c.id} onClick={()=>openEmbeddedRoute(c.href,t.id)}
                          style={{padding:"7px 12px 7px 37px",fontSize:12,
                            color:subActive?BRAND:TXT2,
                            background:subActive?BRAND+"18":"transparent",
                            fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:subActive?700:500,
                            textDecoration:"none",textAlign:"left",width:"100%",
                            display:"block",borderRadius:"0 9px 9px 0",border:"none",cursor:"pointer"}}
                          onMouseEnter={e=>{if(!subActive)e.currentTarget.style.background=BRAND+"10";}}
                          onMouseLeave={e=>{if(!subActive)e.currentTarget.style.background="transparent";}}>
                          {c.l}
                        </button>
                      );
                    })}</div>}
                  </div>
                );
              }
              return(
                <button type="button" key={t.id} onClick={()=>changeTab(t.id)}
                  className={`sidebar-item${active?" active":""}`}
                  style={{width:"100%",textAlign:"left",background:active?BRAND+"18":"transparent",
                    border:"none",borderLeft:active?`2px solid ${BRAND}`:"2px solid transparent",
                    borderRadius:active?"0 9px 9px 0":"0 9px 9px 0",
                    padding:"9px 12px",cursor:"pointer",
                    color:active?BRAND:TXT2,fontSize:12,fontWeight:active?700:500,
                    fontFamily:"'Hanken Grotesk',sans-serif",display:"flex",alignItems:"center",
                    gap:9,marginBottom:2,position:"relative",transition:"all .15s"}}>
                  <Icon name={t.icon} size={15} color={active?BRAND:TXT3}/>
                  <span style={{display:"flex",flexDirection:"column",lineHeight:1.15}}>
                    <span>{t.l}</span>
                    {t.sub&&<span style={{fontSize:9,lineHeight:1.1,opacity:.75}}>{t.sub}</span>}
                  </span>
                  {hasAlert&&<span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
                    width:6,height:6,background:C.red,borderRadius:100}}/>}
                </button>
              );
            })}
          </nav>

          {/* Footer info */}
          <div style={{padding:"12px 16px",borderTop:`1px solid ${BORDER}`}}>
            <div style={{fontSize:9,color:TXT3,letterSpacing:"0.05em",lineHeight:1.6,marginBottom:10}}>
              <div style={{color:TXT2,fontWeight:600,marginBottom:2}}>{MONTHS[month]} {year}</div>
              <div>{periodState==="past"?"Mes cerrado · ":periodState==="future"?"Mes futuro · ":"Día "}{periodDayLabel}</div>
              {kpi.funnel.revenue&&<div style={{color:BRAND,fontWeight:600,marginTop:2}}>{fD(nv(kpi.funnel.revenue))} revenue</div>}
            </div>
            <button onClick={toggleTheme} style={{
              width:"100%",background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,
              padding:"8px 10px",cursor:"pointer",color:TXT2,fontSize:11,fontWeight:600,
              fontFamily:"'Hanken Grotesk',sans-serif",display:"flex",alignItems:"center",gap:8,
              transition:"all .15s"}}>
              <Icon name={isDark?"trendUp":"barChart"} size={13} color={TXT3}/>
              {isDark?"Modo Claro":"Modo Oscuro"}
            </button>
            <button onClick={handleLogout} style={{
              width:"100%",marginTop:8,background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:8,
              padding:"8px 10px",cursor:"pointer",color:TXT2,fontSize:11,fontWeight:700,
              fontFamily:"'Hanken Grotesk',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:8,
              transition:"all .15s"}}>
              <Icon name="logout" size={13} color={TXT3}/>
              Cerrar sesión
            </button>
          </div>
        </div>

        {/* Main content */}
        <div className="main-content" style={{flex:1,marginLeft:220,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {/* Top bar */}
          <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`,
            padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",
            position:"sticky",top:0,zIndex:50}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button className="mobile-menu-btn" onClick={()=>setMobileOpsMenuOpen(true)}
                aria-label="Abrir menú" aria-expanded={mobileOpsMenuOpen}
                style={{display:"none",alignItems:"center",gap:6,padding:"7px 11px",
                  background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:8,
                  color:TXT,fontSize:12,fontWeight:700,fontFamily:"'Hanken Grotesk',sans-serif",cursor:"pointer"}}>
                <Icon name="menu" size={15} color={TXT}/>
                <span>Menú</span>
              </button>
              <Icon name={TABS.find(t=>t.id===tab)?.icon} size={18} color={BRAND}/>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                <div style={{fontSize:9,fontWeight:800,color:BRAND,letterSpacing:"0.12em",lineHeight:1,textTransform:"uppercase"}}>UNLOCKED ECOM</div>
                <div style={{fontSize:16,fontWeight:800,color:TXT,letterSpacing:"-0.03em",lineHeight:1}}>
                  {TABS.find(t=>t.id===tab)?.l}
                  {TABS.find(t=>t.id===tab)?.sub&&<div style={{fontSize:10,fontWeight:600,color:TXT3,lineHeight:1.2,marginTop:2}}>{TABS.find(t=>t.id===tab)?.sub}</div>}
                </div>
              </div>
              <div className="mobile-topbar-extra" style={{fontSize:10,color:TXT3,marginTop:4,letterSpacing:"0.02em"}}>
                {MONTHS[month].toUpperCase()} {year} · {periodState==="past"?`MES CERRADO · ${MDAYS[month]} DÍAS`:periodState==="future"?`MES FUTURO · ${MDAYS[month]} DÍAS`:`DÍA ${Math.min(nv(kpi.day)||_topD,MDAYS[month])} DE ${MDAYS[month]}`}
                {mQual>0&&<> · <span style={{color:cH(pv(mShows,mQual),60,40)}}>{fP(pv(mShows,mQual))} show-up</span></>}
              </div>
            </div>
          </div>

          {/* Mobile period bar */}
          <div className="mobile-period-bar" style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`,padding:"8px 12px",display:"flex",gap:8,alignItems:"center"}}>
            {tab!=="control"&&<button onClick={()=>changeTab("control")} style={{
              background:BRAND,color:"#fff",border:"none",borderRadius:9,padding:"8px 10px",
              fontSize:11,fontWeight:800,fontFamily:"'Hanken Grotesk',sans-serif",whiteSpace:"nowrap",boxShadow:"0 4px 12px rgba(224,58,24,.22)"}}>
              Control Comercial
            </button>}
            <select value={month} onChange={e=>setMonth(Number(e.target.value))}
              style={{flex:1,background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,
                color:TXT,padding:"7px 10px",fontSize:12,outline:"none",
                fontFamily:"'Hanken Grotesk',sans-serif",cursor:"pointer",fontWeight:500}}>
              {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
            </select>
            <select value={year} onChange={e=>setYear(Number(e.target.value))}
              style={{width:80,background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,
                color:TXT,padding:"7px 10px",fontSize:12,outline:"none",
                fontFamily:"'Hanken Grotesk',sans-serif",cursor:"pointer",fontWeight:500}}>
              {[2025,2026,2027].map(y=><option key={y}>{y}</option>)}
            </select>
          </div>

          {/* Page content */}
          <div style={{padding:"20px 24px 60px",flex:1,overflowY:"auto",overflowX:"hidden"}} className="fade-in page-content">
            {scopeLimited&&<div style={{marginBottom:16,background:C.amber+"14",border:`1px solid ${C.amber}55`,
              borderRadius:10,padding:"11px 14px",display:"flex",alignItems:"center",gap:10}}>
              <Icon name="lock" size={15} color={C.amber}/>
              <div style={{fontSize:12,color:TXT,lineHeight:1.5}}>
                <strong style={{fontWeight:800}}>Vista limitada.</strong>{" "}
                {(caps&&caps.scopeSummary)||"Solo ves los datos asignados a tu alcance."} Si necesitas más acceso, pide a un admin que ajuste tu alcance.
              </div>
            </div>}
            {embedUrl ? (
              <iframe
                src={embedUrl}
                style={{
                  width:"100%",
                  height:"calc(100vh - 80px)",
                  border:"none",
                  background:"#F7F7F5",
                  display:"block"
                }}
              />
            ) : (
              <>
                {tab==="torre"   &&<Torre kpi={kpi} year={year} month={month} allCloser={closerData} allDaily={daily} dm={MDAYS[month]} onSaveConfig={saveKpiConfig}/>}
                {tab==="control" &&<ControlComercial/>}
                {tab==="entrada" &&<DailyEntryForm year={year} month={month} allDaily={daily} onSave={saveEntry}/>}
                {tab==="agendas" &&<AgendasLeadsForm allCloser={closerData} onSave={saveCloserEntry}/>}
                {tab==="equipo" &&<ResumenEquipo year={year} month={month} allDaily={daily}/>}
                {tab==="funnel" &&<FunnelView f={kpi.funnel} onUpdate={upKpi}/>}
                {tab==="hist"   &&<HistoricoView allKpi={allKpi} allDaily={daily}/>}
                {tab==="detalle"&&<DetalleView allDaily={daily} allCloser={closerData} year={year} month={month}/>}
                {tab==="colab"  &&<DetalleColaborador allDaily={daily} allCloser={closerData} year={year} month={month} onSave={saveEntry} onSaveCloser={saveCloserEntry}/>}
              </>
            )}
          </div>
        </div>

        {/* Mobile bottom tab bar — visual handoff primary navigation */}
        <nav className="mobile-bottom-nav" aria-label="Navegación principal móvil" style={{display:"none",position:"fixed",left:0,right:0,bottom:0,zIndex:260,
          background:SURFACE,borderTop:`1px solid ${BORDER}`,boxShadow:"0 -10px 28px rgba(12,14,14,.08)",
          padding:"7px 8px calc(7px + env(safe-area-inset-bottom,0px))",justifyContent:"space-around",gap:4}}>
          {[
            {id:"torre",l:"Torre",icon:"home"},
            {id:"colab",l:"Comercial",icon:"dollar"},
            {id:"funnel",l:"Funnel",icon:"trendUp"},
            {id:"equipo",l:"Equipo",icon:"users"},
            {id:"mas",l:"Más",icon:"menu"},
          ].map(item=>{
            const active=!embedUrl&&tab===item.id;
            const onTap=item.id==="mas"?()=>setMobileOpsMenuOpen(true):()=>changeTab(item.id);
            return(
              <button type="button" key={item.id} onClick={onTap} aria-current={active?"page":undefined}
                style={{flex:"1 1 0",minWidth:0,border:"none",background:"transparent",borderRadius:12,
                  padding:"6px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                  color:active?BRAND:TXT3,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:9.5,fontWeight:700,cursor:"pointer"}}>
                <Icon name={item.icon} size={20} color={active?BRAND:TXT3}/>
                <span style={{lineHeight:1,whiteSpace:"nowrap"}}>{item.l}</span>
              </button>
            );
          })}
        </nav>

        {/* Mobile Operaciones drawer */}
        {mobileOpsMenuOpen&&<div className="mobile-ops-overlay" onClick={()=>setMobileOpsMenuOpen(false)}
          style={{position:"fixed",inset:0,background:"rgba(17,17,16,0.45)",zIndex:300,display:"none"}}/>}
        <div className="mobile-ops-drawer" style={{
          position:"fixed",top:0,bottom:0,left:0,width:280,maxWidth:"85vw",zIndex:310,
          background:SURFACE,borderRight:`1px solid ${BORDER}`,
          display:"none",flexDirection:"column",overflowY:"auto",
          transform:mobileOpsMenuOpen?"translateX(0)":"translateX(-100%)",
          transition:"transform 200ms ease-out",
          visibility:mobileOpsMenuOpen?"visible":"hidden",
          boxShadow:"4px 0 20px rgba(0,0,0,.18)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"14px 16px",borderBottom:`1px solid ${BORDER}`}}>
            <div style={{display:"flex",alignItems:"center",gap:9}}>
              <Icon name="menu" size={16} color={BRAND}/>
              <span style={{fontSize:13,fontWeight:800,color:TXT,letterSpacing:"-0.02em"}}>Navegación</span>
            </div>
            <button onClick={()=>setMobileOpsMenuOpen(false)} aria-label="Cerrar menú"
              style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
                width:34,height:34,border:"none",borderRadius:8,background:"transparent",
                color:TXT2,cursor:"pointer"}}>
              <Icon name="x" size={16} color={TXT2}/>
            </button>
          </div>
          <nav style={{padding:"10px 0",flex:1}}>
            {visibleTabs.map(t=>{
              const hasChildren=t.children&&t.children.length>0;
              if(hasChildren){
                return(
                  <div key={t.id} style={{marginTop:6}}>
                    <div style={{display:"flex",alignItems:"center",gap:9,
                      padding:"10px 18px 4px",fontSize:10,
                      color:TXT3,fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:700,
                      letterSpacing:"0.1em",textTransform:"uppercase"}}>
                      <Icon name={t.icon} size={13} color={TXT3}/>
                      <span>{t.l}</span>
                    </div>
                    {t.children.map(c=>{
                      const subActive=embedUrl===c.href;
                      return(
                        <button type="button" key={c.id}
                          onClick={()=>openEmbeddedRoute(c.href,t.id)}
                          style={{display:"block",width:"100%",textAlign:"left",
                            padding:"9px 18px 9px 36px",fontSize:13,
                            color:subActive?BRAND:TXT2,
                            background:subActive?BRAND+"18":"transparent",
                            borderLeft:subActive?`2px solid ${BRAND}`:"2px solid transparent",
                            border:"none",fontFamily:"'Hanken Grotesk',sans-serif",
                            fontWeight:subActive?700:500,cursor:"pointer"}}>
                          {c.l}
                        </button>
                      );
                    })}
                  </div>
                );
              }
              if(t.href){
                return(
                  <button type="button" key={t.id} onClick={()=>openEmbeddedRoute(t.href,t.id)}
                    style={{display:"flex",alignItems:"center",gap:9,width:"100%",textAlign:"left",
                      padding:"11px 18px",fontSize:13,color:embedUrl===t.href?BRAND:TXT2,
                      background:embedUrl===t.href?BRAND+"18":"transparent",borderLeft:embedUrl===t.href?`2px solid ${BRAND}`:"2px solid transparent",
                      border:"none",fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:embedUrl===t.href?700:500,textDecoration:"none",cursor:"pointer"}}>
                    <Icon name={t.icon} size={14} color={embedUrl===t.href?BRAND:TXT3}/>
                    <span style={{display:"flex",flexDirection:"column",lineHeight:1.15}}>
                      <span>{t.l}</span>
                      {t.sub&&<span style={{fontSize:10,lineHeight:1.15,opacity:.75}}>{t.sub}</span>}
                    </span>
                  </button>
                );
              }
              const active=!embedUrl&&tab===t.id;
              return(
                <button type="button" key={t.id}
                  onClick={()=>{changeTab(t.id);setMobileOpsMenuOpen(false);}}
                  style={{display:"flex",alignItems:"center",gap:9,width:"100%",textAlign:"left",
                    padding:"11px 18px",fontSize:13,
                    color:active?BRAND:TXT2,
                    background:active?BRAND+"18":"transparent",
                    borderLeft:active?`2px solid ${BRAND}`:"2px solid transparent",
                    border:"none",fontFamily:"'Hanken Grotesk',sans-serif",
                    fontWeight:active?700:500,cursor:"pointer"}}>
                  <Icon name={t.icon} size={14} color={active?BRAND:TXT3}/>
                  <span style={{display:"flex",flexDirection:"column",lineHeight:1.15}}>
                    <span>{t.l}</span>
                    {t.sub&&<span style={{fontSize:10,lineHeight:1.15,opacity:.75}}>{t.sub}</span>}
                  </span>
                </button>
              );
            })}
          </nav>
        </div>

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
