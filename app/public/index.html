// ─── DETALLE POR DÍA (collaborator-specific day-by-day KPIs) ──────────────────
const DetallePorDia=({entriesByCollab,year,month,dm,mp,pad})=>{
  const [picked,setPicked]=useState(MANUAL_COLLABORATORS[0].id);
  const collab=MANUAL_COLLABORATORS.find(c=>c.id===picked)||MANUAL_COLLABORATORS[0];
  const role=collab.role;

  const rowsM=entriesByCollab[picked]||[];
  const byDate={};
  rowsM.forEach(e=>{if(e&&e.date)byDate[e.date]=e;});
  const days=Array.from({length:dm},(_,i)=>{
    const d=`${mp}-${pad(i+1)}`;
    return{day:i+1,d,e:byDate[d]||null};
  });

  const DOW=["D","L","M","M","J","V","S"];
  const getDoW=d=>{const dt=new Date(d+"T12:00:00");return DOW[dt.getDay()];};
  const isWeekend=d=>{const dt=new Date(d+"T12:00:00");return dt.getDay()===0||dt.getDay()===6;};
  const WKD_BG=IS_DARK?"#0A1020":SURFACE2;

  const cellTxt=(v,fmt)=>{
    if(v===null||v===undefined||v===0||(typeof v==="number"&&isNaN(v)))return null;
    if(fmt==="$")return fD(v);
    if(fmt==="%")return fP(v);
    return fN(v);
  };

  const MARKETING_ROWS=[
    {title:"Actividad Marketing",bg:"#6d28d9",rows:[
      {l:"# IG Seguidores",fn:d=>d.e?d.e.igFollowers:0,fmt:"n"},
      {l:"# Posts + CTA",fn:d=>d.e?d.e.posts:0,fmt:"n"},
      {l:"# Mensajes",fn:d=>d.e?d.e.mensajes:0,fmt:"n"},
      {l:"# Follow Ups",fn:d=>d.e?d.e.followUps:0,fmt:"n"},
      {l:"# Booking Offers",fn:d=>d.e?d.e.bkOffers:0,fmt:"n"},
    ]},
  ];
  const CLOSER_ROWS=[
    {title:"Agendas / Leads",bg:"#0f766e",rows:[
      {l:"# Agendas",fn:d=>d.e?d.e.agendas:0,fmt:"n"},
      {l:"# Calificadas",fn:d=>d.e?d.e.calificadas:0,fmt:"n"},
      {l:"# Agendas hoy",fn:d=>d.e?d.e.agendasHoy:0,fmt:"n"},
      {l:"# Show Ups",fn:d=>d.e?d.e.showUps:0,fmt:"n"},
    ]},
    {title:"Ventas — Área Comercial",bg:"#c2410c",rows:[
      {l:"# Ventas HT",fn:d=>d.e?d.e.ventasHT:0,fmt:"n"},
      {l:"$ Venta HT",fn:d=>d.e?d.e.valorVentaHT:0,fmt:"$"},
      {l:"Upfront / Cash Collected",fn:d=>d.e?d.e.upfrontCash:0,fmt:"$"},
      {l:"Recurring Cash",fn:d=>d.e?d.e.recurringCash:0,fmt:"$"},
      {l:"# Follow Ups",fn:d=>d.e?d.e.followUps:0,fmt:"n"},
      {l:"Pend. cierre día anterior",fn:d=>d.e?d.e.pendDiaAnterior:0,fmt:"n"},
      {l:"Pend. cierre acumulados",fn:d=>d.e?d.e.pendAcumulados:0,fmt:"n"},
      {l:"# Reservas",fn:d=>d.e?d.e.reservas:0,fmt:"n"},
    ]},
  ];
  const ROWS=role==="marketing"?MARKETING_ROWS:CLOSER_ROWS;
  const totForRow=row=>days.reduce((s,d)=>s+(row.fn(d)||0),0)||null;

  const HDR_BG=IS_DARK?"#0D1526":"#1e293b";
  const HDR_TXT="#f1f5f9";
  const thBase={padding:"5px 6px",textAlign:"center",fontSize:9,fontWeight:700,
    fontFamily:"'DM Mono',monospace",borderRight:`1px solid rgba(255,255,255,0.1)`};
  const tdBase={padding:"4px 8px",textAlign:"right",fontSize:10,fontFamily:"'DM Mono',monospace",
    borderRight:`1px solid ${BORDER2}`,borderBottom:`1px solid ${BORDER2}`,height:23};
  const stickyCol={position:"sticky",left:0,zIndex:2};

  return(
    <div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:10,color:TXT3,letterSpacing:"0.13em",textTransform:"uppercase",
          fontFamily:"'Inter',sans-serif",fontWeight:600,marginRight:4}}>Colaborador</span>
        {MANUAL_COLLABORATORS.map(c=>{
          const sel=picked===c.id;
          return(<button key={c.id} onClick={()=>setPicked(c.id)} style={{
            background:sel?c.color+"18":SURFACE2,border:`1.5px solid ${sel?c.color:BORDER}`,
            borderRadius:8,padding:"5px 12px",cursor:"pointer",color:sel?c.color:TXT2,
            fontSize:11,fontFamily:"'Inter',sans-serif",fontWeight:sel?700:500,
            display:"inline-flex",alignItems:"center",gap:7,
            transition:"all .15s"}}>
            <span style={{width:6,height:6,borderRadius:100,background:c.color,display:"inline-block"}}/>
            <span>{c.label}</span>
          </button>);
        })}
      </div>
      <div style={{fontSize:11,color:TXT2,fontFamily:"'Inter',sans-serif",marginBottom:8,padding:"0 2px"}}>
        {collab.label} · {MONTHS[month]} {year} · {rowsM.length} días con registro
      </div>
      <div style={{overflow:"auto",borderRadius:10,border:`1px solid ${BORDER}`,background:SURFACE,
        height:"calc(100vh - 220px)"}}>
        <table style={{borderCollapse:"separate",borderSpacing:0,minWidth:"100%"}}>
          <thead style={{position:"sticky",top:0,zIndex:10}}>
            <tr>
              <th style={{...thBase,...stickyCol,background:HDR_BG,color:HDR_TXT,textAlign:"left",
                padding:"8px 10px",minWidth:175,zIndex:11,borderRight:`2px solid ${BORDER}`}}>
                KPI
              </th>
              {days.map(d=>(
                <th key={d.day} style={{...thBase,
                  background:isWeekend(d.d)?WKD_BG:HDR_BG,
                  color:isWeekend(d.d)?"#94A3B8":HDR_TXT,minWidth:38}}>
                  <div style={{opacity:0.6}}>{getDoW(d.d)}</div>
                  <div>{d.day}</div>
                </th>
              ))}
              <th style={{...thBase,background:BRAND,color:"#fff",minWidth:80,
                borderLeft:`2px solid ${BORDER}`}}>
                Total / Mes
              </th>
            </tr>
          </thead>
          <tbody>
            {ROWS.map(g=>(
              <React.Fragment key={g.title}>
                <tr>
                  <td colSpan={dm+2} style={{background:g.bg,color:"#fff",padding:"5px 10px",
                    fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",
                    fontFamily:"'Inter',sans-serif",position:"sticky",left:0,zIndex:3}}>
                    {g.title}
                  </td>
                </tr>
                {g.rows.map(row=>{
                  const tot=totForRow(row);
                  return(
                    <tr key={row.l}>
                      <td style={{...tdBase,...stickyCol,textAlign:"left",
                        paddingLeft:10,
                        color:TXT,fontWeight:600,fontSize:10,
                        background:SURFACE,
                        borderRight:`2px solid ${BORDER}`,
                        fontFamily:"'Inter',sans-serif",
                        whiteSpace:"nowrap"}}>
                        {row.l}
                      </td>
                      {days.map(d=>{
                        const v=row.fn(d);
                        const txt=cellTxt(v,row.fmt);
                        return(
                          <td key={d.day} style={{...tdBase,
                            background:isWeekend(d.d)?WKD_BG:SURFACE,
                            color:txt?TXT:TXT3,fontSize:9}}>
                            {txt||"·"}
                          </td>
                        );
                      })}
                      <td style={{...tdBase,background:SURFACE2,
                        color:tot?TXT:TXT3,fontWeight:700,
                        borderLeft:`2px solid ${BORDER}`,textAlign:"right"}}>
                        {cellTxt(tot,row.fmt)||"—"}
                      </td>
                    </tr>
                  );
                })}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// ─── ADMIN VIEW ───────────────────────────────────────────────────────────────
const AdminView=({allDaily,onSave,onDelete})=>{
  const [authed,setAuthed]=useState(false);
  const [authState,setAuthState]=useState("checking");
  const [filterMember,setFilterMember]=useState("Todos");
  const [filterDate,setFilterDate]=useState("");
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const [deleting,setDeleting]=useState(null);

  useEffect(()=>{
    let alive=true;
    fetch("/api/auth/me",{credentials:"same-origin"})
      .then(async res=>{
        if(!alive)return;
        if(res.status===401){setAuthState("login");return;}
        if(!res.ok){setAuthState("error");return;}
        const data=await res.json().catch(()=>({}));
        if(data?.user?.canManageUsers){setAuthed(true);setAuthState("ok");}
        else{setAuthState("forbidden");}
      })
      .catch(()=>alive&&setAuthState("error"));
    return()=>{alive=false;};
  },[]);

  const entries=Object.entries(allDaily)
    .map(([k,v])=>({key:k,...v}))
    .filter(e=>filterMember==="Todos"||e.member===filterMember)
    .filter(e=>!filterDate||e.date===filterDate)
    .sort((a,b)=>b.date.localeCompare(a.date)||a.member.localeCompare(b.member));

  const startEdit=entry=>{setEditing(entry.key);setForm({...entry});};
  const sf=(k,v)=>setForm(p=>({...p,[k]:Number(v)||0}));

  const saveEdit=async()=>{
    setSaving(true);
    const newBk=(form.newBkOrganic||0)+(form.newBkPaid||0);
    const qualBk=(form.qualBkOrganic||0)+(form.qualBkPaid||0);
    const shows=(form.showOrganic||0)+(form.showPaid||0);
    const entry={...form,
      newBkTotal:newBk,qualBkTotal:qualBk,showsTotal:shows,
      bkInboundTotal:(form.bkInboundOrganic||0)+(form.bkInboundPaid||0),
    };
    await onSave(`${form.date}:${form.member}`,entry);
    setSaving(false);setEditing(null);
  };

  const handleDelete=async entry=>{
    if(!window.confirm(`¿Eliminar entrada de ${entry.member} del ${entry.date}?`))return;
    setDeleting(entry.key);
    await onDelete(entry.date,entry.member);
    setDeleting(null);
  };

  if(!authed){
    const isChecking=authState==="checking";
    const title=isChecking?"Validando acceso admin":authState==="forbidden"?"Tu usuario no tiene permisos de admin":"Inicia sesión como admin";
    const subtitle=isChecking?"Revisando tu sesión segura…":authState==="forbidden"?"Pide a un admin que te active permisos de usuarios":"El PIN fue removido; el acceso depende de tu usuario y permisos";
    return(
    <Card>
      <div style={{textAlign:"center",padding:"50px 20px"}}>
        <div style={{width:52,height:52,borderRadius:14,background:BORDER2,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
          <Icon name={isChecking?"users":"lock"} size={22} color={TXT3}/>
        </div>
        <div style={{fontSize:15,fontWeight:800,color:TXT,marginBottom:6}}>{title}</div>
        <div style={{fontSize:11,color:TXT3,fontFamily:"'DM Mono',monospace",marginBottom:24}}>
          {subtitle}
        </div>
        {!isChecking&&authState!=="forbidden"&&<a href="/login" style={{display:"inline-flex",alignItems:"center",gap:8,background:C.gold,color:"#fff",
          border:"none",borderRadius:9,padding:"11px 28px",fontWeight:800,fontSize:13,cursor:"pointer",
          fontFamily:"'Epilogue',sans-serif",boxShadow:`0 2px 8px ${C.gold}40`,textDecoration:"none"}}>
          Iniciar sesión
        </a>}
        {!isChecking&&authState==="forbidden"&&<a href="/" style={{display:"inline-flex",alignItems:"center",gap:8,background:SURFACE2,color:TXT,
          border:`1px solid ${BORDER}`,borderRadius:9,padding:"11px 28px",fontWeight:800,fontSize:13,cursor:"pointer",
          fontFamily:"'Epilogue',sans-serif",textDecoration:"none"}}>
          Volver al dashboard
        </a>}
      </div>
    </Card>
  );}

  const EDIT_FIELDS=[
    {k:"posts",l:"Posts + CTA"},{k:"mensajes",l:"Mensajes"},{k:"followUps",l:"Follow-ups"},{k:"bkOffers",l:"Bk Offers"},
    {k:"newBkOrganic",l:"New Bk Orgánico"},{k:"newBkPaid",l:"New Bk Paid"},
    {k:"qualBkOrganic",l:"Quality Bk Orgánico"},{k:"qualBkPaid",l:"Quality Bk Paid"},
    {k:"todayBkOrganic",l:"Today Bk Orgánico"},{k:"todayBkPaid",l:"Today Bk Paid"},
    {k:"showOrganic",l:"Shows Orgánico"},{k:"showPaid",l:"Shows Paid"},
    {k:"pitchesOrganic",l:"Pitches Orgánico"},{k:"pitchesPaid",l:"Pitches Paid"},
    {k:"bkInboundOrganic",l:"Inbound Orgánico"},{k:"bkInboundPaid",l:"Inbound Paid"},
    {k:"bkOutbound",l:"Outbound"},{k:"paidBkInvestment",l:"Inversión Ads $",p:"$"},
    {k:"paidBkCount",l:"# Paid Bookings"},{k:"activeClients",l:"Clientes Activos"},
    {k:"igFollowers",l:"IG Followers (k)"},{k:"offerPrice",l:"Precio Oferta $",p:"$"},
  ];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <Card>
        <STit icon="👥" title="Administración de usuarios" sub="Crea accesos, cambia roles y ajusta permisos por módulo"/>
        <div style={{display:"flex",justifyContent:"space-between",gap:14,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{fontSize:12,color:TXT3,lineHeight:1.55,maxWidth:620}}>
            Gestiona quién puede entrar a Torre de Control. El panel usa login seguro y conserva auditoría: los usuarios se suspenden, no se eliminan.
          </div>
          <a href="/admin/users" style={{display:"inline-flex",alignItems:"center",gap:8,background:C.gold,color:"#fff",
            border:"none",borderRadius:10,padding:"11px 18px",fontWeight:900,fontSize:12,cursor:"pointer",
            fontFamily:"'Epilogue',sans-serif",boxShadow:`0 2px 10px ${C.gold}35`,textDecoration:"none"}}>
            Abrir usuarios y permisos →
          </a>
        </div>
      </Card>

      <Card>
        <STit icon="🔐" title="Panel Admin" sub="Visualiza, edita o elimina cualquier entrada del equipo"/>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <Lbl>Miembro</Lbl>
            <select value={filterMember} onChange={e=>setFilterMember(e.target.value)}
              style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:7,color:TXT,
                padding:"7px 9px",fontSize:12,outline:"none",fontFamily:"'Epilogue',sans-serif",cursor:"pointer",height:36}}>
              <option>Todos</option>
              {TEAM.map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <Lbl>Fecha</Lbl>
            <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)}
              style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:7,color:TXT,
                padding:"7px 9px",fontSize:12,outline:"none",fontFamily:"'DM Mono',monospace",height:36}}/>
          </div>
          {filterDate&&(
            <button onClick={()=>setFilterDate("")}
              style={{background:"transparent",border:`1px solid ${BORDER}`,borderRadius:7,
                color:TXT2,padding:"7px 12px",fontSize:11,cursor:"pointer",
                fontFamily:"'Epilogue',sans-serif",height:36}}>× Limpiar</button>
          )}
          <div style={{marginLeft:"auto",fontSize:10,color:TXT3,fontFamily:"'DM Mono',monospace",paddingBottom:6}}>
            {entries.length} entradas encontradas
          </div>
        </div>
      </Card>

      {entries.length===0&&(
        <Card><div style={{textAlign:"center",padding:"30px",color:TXT3,fontSize:12,
          fontFamily:"'DM Mono',monospace"}}>No hay entradas con esos filtros.</div></Card>
      )}

      {entries.map(entry=>(
        <Card key={entry.key} style={{padding:"16px 20px"}}>
          {editing===entry.key?(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <MemberBadge name={entry.member} size="lg"/>
                  <span style={{fontSize:12,color:TXT3,fontFamily:"'DM Mono',monospace"}}>{entry.date}</span>
                  <span style={{fontSize:10,color:C.amber,fontFamily:"'DM Mono',monospace"}}>✏️ Modo edición</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={saveEdit} disabled={saving} style={{background:C.green,color:"#fff",
                    border:"none",borderRadius:8,padding:"8px 18px",fontWeight:800,fontSize:12,
                    cursor:"pointer",fontFamily:"'Epilogue',sans-serif",opacity:saving?0.7:1}}>
                    {saving?"Guardando...":"✓ Guardar cambios"}
                  </button>
                  <button onClick={()=>setEditing(null)} style={{background:"transparent",
                    border:`1px solid ${BORDER}`,borderRadius:8,padding:"8px 14px",fontSize:12,
                    cursor:"pointer",color:TXT2,fontFamily:"'Epilogue',sans-serif"}}>
                    Cancelar
                  </button>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:11}}>
                {EDIT_FIELDS.map(f=>(
                  <Inp key={f.k} label={f.l} prefix={f.p} value={form[f.k]||""} onChange={v=>sf(f.k,v)}/>
                ))}
              </div>
            </div>
          ):(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <MemberBadge name={entry.member} size="lg"/>
                  <span style={{fontSize:13,fontWeight:700,color:TXT,fontFamily:"'DM Mono',monospace"}}>{entry.date}</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>startEdit(entry)} style={{background:C.gold+"15",
                    border:`1px solid ${C.gold}40`,borderRadius:7,padding:"6px 14px",fontSize:11,
                    cursor:"pointer",color:C.gold,fontFamily:"'Epilogue',sans-serif",fontWeight:700}}>
                    ✏️ Editar
                  </button>
                  <button onClick={()=>handleDelete(entry)} disabled={deleting===entry.key}
                    style={{background:C.red+"10",border:`1px solid ${C.red}30`,borderRadius:7,
                      padding:"6px 14px",fontSize:11,cursor:"pointer",color:C.red,
                      fontFamily:"'Epilogue',sans-serif",fontWeight:700,opacity:deleting===entry.key?0.5:1}}>
                    {deleting===entry.key?"...":"🗑 Eliminar"}
                  </button>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8}}>
                {[
                  ["Mensajes",    entry.mensajes,       TXT2],
                  ["Follow-ups",  entry.followUps,      C.blue],
                  ["Bk Offers",   entry.bkOffers,       C.orange],
                  ["New Bk",      entry.newBkTotal,     C.purple],
                  ["Quality Bk",  entry.qualBkTotal,    C.teal],
                  ["Shows",       entry.showsTotal,     C.green],
                  ["Show-up %",   fP(pv(entry.showsTotal,entry.qualBkTotal)), cH(pv(entry.showsTotal,entry.qualBkTotal),60,40)],

                  ["Paid Bk #",   entry.paidBkCount,   C.orange],

                  </div>
                ))}
              </div>
            </div>
          )}
        </Card>
      ))}
    </div>
  );
};
