  const [form,setForm]=useState({
    lead:"",closer:COMERCIAL_CLOSERS[0],appointmentAt:"",
    outcome:normalizeComercialOutcome(""),nextAction:"",followUpAt:"",note:"",
  });
  const sf=(k,v)=>setForm(p=>({...p,[k]:v}));

  const loadPipeline=async(d)=>{
    setLoading(true);
    try{
      const r=await fetch(`${CONTROL_PIPELINE_URL}?date=${encodeURIComponent(d||date)}`,{method:"GET"});
      if(!r.ok)throw new Error("HTTP "+r.status);
      const j=await r.json();
      if(!j.ok)throw new Error(j.error||"API error");
      setPipeline(j);
      setLoadError(null);
    }catch(e){
      setLoadError("No se pudo conectar al pipeline. ("+(e.message||"error")+")");
      setPipeline(null);
    }
    setLoading(false);
  };

  useEffect(()=>{loadPipeline(date);/* eslint-disable-next-line */},[date]);

  const openUpdate=item=>{
    setActiveItemId(item.id);
    setShowAllGhlNotes(false);
    setForm({
      lead:item.lead||"",
      closer:item.closer||COMERCIAL_CLOSERS[0],
      appointmentAt:item.appointmentAt||"",
      outcome:normalizeComercialOutcome(item.outcome||""),
      nextAction:item.nextAction||"",
      followUpAt:item.followUpAt?String(item.followUpAt).slice(0,10):"",
      note:item.note||"",
    });
  };
  const closeUpdate=()=>{setActiveItemId(null);setShowAllGhlNotes(false);};

  const handleSave=async()=>{
    if(!form.lead.trim()){alert("Falta el lead/cliente");return;}
    setSaving(true);
    setSyncStatus(null);
    const activeNow=activeItemId?(pipeline&&Array.isArray(pipeline.items)?pipeline.items.find(it=>it.id===activeItemId):null):null;
    const currentStageNow=activeNow?(activeNow.stage||(activeNow.pipelineStage!==activeNow.bucket?activeNow.pipelineStage:"")||activeNow.ghlStatus||""):"";
    const followUpAtIso=form.followUpAt?`${form.followUpAt}T09:00:00`:null;
    const payload={
      date,
      appointmentAt:form.appointmentAt||null,
      lead:form.lead.trim(),
      closer:form.closer,
      outcome:form.outcome,
      nextAction:form.nextAction.trim(),
      followUpAt:followUpAtIso,
      note:form.note.trim(),
      source:"dashboard",
      contactId:(activeNow&&activeNow.contactId)||null,
      opportunityId:(activeNow&&activeNow.opportunityId)||null,
      email:(activeNow&&activeNow.email)||null,
      phone:(activeNow&&activeNow.phone)||null,
      currentStage:currentStageNow||null,
    };
    try{
      const r=await fetch(CONTROL_NOTES_URL,{
        method:"POST",
        headers:{"content-type":"application/json"},
        body:JSON.stringify(payload),
      });
      if(!r.ok)throw new Error("HTTP "+r.status);
      const j=await r.json();
      if(!j.ok)throw new Error("API error");
      setSavedFlag(true);
      // Sync to GHL after internal save (best-effort, never fails the save).
      if(syncGhl && activeNow && activeNow.contactId){
        try{
          const token=(typeof localStorage!=="undefined"
            ?(localStorage.getItem("unlocked_admin_token")
              ||localStorage.getItem("commercial_control_sync_token")
              ||"")
            :"");
          const syncHeaders={"content-type":"application/json"};
          if(token)syncHeaders["X-Unlocked-Dashboard-Admin-Token"]=token;
          const syncPayload={
            contactId:activeNow.contactId,
            opportunityId:activeNow.opportunityId||null,
            lead:payload.lead,
            closer:payload.closer,
            outcome:payload.outcome,
            nextAction:payload.nextAction,
            followUpAt:payload.followUpAt,
            note:payload.note,
            date:payload.date,
            appointmentAt:payload.appointmentAt,
            currentStage:payload.currentStage,
          };
          const sr=await fetch(CONTROL_SYNC_URL,{
            method:"POST",
            headers:syncHeaders,
            body:JSON.stringify(syncPayload),
          });
          if(sr.status===401){
            setSyncStatus({kind:"warn",msg:"Guardado interno OK · GHL necesita token de sync."});
          }else if(sr.status===503){
            setSyncStatus({kind:"warn",msg:"Guardado interno OK · GHL no configurado en servidor."});
          }else if(!sr.ok){
            setSyncStatus({kind:"warn",msg:"Guardado interno OK · GHL respondió "+sr.status+"."});
          }else{
            const sj=await sr.json().catch(()=>({ok:false}));
            if(sj&&sj.ok){
              const oks=(Array.isArray(sj.actions)?sj.actions:[]).filter(a=>a&&a.ok).map(a=>a.kind);
              setSyncStatus({kind:"ok",msg:oks.length?("GHL sincronizado: "+oks.join(", ")):"GHL: nada que sincronizar."});
            }else{
              setSyncStatus({kind:"warn",msg:"Guardado interno OK · GHL no aceptó la sincronización."});
            }
          }
        }catch(_){
          setSyncStatus({kind:"warn",msg:"Guardado interno OK · no se pudo contactar al sync de GHL."});
        }
      }else if(syncGhl && activeNow && !activeNow.contactId){
        setSyncStatus({kind:"warn",msg:"Guardado interno OK · sin contactId para sincronizar."});
      }
      setActiveItemId(null);
      await loadPipeline(date);
      setTimeout(()=>setSavedFlag(false),2200);
    }catch(e){
      alert("Error guardando: "+(e.message||"error"));
    }
    setSaving(false);
  };

  const fmtTime=iso=>{
    if(!iso)return "—";
    const m=String(iso).match(/T(\d{2}):(\d{2})/)||String(iso).match(/\s(\d{2}):(\d{2})/);
    return m?`${m[1]}:${m[2]}`:"—";
  };
  const fmtDate=iso=>{
    if(!iso)return "—";
    return String(iso).slice(0,10)||"—";
  };
  const bucketMeta=k=>COMERCIAL_BUCKETS.find(b=>b.k===k)||COMERCIAL_BUCKETS[0];
  const outcomeColor=v=>(COMERCIAL_OUTCOMES.find(o=>o.v===v)||{}).c||"#64748B";

  const items=(pipeline&&Array.isArray(pipeline.items))?pipeline.items:[];
  const stats=(pipeline&&pipeline.stats)||{
    total:0,porAtender:0,atendidos:0,pendientes:0,followUp:0,
    hot:0,noShow:0,cerrados:0,sinProximaAccion:0,
  };
  const closers=(pipeline&&Array.isArray(pipeline.closers))?pipeline.closers:[];
  const source=(pipeline&&pipeline.source)||{agenda:"manual-only",fresh:false,warnings:[]};

  const byBucket=COMERCIAL_BUCKETS.reduce((acc,b)=>{acc[b.k]=[];return acc;},{});
  items.forEach(it=>{
    const k=byBucket[it.bucket]?it.bucket:"por_atender";
    byBucket[k].push(it);
  });

  const activeItem=activeItemId?items.find(it=>it.id===activeItemId)||null:null;
  const activePipelineStage=activeItem&&activeItem.pipelineStage!==activeItem.bucket?activeItem.pipelineStage:"";
  const activeStage=activeItem?(activeItem.stage||activePipelineStage||activeItem.ghlStatus||""):"";

  const fieldBox={background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:9,
    color:TXT,padding:"9px 11px",fontSize:13,outline:"none",
    fontFamily:"'Inter',sans-serif",fontWeight:500,height:38,width:"100%"};

  const renderItemCard=(it)=>{
    const meta=bucketMeta(it.bucket);
    const noNext=!it.nextAction||!String(it.nextAction).trim();
    const hasRisk=Array.isArray(it.riskFlags)&&it.riskFlags.length>0;
    const tempBadge=it.temperature==="HOT"?{c:C.red,label:"HOT"}:
      it.temperature==="WARM"?{c:C.amber,label:"WARM"}:null;
    return(
      <div key={it.id} className="cc-pipeline-card" style={{background:SURFACE2,border:`1px solid ${BORDER}`,
        borderRadius:10,padding:"10px 12px 10px 16px",position:"relative",overflow:"hidden",flexShrink:0}}>
        <div className="cc-pipeline-card-rail" style={{position:"absolute",left:0,top:0,bottom:0,width:1,background:meta.c}}/>
        <div className="cc-pipeline-card-head" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>
          <div className="cc-pipeline-card-headinfo" style={{display:"flex",alignItems:"center",gap:8,minWidth:0,flexWrap:"wrap"}}>
            <span className="cc-pipeline-time" style={{fontSize:12,fontWeight:700,color:TXT,fontFamily:"'JetBrains Mono',monospace"}}>{fmtTime(it.appointmentAt)}</span>
            <span className="cc-pipeline-lead-name" style={{fontSize:13,fontWeight:600,color:TXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:180}} title={it.lead}>{it.lead||"—"}</span>
            {tempBadge&&<span style={{fontSize:9,fontWeight:800,letterSpacing:"0.08em",
              color:tempBadge.c,background:tempBadge.c+"18",border:`1px solid ${tempBadge.c}40`,
              padding:"2px 6px",borderRadius:6}}>{tempBadge.label}</span>}
          </div>
          <button className="cc-pipeline-card-actualizar" onClick={()=>openUpdate(it)} style={{background:BRAND+"15",
            border:`1px solid ${BRAND}40`,borderRadius:7,padding:"3px 9px",fontSize:10,
            cursor:"pointer",color:BRAND,fontFamily:"'Inter',sans-serif",fontWeight:700,whiteSpace:"nowrap"}}>
            Actualizar
          </button>
        </div>
        <div className="cc-pipeline-card-meta" style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:TXT3,marginBottom:6,flexWrap:"wrap"}}>
          <span style={{fontFamily:"'Inter',sans-serif",fontWeight:600,color:TXT2}}>{it.closer||"Sin asignar"}</span>
          {it.ghlStatus&&<><span>•</span><span>{it.ghlStatus}</span></>}
          {it.stage&&it.stage!==it.ghlStatus&&<><span>•</span><span title={it.stage}>{String(it.stage).slice(0,18)}</span></>}
          {it.automationSource==="manual"&&<><span>•</span><span style={{color:C.amber,fontWeight:700}}>MANUAL</span></>}
        </div>
        {(it.outcome||it.nextAction||it.followUpAt||it.note)&&(
          <div style={{paddingTop:6,borderTop:`1px dashed ${BORDER}`,display:"flex",flexDirection:"column",gap:4}}>
            {it.outcome&&<div style={{fontSize:11,fontWeight:700,color:outcomeColor(it.outcome)}}>{it.outcome}</div>}
            {it.nextAction&&<div style={{fontSize:11,color:TXT}}>→ {it.nextAction}</div>}
            {it.followUpAt&&<div style={{fontSize:10,color:TXT2,fontFamily:"'JetBrains Mono',monospace"}}>Follow-up: {fmtDate(it.followUpAt)}</div>}
            {it.note&&<div style={{fontSize:10,color:TXT2,lineHeight:1.45,whiteSpace:"pre-wrap"}}>{it.note}</div>}
          </div>
        )}
        {hasRisk&&(
          <div style={{marginTop:6,fontSize:10,fontWeight:700,color:C.red,letterSpacing:"0.04em"}}>
            ⚠ {it.riskFlags.join(" · ")}
          </div>
        )}
        {!hasRisk&&noNext&&(it.bucket==="atendido"||it.bucket==="follow_up"||it.bucket==="no_show")&&(
          <div style={{marginTop:6,fontSize:10,fontWeight:700,color:C.amber}}>
            ⚠ Falta próxima acción
          </div>
        )}
      </div>
    );
  };

  const sourceBadge=(()=>{
    if(source.agenda==="appointments")return{c:C.green,label:"GHL agenda en vivo"};
    if(source.agenda==="crm-calls-fallback")return{c:C.amber,label:"Fallback: CRM calls"};
    return{c:C.red,label:"Solo notas manuales"};
  })();

  return(
    <div className="cc-control" style={{display:"flex",flexDirection:"column",gap:14}}>

      {/* Concept banner */}
      <Card style={{borderColor:BRAND+"55",background:BRAND+"08"}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
          <div style={{width:30,height:30,borderRadius:8,background:BRAND+"22",
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Icon name="clipboardCheck" size={14} color={BRAND}/>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:BRAND,letterSpacing:"-0.01em",marginBottom:3}}>
              Pipeline operativo del día
            </div>
            <div style={{fontSize:11,color:TXT2,lineHeight:1.55}}>
              GHL alimenta la cola; el closer confirma resultado y próximo paso. <b>Puede sincronizar nota/tarea/etapa con GHL cuando está activado.</b> Esto es la capa operativa diaria — no es Excel.
            </div>
          </div>
        </div>
      </Card>

      {/* Controls bar */}
      <Card>
        <div className="cc-controls-bar" style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <Lbl>Fecha operativa</Lbl>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)}
                style={{...fieldBox,width:170}}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <Lbl>Fuente</Lbl>
              <span style={{fontSize:11,fontWeight:700,color:sourceBadge.c,
                background:sourceBadge.c+"15",border:`1px solid ${sourceBadge.c}40`,
                padding:"7px 11px",borderRadius:8}}>
                {sourceBadge.label}{source.fresh?"":" · stale"}
              </span>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
            <button onClick={()=>loadPipeline(date)} disabled={loading} style={{
              background:"transparent",border:`1px solid ${BORDER}`,borderRadius:10,
              padding:"9px 16px",fontWeight:600,fontSize:12,cursor:"pointer",
              color:TXT2,fontFamily:"'Inter',sans-serif",opacity:loading?0.5:1}}>
              ↻ {loading?"Cargando...":"Refrescar"}
            </button>
            {savedFlag&&<div style={{fontSize:11,color:C.green,fontWeight:700}}>✓ Guardado</div>}
            {syncStatus&&(
              <div style={{fontSize:11,fontWeight:700,
                color:syncStatus.kind==="ok"?C.green:C.amber,
                background:(syncStatus.kind==="ok"?C.green:C.amber)+"15",
                border:`1px solid ${(syncStatus.kind==="ok"?C.green:C.amber)}40`,
                padding:"6px 10px",borderRadius:8,
                fontFamily:"'Inter',sans-serif"}}>
                {syncStatus.msg}
              </div>
            )}
          </div>
        </div>
        {Array.isArray(source.warnings)&&source.warnings.length>0&&(
          <div style={{marginTop:10,fontSize:11,color:C.amber,lineHeight:1.5}}>
            {source.warnings.map((w,i)=>(<div key={i}>⚠ {w}</div>))}
          </div>
        )}
      </Card>

      {/* KPI cards */}
      <div className="cc-kpi-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8}}>
        <Stat label="Total en pipeline" value={fN(stats.total)} color={C.blue}/>
        <Stat label="Por atender" value={fN(stats.porAtender)} color={C.amber}/>
        <Stat label="Atendidos" value={fN(stats.atendidos)} color={C.green}/>
        <Stat label="Follow-up / HOT" value={fN(stats.followUp)} sub={stats.hot?`HOT: ${stats.hot}`:""} color={C.orange}/>
        <Stat label="Cerrados" value={fN(stats.cerrados)} color={C.green}/>
        <Stat label="No show" value={fN(stats.noShow)} color={C.red}/>
        <Stat label="Sin próxima acción" value={fN(stats.sinProximaAccion)} color={stats.sinProximaAccion>0?C.red:TXT3}/>
      </div>

      {/* Errors / loading / empty */}
      {loadError&&(
        <Card style={{borderColor:C.red+"55",background:C.red+"08"}}>
          <div style={{fontSize:12,color:C.red,fontWeight:500}}>{loadError}</div>
        </Card>
      )}
      {loading&&!loadError&&!pipeline&&(
        <Card>
          <div style={{textAlign:"center",padding:"24px",color:TXT3,fontSize:12,
            fontFamily:"'Inter',sans-serif"}}>Cargando pipeline...</div>
        </Card>
      )}

      {/* Closer scorecards */}
      {closers.length>0&&(
        <Card>
          <STit title="Disciplina por closer" sub="Score 0-100 según show, follow-up y cierres del día"/>
          <div className="cc-closer-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:10}}>
            {closers.map(c=>{
              const scoreColor=c.score>=70?C.green:c.score>=45?C.amber:C.red;
              return(
                <div key={c.closer} className="cc-closer-card" style={{background:SURFACE2,border:`1px solid ${BORDER}`,
                  borderRadius:10,padding:"11px 13px"}}>
                  <div className="cc-closer-head" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,gap:10}}>
                    <span className="cc-closer-name" style={{fontSize:12,fontWeight:700,color:TXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}} title={c.closer}>{c.closer}</span>
                    <span className="cc-closer-score" style={{fontSize:18,fontWeight:800,color:scoreColor,fontFamily:"'Inter',sans-serif",letterSpacing:"-0.04em"}}>{c.score}</span>
                  </div>
                  <Barz value={c.score} max={100} color={scoreColor} h={5}/>
                  <div className="cc-closer-metrics" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4,marginTop:8,fontSize:10}}>
                    <div className="cc-closer-metric"><Lbl style={{marginBottom:1}}>Total</Lbl><div style={{fontWeight:700,color:TXT}}>{c.total}</div></div>
                    <div className="cc-closer-metric"><Lbl style={{marginBottom:1}}>Cerrados</Lbl><div style={{fontWeight:700,color:C.green}}>{c.cerrados}</div></div>
                    <div className="cc-closer-metric"><Lbl style={{marginBottom:1}}>Pendientes</Lbl><div style={{fontWeight:700,color:c.porAtender>0?C.amber:TXT3}}>{c.porAtender}</div></div>
                    <div className="cc-closer-metric"><Lbl style={{marginBottom:1}}>Atendidos</Lbl><div style={{fontWeight:700,color:C.blue}}>{c.atendidos}</div></div>
                    <div className="cc-closer-metric"><Lbl style={{marginBottom:1}}>No show</Lbl><div style={{fontWeight:700,color:c.noShow>0?C.red:TXT3}}>{c.noShow}</div></div>
                    <div className="cc-closer-metric"><Lbl style={{marginBottom:1}}>Sin acción</Lbl><div style={{fontWeight:700,color:c.sinProximaAccion>0?C.red:TXT3}}>{c.sinProximaAccion}</div></div>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {/* Update form (only when a card is being edited) */}
      {activeItemId&&(
        <Card style={{borderColor:BRAND+"55"}}>
          <STit title="Actualizar registro" sub="Muestra datos de GHL para identificar el contacto. Se guarda en el panel interno y, si está activado, sincroniza con GHL."
            right={<button onClick={closeUpdate} style={{background:"transparent",border:`1px solid ${BORDER}`,borderRadius:8,
              padding:"4px 10px",fontSize:11,color:TXT2,cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>Cerrar</button>}/>
          {activeItem&&(
            <div className="cc-ghl-readonly" style={{background:SURFACE2,border:`1px solid ${BORDER}`,
              borderRadius:10,padding:"10px 12px",marginBottom:10,display:"flex",flexDirection:"column",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={{fontSize:10,fontWeight:800,letterSpacing:"0.08em",color:BRAND,
                  background:BRAND+"15",border:`1px solid ${BRAND}40`,padding:"2px 7px",borderRadius:6}}>
                  DATOS GHL
                </span>
                <span style={{fontSize:10,color:TXT3,fontFamily:"'Inter',sans-serif"}}>
                  solo lectura · para ubicar el contacto en GHL
                </span>
              </div>
              <div className="cc-ghl-readonly-grid" style={{display:"grid",
                gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:8}}>
                <div style={{display:"flex",flexDirection:"column",gap:2,minWidth:0}}>
                  <Lbl>Email</Lbl>
                  <div style={{fontSize:12,color:TXT,fontFamily:"'JetBrains Mono',monospace",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",userSelect:"all"}}
                    title={activeItem.email||""}>{activeItem.email||"—"}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:2,minWidth:0}}>
                  <Lbl>Teléfono</Lbl>
                  <div style={{fontSize:12,color:TXT,fontFamily:"'JetBrains Mono',monospace",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",userSelect:"all"}}
                    title={activeItem.phone||""}>{activeItem.phone||"—"}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:2,minWidth:0}}>
                  <Lbl>Etapa GHL</Lbl>
                  <div style={{fontSize:12,color:TXT,fontWeight:600,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                    title={activeStage||""}>{activeStage||"—"}</div>
                </div>
              </div>
              {(activeItem.contactId||activeItem.opportunityId)&&(
                <div style={{display:"flex",gap:10,flexWrap:"wrap",fontSize:10,color:TXT3,
                  fontFamily:"'JetBrains Mono',monospace",paddingTop:4,borderTop:`1px dashed ${BORDER}`}}>
                  {activeItem.contactId&&<span style={{userSelect:"all"}} title="contactId">
                    contact: {String(activeItem.contactId).slice(0,10)}…
                  </span>}
                  {activeItem.opportunityId&&<span style={{userSelect:"all"}} title="opportunityId">
                    opp: {String(activeItem.opportunityId).slice(0,10)}…
                  </span>}
                </div>
              )}
            </div>
          )}
          <div className="cc-update-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:10}}>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <Lbl>Lead</Lbl>
              <input type="text" value={form.lead}
                onChange={e=>sf("lead",e.target.value)} style={fieldBox}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <Lbl>Closer</Lbl>
              <input type="text" value={form.closer}
                onChange={e=>sf("closer",e.target.value)} style={fieldBox}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <Lbl>Resultado</Lbl>
              <select value={form.outcome} onChange={e=>sf("outcome",e.target.value)}
                style={{...fieldBox,cursor:"pointer"}}>
                {COMERCIAL_OUTCOMES.map(o=><option key={o.v} value={o.v}>{o.v}</option>)}
              </select>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <Lbl>Próxima acción</Lbl>
              <input type="text" value={form.nextAction}
                onChange={e=>sf("nextAction",e.target.value)}
                placeholder="Ej. enviar oferta, llamar..." style={fieldBox}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <Lbl>Follow-up</Lbl>
              <input type="date" value={form.followUpAt}
                onChange={e=>sf("followUpAt",e.target.value)} style={fieldBox}/>
            </div>
          </div>
          {activeItem&&(activeItem.ghlNote||activeItem.fathomNote)!==undefined&&(()=>{
            const ghlNotesArr=Array.isArray(activeItem.ghlNotes)?activeItem.ghlNotes.filter(n=>n&&String(n.body||"").trim()):[];
            const fallbackNote=String(activeItem.ghlNote||"").trim();
            const notes=ghlNotesArr.length>0
              ?ghlNotesArr
              :(fallbackNote?[{id:"",body:fallbackNote,createdAt:""}]:[]);
            const latestBody=(notes[0]&&notes[0].body)||fallbackNote||"";
            const noteCount=notes.length;
            const hasMultiple=noteCount>1;
            const fmtNoteDate=(s)=>{
              if(!s) return "";
              const d=new Date(s);
              if(Number.isNaN(d.getTime())) return "";
              try{return d.toLocaleDateString("es",{day:"2-digit",month:"short",year:"2-digit"});}
              catch(_e){return "";}
            };
            return(
            <div className="cc-external-notes" style={{display:"grid",
              gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:8,marginTop:10}}>
              <div style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:9,
                padding:"8px 10px",display:"flex",flexDirection:"column",gap:6,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:10,fontWeight:800,letterSpacing:"0.08em",color:BRAND,
                    background:BRAND+"15",border:`1px solid ${BRAND}40`,padding:"2px 6px",borderRadius:6}}>
                    NOTA GHL
                  </span>
                  <span style={{fontSize:9,color:TXT3,fontFamily:"'Inter',sans-serif"}}>solo lectura</span>
                  {hasMultiple&&(
                    <span style={{fontSize:9,fontWeight:700,color:TXT2,
                      background:BORDER,border:`1px solid ${BORDER}`,
                      padding:"1px 6px",borderRadius:999,fontFamily:"'Inter',sans-serif"}}>
                      {noteCount} notas
                    </span>
                  )}
                  {hasMultiple&&(
                    <button type="button"
                      onClick={()=>setShowAllGhlNotes(v=>!v)}
                      style={{marginLeft:"auto",background:"transparent",
                        border:`1px solid ${BORDER}`,borderRadius:6,
                        padding:"2px 8px",fontSize:10,fontWeight:700,color:TXT2,
                        cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>
                      {showAllGhlNotes?"Ocultar":"Ver todas"}
                    </button>
                  )}
                </div>
                {!showAllGhlNotes&&(
                  <div style={{fontSize:12,color:latestBody?TXT:TXT3,whiteSpace:"pre-wrap",
                    wordBreak:"break-word",fontFamily:"'Inter',sans-serif",lineHeight:1.4,
                    maxHeight:140,overflowY:"auto"}}>
                    {latestBody||"Sin nota GHL para este contacto."}
                  </div>
                )}
                {showAllGhlNotes&&(
                  <div style={{display:"flex",flexDirection:"column",gap:6,
                    maxHeight:280,overflowY:"auto",paddingRight:2}}>
                    {notes.map((n,i)=>{
                      const dt=fmtNoteDate(n.createdAt);
                      return(
                        <div key={n.id||`gn-${i}`} style={{background:SURFACE,
                          border:`1px solid ${BORDER}`,borderRadius:8,padding:"7px 9px",
                          display:"flex",flexDirection:"column",gap:3,minWidth:0}}>
                          {dt&&(
                            <div style={{fontSize:9,fontWeight:700,color:TXT3,
                              letterSpacing:"0.04em",fontFamily:"'JetBrains Mono',monospace"}}>
                              {dt}
                            </div>
                          )}
                          <div style={{fontSize:12,color:TXT,whiteSpace:"pre-wrap",
                            wordBreak:"break-word",fontFamily:"'Inter',sans-serif",lineHeight:1.4}}>
                            {n.body}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
              <div style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:9,
                padding:"8px 10px",display:"flex",flexDirection:"column",gap:4,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:10,fontWeight:800,letterSpacing:"0.08em",color:BRAND,
                    background:BRAND+"15",border:`1px solid ${BRAND}40`,padding:"2px 6px",borderRadius:6}}>
                    NOTA FATHOM
                  </span>
                  <span style={{fontSize:9,color:TXT3,fontFamily:"'Inter',sans-serif"}}>solo lectura</span>
                </div>
                <div style={{fontSize:12,color:activeItem.fathomNote?TXT:TXT3,whiteSpace:"pre-wrap",
                  wordBreak:"break-word",fontFamily:"'Inter',sans-serif",lineHeight:1.4,
                  maxHeight:140,overflowY:"auto"}}>
                  {activeItem.fathomNote||"Sin contexto de llamada (Fathom)."}
                </div>
              </div>
            </div>
            );
          })()}
          <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:10}}>
            <Lbl>Nuestra nota para subir a GHL</Lbl>
            <textarea value={form.note} onChange={e=>sf("note",e.target.value)} rows={2}
              placeholder="Lo que escribas aquí se guarda en el panel y se sincroniza a GHL como nota nueva."
              style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:9,
                color:TXT,padding:"9px 11px",fontSize:13,outline:"none",
                fontFamily:"'Inter',sans-serif",fontWeight:500,resize:"vertical",minHeight:54,width:"100%"}}/>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",marginTop:12,flexWrap:"wrap"}}>
            <button onClick={handleSave} disabled={saving} style={{
              background:BRAND,color:"#fff",border:"none",borderRadius:10,
              padding:"10px 22px",fontWeight:700,fontSize:13,
              cursor:saving?"wait":"pointer",fontFamily:"'Inter',sans-serif",
              opacity:saving?0.6:1}}>
              {saving?"Guardando...":(syncGhl?"Guardar y sincronizar":"Guardar registro")}
            </button>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",
              fontFamily:"'Inter',sans-serif",userSelect:"none"}}>
              <input type="checkbox" checked={syncGhl}
                onChange={e=>setSyncGhl(e.target.checked)}
                style={{width:16,height:16,cursor:"pointer",accentColor:BRAND}}/>
              <span style={{display:"flex",flexDirection:"column",gap:1}}>
                <span style={{fontSize:12,fontWeight:700,color:TXT}}>Sincronizar con GHL</span>
                <span style={{fontSize:10,color:TXT3,lineHeight:1.35}}>
                  crea nota/tarea y mueve etapa cuando aplique
                </span>
              </span>
            </label>
            {syncStatus&&(
              <div style={{fontSize:11,fontWeight:700,
                color:syncStatus.kind==="ok"?C.green:C.amber,
                background:(syncStatus.kind==="ok"?C.green:C.amber)+"15",
                border:`1px solid ${(syncStatus.kind==="ok"?C.green:C.amber)}40`,
                padding:"6px 10px",borderRadius:8,
                fontFamily:"'Inter',sans-serif"}}>
                {syncStatus.msg}
              </div>
            )}
          </div>
        </Card>
      )}

      {/* Pipeline columns — horizontal scroll on mobile, grid on desktop */}
      {!loading&&!loadError&&items.length===0&&(
        <Card>
          <div style={{textAlign:"center",padding:"30px",color:TXT3,fontSize:12,
            fontFamily:"'Inter',sans-serif"}}>
            Sin items en pipeline para <b style={{color:TXT2,fontFamily:"'JetBrains Mono',monospace"}}>{date}</b>.
          </div>
        </Card>
      )}

      {items.length>0&&(
        <div className="cc-pipeline-board" style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:6}}>
          {COMERCIAL_BUCKETS.map(b=>{
            const list=byBucket[b.k]||[];
            return(
              <div key={b.k} className="cc-pipeline-col" style={{flex:"0 0 280px",maxWidth:320,
                background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:14,
                padding:"12px 12px 14px",display:"flex",flexDirection:"column",gap:8}}>
                <div className="cc-pipeline-col-head" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:6,height:6,borderRadius:100,background:b.c}}/>
                    <span style={{fontSize:12,fontWeight:700,color:TXT,letterSpacing:"-0.01em"}}>{b.label}</span>
                  </div>
                  <span style={{fontSize:10,color:TXT3,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{list.length}</span>
                </div>
                <div className="cc-pipeline-list" style={{display:"flex",flexDirection:"column",gap:8,maxHeight:520,overflowY:"auto"}}>
                  {list.length===0&&(
                    <div className="cc-pipeline-empty" style={{fontSize:11,color:TXT3,textAlign:"center",padding:"14px 0",fontFamily:"'Inter',sans-serif"}}>—</div>
                  )}
                  {list.map(renderItemCard)}
                </div>
              </div>
            );
          })}
        </div>
      )}

    </div>
  );
};

// ─── APP PRINCIPAL ────────────────────────────────────────────────────────────
const TABS=[
  {id:"torre",   l:"Torre CEO",          icon:"home"},
  {id:"closer",  l:"Area Comercial",     icon:"dollar"},
  {id:"control", l:"Control Comercial",  icon:"clipboardCheck"},
  {id:"entrada", l:"Marketing",          icon:"rocket"},
  {id:"agendas", l:"Agendas / Leads",    icon:"calendar"},
  {id:"equipo",  l:"Resumen Equipo",     icon:"users"},
  {id:"funnel",  l:"Funnel",             icon:"filter"},
  {id:"detalle", l:"Detalle Diario",     icon:"barChart"},
  {id:"colab",   l:"Por Colaborador",    icon:"users"},
  {id:"hist",    l:"Histórico",          icon:"trendUp"},
  {id:"operaciones", l:"Operaciones", icon:"users", children:[
    {id:"operaciones-estudiantes", l:"Estudiantes", href:"/operaciones/estudiantes"},
    {id:"operaciones-cartera", l:"Cartera", href:"/operaciones/cartera"},
    {id:"operaciones-mentores", l:"Mentores", href:"/operaciones/mentores"},
    {id:"operaciones-importar", l:"Importar Excel", href:"/operaciones/importar"},
  ]},
  {id:"admin",   l:"Admin",              icon:"settings"},
];

const MOBILE_TABS=[
  TABS.find(t=>t.id==="control"),
  TABS.find(t=>t.id==="torre"),
  TABS.find(t=>t.id==="closer"),
  TABS.find(t=>t.id==="agendas"),
  TABS.find(t=>t.id==="entrada"),
  TABS.find(t=>t.id==="equipo"),
  TABS.find(t=>t.id==="funnel"),
  TABS.find(t=>t.id==="detalle"),
  TABS.find(t=>t.id==="colab"),
  TABS.find(t=>t.id==="hist"),
  TABS.find(t=>t.id==="operaciones"),
  TABS.find(t=>t.id==="admin"),
].filter(Boolean);

function App(){
  const [isDark,setIsDark]=useState(()=>localStorage.getItem("theme")==="dark");
  applyTheme(isDark);
  const toggleTheme=()=>{const n=!isDark;setIsDark(n);localStorage.setItem("theme",n?"dark":"light");};
  const [tab,setTab]=useState(()=>{
    const requested=new URLSearchParams(window.location.search).get("tab");
    return TABS.some(t=>t.id===requested&&!t.children)?requested:"torre";
  });
  const [openSubmenu,setOpenSubmenu]=useState(null);
  const [embedUrl,setEmbedUrl]=useState(null);
  const [year,setYear]=useState(new Date().getFullYear());
  const [month,setMonth]=useState(new Date().getMonth());
  const [kpiData,setKpiData]=useState({});
  const [daily,setDaily]=useState({});
  const [ready,setReady]=useState(false);
  const [closerData,setCloserData]=useState({});
  const [error,setError]=useState(null);
  const [me,setMe]=useState(null);

  // Identity + capabilities (drives the admin link and the scope banner). The
  // server is the real authorization boundary; this only shapes the UI.
  useEffect(()=>{
    let alive=true;
    fetch("/api/auth/me",{credentials:"same-origin"})
      .then(r=>r.ok?r.json():null)
      .then(d=>{if(alive&&d&&d.user)setMe(d.user);})
      .catch(()=>{});
    return()=>{alive=false;};
  },[]);

  const canManage=!!(me&&me.canManageUsers);
  const caps=(me&&me.capabilities)||null;
  const scopeLimited=!!(caps&&!caps.isGlobalData);
  // Hide the Admin tab unless the user can manage users.
  const visibleTabs=TABS.filter(t=>t.id!=="admin"||canManage);
  const visibleMobileTabs=MOBILE_TABS.filter(t=>t&&(t.id!=="admin"||canManage));
  // If the user landed on a now-hidden tab, fall back to the default view.
  useEffect(()=>{
    if(me&&!canManage&&tab==="admin")setTab("torre");
  },[me,canManage,tab]);

  useEffect(()=>{
    (async()=>{
      try{
        const [{data:kpiRows,error:e1},{data:dailyRows,error:e2},{data:adsRows,error:e3},{data:closerRows,error:e4}]=await Promise.all([
          db.from("kpi_data").select("*"),
          db.from("daily_entries").select("*"),
          db.from("ads_entries").select("*"),
          db.from("daily_closer").select("*"),
        ]);
        const dataError=e1||e2||e3||e4;
        if(dataError){
          if(dataError.status===401){window.location.href="/login?next=/";return;}
          if(dataError.status===403)throw new Error(dataError.message||"No tienes permiso para ver estos datos.");
          throw new Error(dataError.message||"DB error");
        }
        const kpiObj={};
        kpiRows?.forEach(row=>{
          const key=`kpi:${row.year}-${row.month}`;
          kpiObj[key]={
            funnel:{revenue:row.revenue?.toString()||"",adSpend:row.ad_spend?.toString()||"",
              leads:row.leads?.toString()||"",agendas:row.agendas?.toString()||"",
              shows:row.shows?.toString()||"",cierres:row.cierres?.toString()||""},
            meta:{revenue:row.meta_revenue?.toString()||"150000"},
            day:row.day||new Date().getDate(),ads:[],
            pct_leads_agendadas:row.pct_leads_agendadas?.toString()||"45",
            pct_agendadas_asistidas:row.pct_agendadas_asistidas?.toString()||"70",
            close_rate_meta:row.close_rate_meta?.toString()||"25",
            inversion_planeada:row.inversion_planeada?.toString()||"0",
            roas_objetivo:row.roas_objetivo?.toString()||"4",
          };
        });
        adsRows?.forEach(row=>{
          const key=`kpi:${row.year}-${row.month}`;
          if(!kpiObj[key])kpiObj[key]={funnel:{revenue:"",adSpend:"",leads:"",agendas:"",shows:"",cierres:""},meta:{revenue:"150000"},day:new Date().getDate(),ads:[]};
          kpiObj[key].ads.push({id:row.id,fecha:row.fecha,canal:row.canal,
            gasto:row.gasto||0,impresiones:row.impresiones||0,clicks:row.clicks||0,revenue:row.revenue||0});
        });
        const dailyObj={};
        dailyRows?.forEach(row=>{dailyObj[`${row.date}:${row.member}`]=rowToEntry(row);});
        const closerObj={};
        closerRows?.forEach(row=>{closerObj[row.date]=row;});
        setCloserData(closerObj);
        setKpiData(kpiObj);
        setDaily(dailyObj);
      }catch(e){
        setError(e?.message||"Error conectando a la base de datos. Verifica tu conexión a internet.");
        console.error(e);
      }
      setReady(true);
    })();
  },[]);

  const kk=`kpi:${year}-${month}`;
  const kpi=kpiData[kk]||{funnel:{revenue:"",adSpend:"",leads:"",agendas:"",shows:"",cierres:""},meta:{revenue:"150000"},day:new Date().getDate(),ads:[]};

  const upKpi=async(f,v)=>{
    const nd={...kpiData,[kk]:{...kpi,funnel:{...kpi.funnel,[f]:v}}};
    setKpiData(nd);
    const k=nd[kk];
    await db.from("kpi_data").upsert({
      year,month,
      revenue:nv(k.funnel.revenue),ad_spend:nv(k.funnel.adSpend),
      leads:nv(k.funnel.leads),agendas:nv(k.funnel.agendas),
      shows:nv(k.funnel.shows),cierres:nv(k.funnel.cierres),
      meta_revenue:nv(k.meta.revenue),day:k.day,
    },{onConflict:"year,month"});
  };

  const saveEntry=async(key,entry)=>{
    const nd={...daily,[key]:entry};
    setDaily(nd);
    // Marketing columns are always written; closer columns get the manual values
    // when present (commercial collaborators) or default to 0 (marketing rows).
    const {error}=await db.from("daily_entries").upsert({
      date:entry.date,member:entry.member,
      ig_followers:entry.igFollowers||0,
      posts:entry.posts||0,mensajes:entry.mensajes||0,
      follow_ups:entry.followUps||0,bk_offers:entry.bkOffers||0,
      gasto_meta:entry.gastoMeta||0,gasto_google:entry.gastoGoogle||0,
      gasto_tiktok:entry.gastoTikTok||0,gasto_otros:entry.gastoOtros||0,
      new_bk_organic:entry.agendas||0,
      qual_bk_organic:entry.calificadas||0,
      today_bk_organic:entry.agendasHoy||0,
      show_organic:entry.showUps||0,
      sales_organic:entry.ventasHT||0,
      revenue_organic:entry.valorVentaHT||0,
      cash_organic:entry.upfrontCash||0,
      recurring_organic:entry.recurringCash||0,
      pitches_organic:entry.pendDiaAnterior||0,
      pitches_paid:entry.pendAcumulados||0,
      reservas_organic:entry.reservas||0,
    },{onConflict:"date,member"});
    if(error){alert("Error guardando: "+error.message);return false;}
    return true;
  };

  const saveCloserEntry=async(date,data)=>{
    // compute totals from channel splits (keep old columns in sync for Torre CEO)
    const agendas_calificadas=(data.cal_organicas||0)+(data.cal_meta||0)+(data.cal_google||0)+(data.cal_tiktok||0)+(data.cal_otros||0);
    const agendas_final=(data.hoy_organicas||0)+(data.hoy_meta||0)+(data.hoy_google||0)+(data.hoy_tiktok||0)+(data.hoy_otros||0);
    const citas_asistidas=(data.show_organicas||0)+(data.show_meta||0)+(data.show_google||0)+(data.show_tiktok||0)+(data.show_otros||0);
    const merged={...data,agendas_calificadas,agendas_final,citas_asistidas};
    const nd={...closerData,[date]:merged};
    setCloserData(nd);
    await db.from("daily_closer").upsert({
      date:data.date||date,
      q_ventas_ht:data.q_ventas_ht||0,valor_venta_ht:data.valor_venta_ht||0,
      upfront_cash_ht:data.upfront_cash_ht||0,ventas_cash:data.ventas_cash||0,recurring_cash:data.recurring_cash||0,
      q_ventas_lt:data.q_ventas_lt||0,valor_venta_lt:data.valor_venta_lt||0,
      total_clientes_activos:data.total_clientes_activos||0,
      q_reservas:data.q_reservas||0,cash_reservas:data.cash_reservas||0,
      q_reembolsos:data.q_reembolsos||0,valor_reembolsos:data.valor_reembolsos||0,
      agendas_organicas:data.agendas_organicas||0,agendas_meta:data.agendas_meta||0,
      agendas_google:data.agendas_google||0,agendas_tiktok:data.agendas_tiktok||0,agendas_otros:data.agendas_otros||0,
      cal_organicas:data.cal_organicas||0,cal_meta:data.cal_meta||0,
      cal_google:data.cal_google||0,cal_tiktok:data.cal_tiktok||0,cal_otros:data.cal_otros||0,
      hoy_organicas:data.hoy_organicas||0,hoy_meta:data.hoy_meta||0,
      hoy_google:data.hoy_google||0,hoy_tiktok:data.hoy_tiktok||0,hoy_otros:data.hoy_otros||0,
      show_organicas:data.show_organicas||0,show_meta:data.show_meta||0,
      show_google:data.show_google||0,show_tiktok:data.show_tiktok||0,show_otros:data.show_otros||0,
      agendas_calificadas,agendas_final,citas_asistidas,
    },{onConflict:"date"});
  };

  const saveKpiConfig=async(configObj)=>{
    const nd={...kpiData,[kk]:{...kpi,
      meta:{revenue:configObj.meta_revenue?.toString()||kpi.meta.revenue},
      day:configObj.day||kpi.day,
      pct_leads_agendadas:configObj.pct_leads_agendadas?.toString()||kpi.pct_leads_agendadas,
      pct_agendadas_asistidas:configObj.pct_agendadas_asistidas?.toString()||kpi.pct_agendadas_asistidas,
      close_rate_meta:configObj.close_rate_meta?.toString()||kpi.close_rate_meta,
      inversion_planeada:configObj.inversion_planeada?.toString()||kpi.inversion_planeada,
      roas_objetivo:configObj.roas_objetivo?.toString()||kpi.roas_objetivo,
    }};
    setKpiData(nd);
    await db.from("kpi_data").upsert({
      year,month,
      meta_revenue:configObj.meta_revenue,
      day:configObj.day,
      pct_leads_agendadas:configObj.pct_leads_agendadas,
      pct_agendadas_asistidas:configObj.pct_agendadas_asistidas,
      close_rate_meta:configObj.close_rate_meta,
      inversion_planeada:configObj.inversion_planeada,
      roas_objetivo:configObj.roas_objetivo,
      revenue:nv(kpi.funnel.revenue),
      ad_spend:nv(kpi.funnel.adSpend),
      leads:nv(kpi.funnel.leads),
      agendas:nv(kpi.funnel.agendas),
      shows:nv(kpi.funnel.shows),
      cierres:nv(kpi.funnel.cierres),
    },{onConflict:"year,month"});
  };

  const addAd=async(e)=>{
    const {data}=await db.from("ads_entries").insert({
      year,month,fecha:e.fecha,canal:e.canal,
      gasto:nv(e.gasto)||0,impresiones:nv(e.impresiones)||0,
      clicks:nv(e.clicks)||0,revenue:nv(e.revenue)||0,
    }).select().single();
    const nd={...kpiData,[kk]:{...kpi,ads:[...(kpi.ads||[]),{...e,id:data?.id}]}};
    setKpiData(nd);
  };

  const rmAd=async(id)=>{
    await db.from("ads_entries").delete().eq("id",id);
    const nd={...kpiData,[kk]:{...kpi,ads:(kpi.ads||[]).filter(e=>e.id!==id)}};
    setKpiData(nd);
  };

  const deleteEntry=async(date,member)=>{
    await db.from("daily_entries").delete().match({date,member});
    const key=`${date}:${member}`;
    const nd={...daily};
    delete nd[key];
    setDaily(nd);
  };

  const allKpi=Object.fromEntries(Object.entries(kpiData).filter(([k])=>k.startsWith("kpi:")));
  const prefix=`${year}-${String(month+1).padStart(2,"0")}`;
  const mEntries=Object.entries(daily).filter(([k])=>k.startsWith(prefix)).map(([,v])=>v);
  const mShows=sumF(mEntries,"showsTotal"),mQual=sumF(mEntries,"qualBkTotal");
  const alertShow=mQual>0&&pv(mShows,mQual)<40;

  if(!ready)return(
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",
      height:"100vh",background:BG,flexDirection:"column",gap:20}}>
      <img src="logo.png" alt="Unlocked" style={{width:52,height:52,objectFit:"contain"}}
        onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="flex";}}/>
      <div style={{display:"none",width:48,height:48,borderRadius:14,
        background:`linear-gradient(135deg,${BRAND},${BRAND2})`,
        alignItems:"center",justifyContent:"center",
        fontSize:20,fontWeight:900,color:"#fff",boxShadow:`0 0 30px ${BRAND}40`}}>U</div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
        <div style={{color:TXT,fontFamily:"'Inter',sans-serif",fontSize:13,fontWeight:600,letterSpacing:"-0.01em"}}>
          Torre de Control
        </div>
        <div style={{color:TXT3,fontFamily:"'Inter',sans-serif",fontSize:11,letterSpacing:"0.06em",textTransform:"uppercase"}}>
          Cargando datos...
        </div>
      </div>
    </div>
  );

  if(error)return(
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",background:BG}}>
      <div style={{background:SURFACE,border:`1px solid ${C.red}40`,borderRadius:16,padding:"32px 36px",
        textAlign:"center",maxWidth:400}}>
        <div style={{width:44,height:44,borderRadius:12,background:C.red+"18",display:"flex",
          alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
          <Icon name="megaphone" size={20} color={C.red}/>
        </div>
        <div style={{color:C.red,fontSize:12,lineHeight:1.8,fontFamily:"'Inter',sans-serif"}}>{error}</div>
      </div>
    </div>
  );

  return(
    <>
      <style>{`
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{background:${BG};font-family:'Inter',sans-serif;color:${TXT};height:100%;overflow:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:${BG}}
        ::-webkit-scrollbar-thumb{background:${BORDER2};border-radius:4px}
        ::-webkit-scrollbar-thumb:hover{background:#2D3A50}
        input[type=number]{-moz-appearance:textfield}
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
        input::placeholder{color:${TXT3}}
        input:focus,select:focus{outline:none;border-color:${BRAND}!important;box-shadow:0 0 0 3px ${BRAND}20!important}
        select option{background:${SURFACE2};color:${TXT}}
        button{transition:all .15s ease}
        .fade-in{animation:fi .22s ease}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
        .sidebar-item:hover{background:${SURFACE2}!important;color:${TXT}!important}
        .sidebar-item.active{background:${BRAND}18!important;color:${BRAND}!important;border-left:2px solid ${BRAND}!important}
        .tab-btn:hover{background:${SURFACE2}!important}
        @media (max-width:767px){
          .sidebar{display:none!important}
          .main-content{margin-left:0!important}
          .mobile-nav{display:flex!important}
          .mobile-topbar-extra{display:none!important}
          .page-content{padding:12px 12px 96px!important}
          .cc-control{gap:10px!important}
          .cc-control > div{border-radius:14px!important;padding:14px!important}
          .cc-controls-bar{align-items:stretch!important;gap:12px!important}
          .cc-controls-bar > div{width:100%!important;display:grid!important;grid-template-columns:minmax(0,1fr)!important;gap:10px!important}
          .cc-controls-bar input[type=date]{width:100%!important;height:42px!important;font-size:14px!important}
          .cc-controls-bar button{width:100%!important;justify-content:center!important;padding:11px 14px!important}
          .cc-kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:8px!important}
          .cc-closer-grid{display:grid!important;grid-template-columns:minmax(0,1fr)!important;gap:8px!important;overflow:visible!important;padding-bottom:0!important;scroll-snap-type:none!important}
          .cc-closer-card{min-width:0!important;width:100%!important;padding:12px!important;border-radius:14px!important}
          .cc-closer-head{align-items:flex-start!important;margin-bottom:10px!important}
          .cc-closer-name{max-width:none!important;white-space:normal!important;overflow:visible!important;text-overflow:clip!important;font-size:13px!important;line-height:1.25!important;padding-top:2px!important}
          .cc-closer-score{font-size:22px!important;line-height:1!important;min-width:42px!important;text-align:right!important}
          .cc-closer-metrics{grid-template-columns:repeat(3,minmax(0,1fr))!important;gap:6px!important;margin-top:10px!important;font-size:11px!important}
          .cc-closer-metric{background:${SURFACE}!important;border:1px solid ${BORDER}!important;border-radius:10px!important;padding:7px 6px!important;min-width:0!important;text-align:left!important}
          .cc-closer-metric > div:first-child{font-size:8px!important;letter-spacing:.08em!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
          .cc-closer-metric > div:last-child{font-size:15px!important;line-height:1.1!important}
          .cc-update-grid{grid-template-columns:minmax(0,1fr)!important}
          .cc-pipeline-board{display:flex!important;flex-direction:column!important;overflow-x:visible!important;gap:12px!important;padding-bottom:0!important}
          .cc-pipeline-col{flex:1 1 auto!important;width:100%!important;max-width:none!important;padding:12px!important;border-radius:16px!important}
          .cc-pipeline-col-head{padding-bottom:2px!important}
          .cc-pipeline-list{max-height:none!important;overflow-y:visible!important;gap:8px!important}
          .cc-pipeline-empty{padding:8px 0!important}
          .cc-pipeline-card{padding:12px!important;border-radius:14px!important;overflow:visible!important}
          .cc-pipeline-card-rail{display:none!important}
          .cc-pipeline-card-head{display:grid!important;grid-template-columns:minmax(0,1fr) auto!important;align-items:start!important;gap:10px!important;margin-bottom:8px!important}
          .cc-pipeline-card-headinfo{display:grid!important;grid-template-columns:auto minmax(0,1fr)!important;align-items:start!important;gap:4px 8px!important;min-width:0!important}
          .cc-pipeline-time{font-size:13px!important;line-height:1.2!important;padding-top:1px!important}
          .cc-pipeline-lead-name{max-width:none!important;white-space:normal!important;overflow:visible!important;text-overflow:clip!important;font-size:14px!important;line-height:1.25!important}
          .cc-pipeline-card-actualizar{font-size:11px!important;padding:6px 10px!important;border-radius:999px!important}
          .cc-pipeline-card-meta{font-size:11px!important;line-height:1.45!important;margin-bottom:7px!important}
        }
        @media (min-width:768px){
          .mobile-nav{display:none!important}
          .mobile-period-bar{display:none!important}
        }
      `}</style>
      <div style={{height:"100vh",background:BG,color:TXT,display:"flex",overflow:"hidden"}}>

        {/* Sidebar */}
        <div className="sidebar" style={{width:220,flexShrink:0,background:SURFACE,borderRight:`1px solid ${BORDER}`,
          display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,bottom:0,zIndex:100,
          overflowY:"auto"}}>

          {/* Logo */}
          <div style={{padding:"20px 18px 16px",borderBottom:`1px solid ${BORDER}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <img src="logo.png" alt="Unlocked" style={{width:30,height:30,objectFit:"contain"}}
                onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="flex";}}/>
              <div style={{display:"none",width:30,height:30,borderRadius:8,
                background:`linear-gradient(135deg,${BRAND},${BRAND2})`,
                alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:"#fff"}}>U</div>
              <div>
                <div style={{fontSize:11,fontWeight:800,color:TXT,letterSpacing:"-0.02em",lineHeight:1}}>UNLOCKED</div>
                <div style={{fontSize:9,color:TXT3,letterSpacing:"0.08em",marginTop:2,textTransform:"uppercase",fontWeight:600}}>Command Center</div>
              </div>
            </div>
          </div>

          {/* Month/Year selectors */}
          <div style={{padding:"14px 14px 10px",borderBottom:`1px solid ${BORDER}`}}>
            <Lbl style={{marginBottom:8}}>Período</Lbl>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <select value={month} onChange={e=>setMonth(Number(e.target.value))}
                style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,
                  color:TXT,padding:"7px 10px",fontSize:11,outline:"none",
                  fontFamily:"'Inter',sans-serif",cursor:"pointer",width:"100%",fontWeight:500}}>
                {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
              <select value={year} onChange={e=>setYear(Number(e.target.value))}
                style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,
                  color:TXT,padding:"7px 10px",fontSize:11,outline:"none",
                  fontFamily:"'Inter',sans-serif",cursor:"pointer",width:"100%",fontWeight:500}}>
                {[2025,2026,2027].map(y=><option key={y}>{y}</option>)}
              </select>
            </div>
          </div>

          {/* Nav items */}
          <nav style={{padding:"10px 10px",flex:1}}>
            <Lbl style={{marginLeft:8,marginBottom:6}}>Navegación</Lbl>
            {visibleTabs.map(t=>{
              const active=tab===t.id;
              const hasAlert=(t.id==="equipo"||t.id==="torre")&&alertShow;
              if(t.href){
                return(
                  <a key={t.id} href={t.href}
                    className="sidebar-item"
                    style={{width:"100%",textAlign:"left",background:"transparent",
                      borderLeft:"2px solid transparent",borderRadius:"0 9px 9px 0",
                      padding:"9px 12px",color:TXT2,fontSize:12,fontWeight:500,
                      fontFamily:"'Inter',sans-serif",display:"flex",alignItems:"center",
                      gap:9,marginBottom:2,textDecoration:"none",transition:"all .15s"}}>
                    <Icon name={t.icon} size={15} color={TXT3}/>
                    <span>{t.l}</span>
                  </a>
                );
              }
              if(t.children&&t.children.length>0){
                const expanded=openSubmenu===t.id;
                return(
                  <div key={t.id} style={{display:"flex",flexDirection:"column",marginBottom:2}}>
                    <button onClick={()=>setOpenSubmenu(expanded?null:t.id)}
                      className={`sidebar-item${expanded?" active":""}`}
                      style={{width:"100%",textAlign:"left",background:expanded?BRAND+"18":"transparent",
                        border:"none",borderLeft:expanded?`2px solid ${BRAND}`:"2px solid transparent",
                        borderRadius:"0 9px 9px 0",padding:"9px 12px",cursor:"pointer",
                        color:expanded?BRAND:TXT2,fontSize:12,fontWeight:expanded?700:500,
                        fontFamily:"'Inter',sans-serif",display:"flex",alignItems:"center",
                        gap:9,transition:"all .15s"}}>
                      <Icon name={t.icon} size={15} color={expanded?BRAND:TXT3}/>
                      <span style={{flex:1}}>{t.l}</span>
                      <span style={{fontSize:10,opacity:.6}}>{expanded?"▼":"▶"}</span>
                    </button>
                    {expanded&&t.children.map(c=>{
                      const subActive=embedUrl===c.href;
                      return(
                        <button key={c.id}
                          onClick={()=>{setEmbedUrl(c.href);setTab("operaciones");}}
                          style={{padding:"7px 12px 7px 37px",fontSize:12,
                            color:subActive?BRAND:TXT2,
                            background:subActive?BRAND+"18":"transparent",
                            fontFamily:"'Inter',sans-serif",fontWeight:subActive?700:500,
                            border:"none",cursor:"pointer",textAlign:"left",width:"100%",
                            display:"block",borderRadius:"0 9px 9px 0"}}
                          onMouseEnter={e=>{if(!subActive)e.currentTarget.style.background=BRAND+"10";}}
                          onMouseLeave={e=>{if(!subActive)e.currentTarget.style.background="transparent";}}>
                          {c.l}
                        </button>
                      );
                    })}
                  </div>
                );
              }
              return(
                <button key={t.id} onClick={()=>{setTab(t.id);setEmbedUrl(null);}}
                  className={`sidebar-item${active?" active":""}`}
                  style={{width:"100%",textAlign:"left",background:active?BRAND+"18":"transparent",
                    border:"none",borderLeft:active?`2px solid ${BRAND}`:"2px solid transparent",
                    borderRadius:active?"0 9px 9px 0":"0 9px 9px 0",
                    padding:"9px 12px",cursor:"pointer",
                    color:active?BRAND:TXT2,fontSize:12,fontWeight:active?700:500,
                    fontFamily:"'Inter',sans-serif",display:"flex",alignItems:"center",
                    gap:9,marginBottom:2,position:"relative",transition:"all .15s"}}>
                  <Icon name={t.icon} size={15} color={active?BRAND:TXT3}/>
                  <span>{t.l}</span>
                  {hasAlert&&<span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
                    width:6,height:6,background:C.red,borderRadius:100}}/>}
                </button>
              );
            })}
          </nav>

          {/* Footer info */}
          <div style={{padding:"12px 16px",borderTop:`1px solid ${BORDER}`}}>
            <div style={{fontSize:9,color:TXT3,letterSpacing:"0.05em",lineHeight:1.6,marginBottom:10}}>
              <div style={{color:TXT2,fontWeight:600,marginBottom:2}}>{MONTHS[month]} {year}</div>
              <div>Día {kpi.day} de {MDAYS[month]}</div>
              {kpi.funnel.revenue&&<div style={{color:BRAND,fontWeight:600,marginTop:2}}>{fD(nv(kpi.funnel.revenue))} revenue</div>}
            </div>
            <button onClick={toggleTheme} style={{
              width:"100%",background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,
              padding:"8px 10px",cursor:"pointer",color:TXT2,fontSize:11,fontWeight:600,
              fontFamily:"'Inter',sans-serif",display:"flex",alignItems:"center",gap:8,
              transition:"all .15s"}}>
              <Icon name={isDark?"trendUp":"barChart"} size={13} color={TXT3}/>
              {isDark?"Modo Claro":"Modo Oscuro"}
            </button>
          </div>
        </div>

        {/* Main content */}
        <div className="main-content" style={{flex:1,marginLeft:220,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {/* Top bar */}
          <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`,
            padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",
            position:"sticky",top:0,zIndex:50}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <Icon name={TABS.find(t=>t.id===tab)?.icon} size={18} color={BRAND}/>
              <div style={{fontSize:16,fontWeight:800,color:TXT,letterSpacing:"-0.03em",lineHeight:1}}>
                {TABS.find(t=>t.id===tab)?.l}
              </div>
              <div className="mobile-topbar-extra" style={{fontSize:10,color:TXT3,marginTop:4,letterSpacing:"0.02em"}}>
                {MONTHS[month].toUpperCase()} {year} · DÍA {kpi.day} DE {MDAYS[month]}
                {mQual>0&&<> · <span style={{color:cH(pv(mShows,mQual),60,40)}}>{fP(pv(mShows,mQual))} show-up</span></>}
              </div>
            </div>
          </div>

          {/* Mobile period bar */}
          <div className="mobile-period-bar" style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`,padding:"8px 12px",display:"flex",gap:8,alignItems:"center"}}>
            {tab!=="control"&&<button onClick={()=>{setTab("control");setEmbedUrl(null);}} style={{
              background:BRAND,color:"#fff",border:"none",borderRadius:9,padding:"8px 10px",
              fontSize:11,fontWeight:800,fontFamily:"'Inter',sans-serif",whiteSpace:"nowrap",boxShadow:"0 4px 12px rgba(224,58,24,.22)"}}>
              Control Comercial
            </button>}
            <select value={month} onChange={e=>setMonth(Number(e.target.value))}
              style={{flex:1,background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,
                color:TXT,padding:"7px 10px",fontSize:12,outline:"none",
                fontFamily:"'Inter',sans-serif",cursor:"pointer",fontWeight:500}}>
              {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
            </select>
            <select value={year} onChange={e=>setYear(Number(e.target.value))}
              style={{width:80,background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,
                color:TXT,padding:"7px 10px",fontSize:12,outline:"none",
                fontFamily:"'Inter',sans-serif",cursor:"pointer",fontWeight:500}}>
              {[2025,2026,2027].map(y=><option key={y}>{y}</option>)}
            </select>
          </div>

          {/* Page content */}
          <div style={{padding:"20px 24px 60px",flex:1,overflowY:"auto",overflowX:"hidden"}} className="fade-in page-content">
            {scopeLimited&&<div style={{marginBottom:16,background:C.amber+"14",border:`1px solid ${C.amber}55`,
              borderRadius:10,padding:"11px 14px",display:"flex",alignItems:"center",gap:10}}>
              <Icon name="lock" size={15} color={C.amber}/>
              <div style={{fontSize:12,color:TXT,lineHeight:1.5}}>
                <strong style={{fontWeight:800}}>Vista limitada.</strong>{" "}
                {(caps&&caps.scopeSummary)||"Solo ves los datos asignados a tu alcance."} Si necesitas más acceso, pide a un admin que ajuste tu alcance.
              </div>
            </div>}
            {embedUrl ? (
              <iframe
                src={embedUrl}
                style={{
                  width:"100%",
                  height:"calc(100vh - 80px)",
                  border:"none",
                  background:"#F7F7F5",
                  display:"block"
                }}
              />
            ) : (
              <>
                {tab==="torre"   &&<Torre kpi={kpi} year={year} month={month} allCloser={closerData} allDaily={daily} dm={MDAYS[month]} onSaveConfig={saveKpiConfig}/>}
                {tab==="closer"  &&<CloserEntryForm year={year} month={month} allCloser={closerData} onSave={saveCloserEntry}/>}
                {tab==="control" &&<ControlComercial/>}
                {tab==="entrada" &&<DailyEntryForm year={year} month={month} allDaily={daily} onSave={saveEntry}/>}
                {tab==="agendas" &&<AgendasLeadsForm allCloser={closerData} onSave={saveCloserEntry}/>}
                {tab==="equipo" &&<ResumenEquipo year={year} month={month} allDaily={daily}/>}
                {tab==="funnel" &&<FunnelView f={kpi.funnel} onUpdate={upKpi}/>}
                {tab==="hist"   &&<HistoricoView allKpi={allKpi} allDaily={daily}/>}
                {tab==="detalle"&&<DetalleView allDaily={daily} allCloser={closerData} year={year} month={month}/>}
                {tab==="colab"  &&<DetalleColaborador allDaily={daily} year={year} month={month} onSave={saveEntry}/>}
                {tab==="admin"  &&<AdminView allDaily={daily} onSave={saveEntry} onDelete={deleteEntry}/>}
              </>
            )}
          </div>
        </div>

        {/* Mobile bottom nav */}
        <div className="mobile-nav" style={{
          position:"fixed",bottom:0,left:0,right:0,zIndex:200,
          background:SURFACE,borderTop:`1px solid ${BORDER}`,
          display:"none",overflowX:"auto",
          boxShadow:"0 -4px 20px rgba(0,0,0,.2)"}}>
          <div style={{display:"flex",minWidth:"max-content",padding:"6px 4px 8px"}}>
            {visibleMobileTabs.map(t=>{
              const active=tab===t.id;
              if(t.children&&t.children.length>0){
                return(
                  <button key={t.id} onClick={()=>{setEmbedUrl(t.children[0].href);setTab("operaciones");}} style={{
                    display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                    background:"transparent",border:"none",cursor:"pointer",
                    padding:"6px 12px",borderRadius:10,minWidth:92,
                    color:TXT3,textDecoration:"none",transition:"all .15s",flexShrink:0}}>
                    <Icon name={t.icon} size={20} color={TXT3}/>
                    <span style={{fontSize:9,fontWeight:500,
                      fontFamily:"'Inter',sans-serif",letterSpacing:"0.01em",
                      color:TXT3,whiteSpace:"nowrap"}}>{t.l}</span>
                  </button>
                );
              }
              return(
                <button key={t.id} onClick={()=>{setTab(t.id);setEmbedUrl(null);}} style={{
                  display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                  background:"transparent",border:"none",cursor:"pointer",
                  padding:"6px 12px",borderRadius:10,minWidth:t.id==="control"?104:72,
                  color:active?BRAND:TXT3,
                  transition:"all .15s",flexShrink:0}}>
                  <Icon name={t.icon} size={20} color={active?BRAND:TXT3}/>
                  <span style={{fontSize:9,fontWeight:active?700:500,
                    fontFamily:"'Inter',sans-serif",letterSpacing:"0.01em",
                    color:active?BRAND:TXT3,whiteSpace:"nowrap"}}>{t.l}</span>
                  {active&&<div style={{width:16,height:2,background:BRAND,borderRadius:2}}/>}
                </button>
              );
            })}
          </div>
        </div>

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
