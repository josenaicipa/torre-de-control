// ─── Authenticated data client ───────────────────────────────────────────────
// The browser no longer talks to Supabase directly. All reads/writes go through
// same-origin Next routes (/api/dashboard/*) that enforce session + permissions
// + data scope server-side. This `db` shim mirrors the small slice of the
// Supabase query API the dashboard actually used, so call sites stay unchanged.
const DASH_API = "/api/dashboard";
const _post = (path, body) =>
  fetch(DASH_API + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "same-origin",
    body: JSON.stringify(body),
  });
async function _errFrom(r) {
  const j = await r.json().catch(() => ({}));
  return { message: j.error || `HTTP ${r.status}`, status: r.status };
}
const db = {
  from(table) {
    return {
      // .select("*") — read a whole table (server scope-filters the rows).
      select() {
        return (async () => {
          try {
            const r = await fetch(
              `${DASH_API}/select?table=${encodeURIComponent(table)}`,
              { credentials: "same-origin" },
            );
            if (!r.ok) return { data: null, error: await _errFrom(r) };
            const j = await r.json();
            return { data: j.rows || [], error: null };
          } catch (e) {
            return { data: null, error: { message: String(e) } };
          }
        })();
      },
      // .upsert(values, {onConflict}) — insert or merge.
      upsert(values, opts) {
        return (async () => {
          try {
            const r = await _post("/mutate", {
              op: "upsert",
              table,
              values,
              onConflict: opts && opts.onConflict,
            });
            if (!r.ok) return { data: null, error: await _errFrom(r) };
            return { data: null, error: null };
          } catch (e) {
            return { data: null, error: { message: String(e) } };
          }
        })();
      },
      // .insert(values) — supports both `await insert()` and `insert().select().single()`.
      insert(values) {
        const exec = async (single) => {
          try {
            const r = await _post("/mutate", { op: "insert", table, values });
            if (!r.ok) return { data: null, error: await _errFrom(r) };
            const j = await r.json();
            const rows = j.rows || [];
            return { data: single ? rows[0] || null : rows, error: null };
          } catch (e) {
            return { data: null, error: { message: String(e) } };
          }
        };
        return {
          select() {
            return {
              single: () => exec(true),
              then: (res, rej) => exec(false).then(res, rej),
            };
          },
          then: (res, rej) => exec(false).then(res, rej),
        };
      },
      // .delete().eq(col,val) / .delete().match({...})
      delete() {
        const run = (match) =>
          (async () => {
            try {
              const r = await _post("/mutate", { op: "delete", table, match });
              if (!r.ok) return { data: null, error: await _errFrom(r) };
              return { data: null, error: null };
            } catch (e) {
              return { data: null, error: { message: String(e) } };
            }
          })();
        return {
          eq: (col, val) => run({ [col]: val }),
          match: (obj) => run(obj),
        };
      },
    };
  },
};

const nv=v=>{const x=Number(v);return(!v&&v!==0)||isNaN(x)?null:x};
const dv=(a,b)=>{const x=nv(a),y=nv(b);return(!x||!y||y===0)?null:x/y};
const pv=(a,b)=>{const r=dv(a,b);return r==null?null:r*100};
const fD=v=>{const x=nv(v);if(x==null)return"—";return"$"+Math.round(Math.abs(x)).toLocaleString("en-US")};
const fP=(v,d=1)=>{const x=nv(v);if(x==null)return"—";return x.toFixed(d)+"%"};
const fX=(v,d=2)=>{const x=nv(v);if(x==null)return"—";return x.toFixed(d)+"x"};
const fN=v=>{const x=nv(v);if(x==null)return"—";return Math.round(x).toLocaleString()};
const sumF=(arr,k)=>arr.reduce((s,r)=>s+(nv(r[k])||0),0);
const cH=(v,g,w)=>v==null?TXT3:v>=g?C.green:v>=w?C.amber:C.red;
const cL=(v,g,w)=>v==null?TXT3:v<=g?C.green:v<=w?C.amber:C.red;

          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            <Lbl>Fecha</Lbl>

                color:TXT,padding:"7px 11px",fontSize:12,outline:"none",fontFamily:"'DM Mono',monospace"}}/>
          </div>
          {allDaily[`${date}:${member}`]&&(
            <div style={{fontSize:10,color:C.amber,fontFamily:"'DM Mono',monospace",

          <Inp label="# Posts + CTA" value={form.posts} onChange={v=>sf("posts",v)}/>
          <Inp label="# Mensajes Diarios" value={form.mensajes} onChange={v=>sf("mensajes",v)}/>
          <Inp label="# Follow Ups" value={form.followUps} onChange={v=>sf("followUps",v)}/>
          <Inp label="# Booking Offers" value={form.bkOffers} onChange={v=>sf("bkOffers",v)}/>
        </div>
      </Card>

      <Card>
        <STit icon="📊" title="Gasto Ads por Canal"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:11}}>
          <Inp label="Meta Ads $" prefix="$" value={form.gastoMeta} onChange={v=>sf("gastoMeta",v)}/>
          <Inp label="Google Ads $" prefix="$" value={form.gastoGoogle} onChange={v=>sf("gastoGoogle",v)}/>
          <Inp label="TikTok Ads $" prefix="$" value={form.gastoTikTok} onChange={v=>sf("gastoTikTok",v)}/>
          <Inp label="Otros $" prefix="$" value={form.gastoOtros} onChange={v=>sf("gastoOtros",v)}/>

        {totalGasto>0&&(

            {[{l:"Meta",v:form.gastoMeta,c:"#1877F2"},{l:"Google",v:form.gastoGoogle,c:"#34A853"},
              {l:"TikTok",v:form.gastoTikTok,c:"#010101"},{l:"Otros",v:form.gastoOtros,c:C.purple}]
              .filter(x=>x.v>0).map(x=>(
                <Barz key={x.l} value={x.v} max={totalGasto} color={x.c} h={7}

const ResumenEquipo=({year,month,allDaily})=>{
  const [view,setView]=useState("resumen");
  const prefix=`${year}-${String(month+1).padStart(2,"0")}`;
  const entries=Object.entries(allDaily).filter(([k])=>k.startsWith(prefix)).map(([,v])=>v);
  const byMember={};TEAM.forEach(m=>{byMember[m]=[];});
  entries.forEach(e=>{if(byMember[e.member])byMember[e.member].push(e);});

  const memberTotals=TEAM.map(m=>{
    const rows=byMember[m];if(!rows.length)return null;
    const t={member:m,days:rows.length,
      posts:sumF(rows,"posts"),mensajes:sumF(rows,"mensajes"),
      followUps:sumF(rows,"followUps"),bkOffers:sumF(rows,"bkOffers"),
      newBk:sumF(rows,"newBkTotal"),qualBk:sumF(rows,"qualBkTotal"),
      shows:sumF(rows,"showsTotal"),investment:sumF(rows,"paidBkInvestment")};
    t.showRate=t.qualBk>0?pv(t.shows,t.qualBk):null;
    t.qualRate=t.newBk>0?pv(t.qualBk,t.newBk):null;
    t.msgPerDay=t.days>0?t.mensajes/t.days:0;
    return t;
  }).filter(Boolean);

  const team=memberTotals.reduce((a,m)=>({
    mensajes:(a.mensajes||0)+m.mensajes,followUps:(a.followUps||0)+m.followUps,
    bkOffers:(a.bkOffers||0)+m.bkOffers,newBk:(a.newBk||0)+m.newBk,
    qualBk:(a.qualBk||0)+m.qualBk,shows:(a.shows||0)+m.shows,posts:(a.posts||0)+m.posts
  }),{});
  const teamShowRate=pv(team.shows,team.qualBk),teamQualRate=pv(team.qualBk,team.newBk),dm=MDAYS[month];
  const byDate={};entries.forEach(e=>{if(!byDate[e.date])byDate[e.date]={};byDate[e.date][e.member]=e;});
  const sortedDates=Object.keys(byDate).sort().reverse();
  const subBtn=v=>({background:view===v?TXT:"transparent",border:`1px solid ${view===v?TXT:BORDER}`,
    borderRadius:8,padding:"6px 14px",cursor:"pointer",color:view===v?"#fff":TXT2,
    fontSize:11,fontFamily:"'Epilogue',sans-serif",fontWeight:view===v?700:400,outline:"none"});

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",gap:6}}>
        {[["resumen","Resumen"],["miembro","Por miembro"],["historial","Historial"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={subBtn(v)}>{l}</button>
        ))}
      </div>

      {entries.length===0&&(
        <Card><div style={{textAlign:"center",padding:"40px 20px",color:TXT3,fontSize:12,fontFamily:"'DM Mono',monospace"}}>
          Sin entradas para {MONTHS[month]} {year}.<br/>
          <span style={{fontSize:10,marginTop:6,display:"block"}}>El equipo debe usar "Entrada Diaria" para registrar.</span>
        </div></Card>
      )}

      {view==="resumen"&&entries.length>0&&(
        <>
          {teamShowRate!=null&&teamShowRate<40&&(
            <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:12,
              padding:"13px 16px",display:"flex",gap:10,alignItems:"flex-start"}}>
              <Icon name="megaphone" size={18} color={C.amber} strokeWidth={2}/>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:3}}>
                  Show-up rate: {fP(teamShowRate)} — target ≥ 60%
                </div>
                <div style={{fontSize:11,color:"#7f1d1d",lineHeight:1.7}}>
                  {fN(team.shows)} shows de {fN(team.qualBk)} quality bookings.
                </div>
              </div>
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(125px,1fr))",gap:9}}>
            <Stat label="New Bookings"  value={fN(team.newBk)}    color={C.purple}/>
            <Stat label="Quality Bk"    value={fN(team.qualBk)}   color={C.teal}/>
            <Stat label="Show Ups"      value={fN(team.shows)}    color={C.green}/>
            <Stat label="Show-up Rate"  value={fP(teamShowRate)}  color={cH(teamShowRate,60,40)}/>
            <Stat label="% Calificados" value={fP(teamQualRate)}  color={cH(teamQualRate,50,20)}/>
            <Stat label="Bk Offers"     value={fN(team.bkOffers)} color={C.orange}/>
            <Stat label="Follow-ups"    value={fN(team.followUps)} color={C.blue}/>
            <Stat label="Mensajes"      value={fN(team.mensajes)} color={TXT2}/>
          </div>
          <Card>
            <STit icon="🎯" title="Actividad vs targets"/>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              {[
                {l:"Mensajes/día",v:dv(team.mensajes,dm),t:60*memberTotals.length,max:100*memberTotals.length,c:cH(dv(team.mensajes,dm),60,40)},
                {l:"Follow-ups/día",v:dv(team.followUps,dm),t:175,max:300,c:cH(dv(team.followUps,dm),150,100)},
                {l:"Bk Offers/día",v:dv(team.bkOffers,dm),t:5*memberTotals.length,max:10*memberTotals.length,c:cH(dv(team.bkOffers,dm),5,3)},

              <Card key={m.member} style={{padding:"14px 16px",cursor:"pointer"}} onClick={()=>setView("miembro")}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <MemberBadge name={m.member} size="lg"/>
                  <span style={{fontSize:9,color:TXT3,fontFamily:"'DM Mono',monospace"}}>{m.days} días</span>
                </div>
                {[["New Bk",fN(m.newBk),C.purple],["Quality Bk",fN(m.qualBk),C.teal],
                  ["Shows",fN(m.shows),C.green],["Show %",fP(m.showRate),cH(m.showRate,60,40)]].map(([l,v,c])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                    <span style={{fontSize:10,color:TXT2}}>{l}</span>
                    <span style={{fontSize:11,color:c,fontFamily:"'DM Mono',monospace",fontWeight:600}}>{v}</span>
                  </div>
                ))}
              </Card>
            ))}
          </div>
        </>
      )}

      {view==="miembro"&&entries.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {memberTotals.map(m=>(
            <Card key={m.member}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <MemberBadge name={m.member} size="lg"/>
                <span style={{fontSize:9,color:TXT3,fontFamily:"'DM Mono',monospace"}}>{m.days} días / {dm} del mes</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(118px,1fr))",gap:8,marginBottom:14}}>
                <Stat label="New Bookings"  value={fN(m.newBk)}    color={C.purple} size="sm"/>
                <Stat label="Quality Bk"    value={fN(m.qualBk)}   color={C.teal}   size="sm"/>
                <Stat label="Show Ups"      value={fN(m.shows)}    color={C.green}  size="sm"/>
                <Stat label="Show-up Rate"  value={fP(m.showRate)} color={cH(m.showRate,60,40)} size="sm"/>
                <Stat label="% Calificados" value={fP(m.qualRate)} color={cH(m.qualRate,50,20)} size="sm"/>
                <Stat label="Mensajes"      value={fN(m.mensajes)} color={TXT2}     size="sm"/>
                <Stat label="Follow-ups"    value={fN(m.followUps)} color={C.blue}  size="sm"/>
                <Stat label="Bk Offers"     value={fN(m.bkOffers)} color={C.orange} size="sm"/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {[
                  {l:"Mensajes/día vs 60",v:m.msgPerDay,max:100,c:cH(m.msgPerDay,60,40)},
                  {l:"Show-up Rate vs 60%",v:m.showRate,max:100,c:cH(m.showRate,60,40)},
                  {l:"% Calificados vs 50%",v:m.qualRate,max:100,c:cH(m.qualRate,50,20)},
                ].map(r=>(
                  <Barz key={r.l} value={r.v} max={r.max} color={r.c} h={6}
                    label={r.l} right={`${(r.v||0).toFixed(1)}%`}/>
                ))}
              </div>
            </Card>
          ))}
        </div>
      )}

      {view==="historial"&&entries.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {sortedDates.map(date=>(
            <Card key={date} style={{padding:"12px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:9,flexWrap:"wrap"}}>
                <span style={{fontSize:12,fontWeight:700,color:TXT,fontFamily:"'DM Mono',monospace"}}>{date}</span>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {Object.keys(byDate[date]).map(m=><MemberBadge key={m} name={m}/>)}

                <table style={{borderCollapse:"collapse",fontSize:11,fontFamily:"'DM Mono',monospace",width:"100%"}}>

// Spanish labels for the ticket classification returned by /api/payments/summary.
const CLASS_ES={LOW_TICKET:"Low Ticket",HIGH_TICKET:"High Ticket",RESERVA:"Reserva",UNKNOWN:"—"};
const fDateShort=iso=>{if(!iso)return"—";const d=new Date(iso);if(isNaN(d.getTime()))return"—";
  return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"});};

// Drill-down drawer for Cash Collected. Shows the transactions behind one metric
// (Lead, Monto, Fecha, Fuente, Producto, Clasificación, Revisión). It renders only
// the curated PaymentTransactionView fields the API returns — never raw payloads.

  if(!drill)return null;
  const rows=drill.rows||[];
  const total=rows.reduce((s,r)=>s+(Number(r.amountUsd)||0),0);

            <div style={{fontSize:9,color:"#94a3b8",letterSpacing:"0.14em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>Cash Collected — detalle</div>
            <div style={{fontSize:18,fontWeight:800,color:"#fff",fontFamily:"'Inter',sans-serif"}}>{drill.title}</div>
            <div style={{fontSize:11,color:"#cbd5e1",fontFamily:"'DM Mono',monospace",marginTop:2}}>{rows.length} {rows.length===1?"transacción":"transacciones"} · {fD(total)}</div>

        </div>

              <thead>

                    <th key={h} style={{padding:"9px 12px",color:TXT3,textAlign:h==="Monto"?"right":"left",fontSize:8,letterSpacing:"0.1em",textTransform:"uppercase",whiteSpace:"nowrap",position:"sticky",top:0,background:SURFACE2}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((r,i)=>(
                  <tr key={i} style={{borderBottom:`1px solid ${BORDER2}`,background:r.reviewRequired?(C.amber+"12"):"transparent"}}>
                    <td style={{padding:"9px 12px",color:TXT}}>
                      <div style={{fontWeight:600}}>{r.leadName||r.leadEmail||"—"}</div>
                      {r.leadName&&r.leadEmail&&<div style={{fontSize:9,color:TXT3}}>{r.leadEmail}</div>}

                    <td style={{padding:"9px 12px",color:TXT,fontWeight:700,textAlign:"right",whiteSpace:"nowrap"}}>{fD(r.amountUsd)}</td>
                    <td style={{padding:"9px 12px",color:TXT2,whiteSpace:"nowrap"}}>{fDateShort(r.paidAt)}</td>
                    <td style={{padding:"9px 12px",color:TXT2}}>{r.source||"—"}</td>
                    <td style={{padding:"9px 12px",color:TXT2}}>{r.product||"—"}</td>
                    <td style={{padding:"9px 12px",color:TXT2,whiteSpace:"nowrap"}}>{CLASS_ES[r.classification]||r.classification||"—"}</td>
                    <td style={{padding:"9px 12px",whiteSpace:"nowrap"}}>
                      {r.reviewRequired
                        ?<span title={r.reviewReason||""} style={{color:C.amber,fontWeight:700}}>⚠ Revisar</span>
                        :<span style={{color:C.green}}>✓ OK</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );

const Torre=({kpi,year,month,allCloser,allDaily,dm,onSaveConfig})=>{
  const [editConfig,setEditConfig]=useState(false);
  const [cfg,setCfg]=useState({});
  const [savingCfg,setSavingCfg]=useState(false);
  const [cash,setCash]=useState(null);   // /api/payments/summary response (null until loaded)
  const [drill,setDrill]=useState(null);  // open drawer: {title, rows} | null

  // Load Cash Collected truth for the selected month. month is 0-indexed here; the
  // API expects 1-12. On 401/403/error we leave `cash` falsy so the UI falls back
  // to the legacy closer-entered totals and the cells stay non-clickable.
  useEffect(()=>{
    let active=true;
    setCash(null);
    fetch(`/api/payments/summary?year=${year}&month=${month+1}`,{credentials:"same-origin"})
      .then(r=>r.ok?r.json():null)
      .then(j=>{if(active)setCash(j);})
      .catch(()=>{if(active)setCash({available:false});});
    return()=>{active=false;};
  },[year,month]);

  useEffect(()=>{
    setCfg({
      metaMensual:kpi.meta?.revenue||"150000",
      inversionPlaneada:kpi.inversion_planeada||"0",
      roasObj:kpi.roas_objetivo||"4",
      pctLeadsAg:kpi.pct_leads_agendadas||"45",
      pctAgAsis:kpi.pct_agendadas_asistidas||"70",
      closeRateMeta:kpi.close_rate_meta||"25",
      day:kpi.day||new Date().getDate(),
    });
  },[kpi]);

  const prefix=`${year}-${String(month+1).padStart(2,"0")}`;
  const closerEntries=Object.entries(allCloser).filter(([k])=>k.startsWith(prefix)).map(([,v])=>v);
  const dailyEntries=Object.entries(allDaily).filter(([k])=>k.startsWith(prefix)).map(([,v])=>v);

  const totalCash=sumF(closerEntries,"ventas_cash");
  const totalValorHT=sumF(closerEntries,"valor_venta_ht");
  const totalValorLT=sumF(closerEntries,"valor_venta_lt");
  const totalReservasManual=sumF(closerEntries,"cash_reservas");
  const totalValor=totalValorHT+totalValorLT;
  const totalVentas=sumF(closerEntries,"q_ventas_ht");
  const totalLeads=sumF(closerEntries,"agendas_calificadas");
  const totalAgendas=sumF(closerEntries,"agendas_final");
  const totalAsistidas=sumF(closerEntries,"citas_asistidas");
  // Gasto Ads viene del tab Marketing (daily_entries, por miembro)
  const totalGastoMeta=sumF(dailyEntries,"gastoMeta");
  const totalGastoGoogle=sumF(dailyEntries,"gastoGoogle");
  const totalGastoTiktok=sumF(dailyEntries,"gastoTikTok");
  const totalGastoOtros=sumF(dailyEntries,"gastoOtros");
  const totalGasto=totalGastoMeta+totalGastoGoogle+totalGastoTiktok+totalGastoOtros;

  const metaMensual=nv(cfg.metaMensual)||150000;
  const inversionPlaneada=nv(cfg.inversionPlaneada)||0;
  const roasObj=nv(cfg.roasObj)||4;
  const pctLeadsAg=nv(cfg.pctLeadsAg)||45;
  const pctAgAsis=nv(cfg.pctAgAsis)||70;
  const closeRateMeta=nv(cfg.closeRateMeta)||25;
  const day=nv(cfg.day)||new Date().getDate();

  const totalUpfront=sumF(closerEntries,"upfront_cash_ht");

  // Cash Collected from the payment ledger is authoritative when present; otherwise
  // we fall back to the legacy closer-entered totals so default behavior is unchanged.
  const cashApi=cash&&cash.available&&cash.totals?cash.totals:null;
  const cashGroups=(cash&&cash.groups)||{};
  const dispCash=cashApi?cashApi.cashCollected:totalCash;
  const dispLowT=cashApi?cashApi.lowTicket:totalValorLT;
  const dispHighT=cashApi?cashApi.highTicket:totalUpfront;
  const dispReservas=cashApi?cashApi.reservas:null;
  const reviewCount=cashApi&&cashApi.counts?cashApi.counts.reviewRequired:0;
  const reviewAmount=cashApi?cashApi.reviewRequired:0;
  const manualCommercialCash=totalCash+totalUpfront+totalValorLT+totalReservasManual;
  const hasManualCommercialCash=manualCommercialCash>0;
  const openDrill=(title,key)=>{if(!cashApi)return;setDrill({title,rows:cashGroups[key]||[]});};

  const ticketProm=totalVentas>0?totalValor/totalVentas:0;
  const pctTranscurrido=day/dm;
  const metaEsperadaHoy=metaMensual*pctTranscurrido;
  const gapVsRitmo=dispCash-metaEsperadaHoy;
  const proyeccion=day>0&&dispCash>0?(dispCash/day)*dm:null;
  const pctCumpl=pv(dispCash,metaMensual);

  const pctLeadsAgReal=totalLeads>0?pv(totalAgendas,totalLeads):null;
  const pctAgAsisReal=totalAgendas>0?pv(totalAsistidas,totalAgendas):null;
  const closeRateReal=totalAsistidas>0?pv(totalVentas,totalAsistidas):null;

  const roasReal=totalGasto>0&&dispCash>0?dispCash/totalGasto:null;
  const invEsperadaHoy=inversionPlaneada*pctTranscurrido;
  const gapInversion=totalGasto-invEsperadaHoy;

  const ventasUniMeta=ticketProm>0?metaMensual/ticketProm:0;
  const asistidaMeta=closeRateMeta>0?ventasUniMeta/(closeRateMeta/100):0;
  const agendaMeta=pctAgAsis>0?asistidaMeta/(pctAgAsis/100):0;
  const leadsMeta=pctLeadsAg>0?agendaMeta/(pctLeadsAg/100):0;
  const leadsPorDolar=metaMensual>0?leadsMeta/metaMensual:0;

  const roasCash=totalGasto>0&&dispCash>0?dispCash/totalGasto:null;
  const roasComprometido=totalGasto>0&&totalValor>0?totalValor/totalGasto:null;
  const roasUpfront=totalGasto>0&&dispHighT>0?dispHighT/totalGasto:null;

  const pctCumplProy=pv(proyeccion,metaMensual);
  const gapProy=proyeccion?proyeccion-metaMensual:null;

  const funnelRows=[
    {l:"Ventas $ (comprometido)",req:metaEsperadaHoy,real:totalValor,fmt:"$"},
    {l:"Ventas (unidades)",req:ventasUniMeta*pctTranscurrido,real:totalVentas,fmt:"n"},
    {l:"Citas asistidas",req:asistidaMeta*pctTranscurrido,real:totalAsistidas,fmt:"n"},
    {l:"Citas agend. calificadas",req:agendaMeta*pctTranscurrido,real:totalAgendas,fmt:"n"},
    {l:"Leads calificados",req:leadsMeta*pctTranscurrido,real:totalLeads,fmt:"n"},
  ];

  const handleSaveCfg=async()=>{
    setSavingCfg(true);
    await onSaveConfig({
      meta_revenue:nv(cfg.metaMensual),
      inversion_planeada:nv(cfg.inversionPlaneada),
      roas_objetivo:nv(cfg.roasObj),
      pct_leads_agendadas:nv(cfg.pctLeadsAg),
      pct_agendadas_asistidas:nv(cfg.pctAgAsis),
      close_rate_meta:nv(cfg.closeRateMeta),
      day:nv(cfg.day),
    });
    setSavingCfg(false);
    setEditConfig(false);
  };

  const block={background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:10,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.04)"};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#1e2a4a,#2d3f6b)",borderRadius:12,padding:"16px 22px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:11,color:"#94a3b8",letterSpacing:"0.18em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:3}}>Torre de Control — Comercial</div>
          <div style={{fontSize:28,fontWeight:900,color:"#fff",fontFamily:"'Inter',sans-serif",lineHeight:1,letterSpacing:"-0.02em"}}>{MONTHS[month].toUpperCase()} {year}</div>
        </div>
        <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
          <div onClick={cashApi?()=>openDrill("High Ticket","highTicket"):undefined}
            role={cashApi?"button":undefined} tabIndex={cashApi?0:undefined}
            onKeyDown={cashApi?(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();openDrill("High Ticket","highTicket");}}:undefined}
            style={{textAlign:"center",cursor:cashApi?"pointer":"default"}}>
            <div style={{fontSize:8,color:"#94a3b8",fontFamily:"'DM Mono',monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:2}}>Upfront Cash{cashApi?" ›":""}</div>
            <div style={{fontSize:18,fontWeight:800,color:"#fbbf24",fontFamily:"'DM Mono',monospace"}}>{fD(dispHighT)}</div>
          </div>
          <div onClick={cashApi?()=>openDrill("Cash Low Ticket","lowTicket"):undefined}
            role={cashApi?"button":undefined} tabIndex={cashApi?0:undefined}
            onKeyDown={cashApi?(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();openDrill("Cash Low Ticket","lowTicket");}}:undefined}
            style={{textAlign:"center",cursor:cashApi?"pointer":"default"}}>
            <div style={{fontSize:8,color:"#94a3b8",fontFamily:"'DM Mono',monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:2}}>Low Ticket{cashApi?" ›":""}</div>
            <div style={{fontSize:18,fontWeight:800,color:"#34d399",fontFamily:"'DM Mono',monospace"}}>{fD(dispLowT)}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:8,color:"#94a3b8",fontFamily:"'DM Mono',monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:2}}>Día</div>
            <div style={{fontSize:18,fontWeight:800,color:"#fff",fontFamily:"'DM Mono',monospace"}}>{day}/{dm}</div>
          </div>
          {!editConfig&&<button onClick={()=>setEditConfig(true)} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:7,padding:"6px 12px",fontSize:10,cursor:"pointer",color:"#fff",fontFamily:"'Inter',sans-serif"}}>Config</button>}
        </div>
      </div>

      {/* DATO COMERCIAL MANUAL — keep auto cash as source of truth, but flag manual entries for validation */}
      {cashApi&&hasManualCommercialCash&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,
          background:C.amber+"10",border:`1px dashed ${C.amber}77`,borderRadius:10,padding:"12px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>📝</span>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:TXT,fontFamily:"'Inter',sans-serif"}}>Dato comercial manual para verificar</div>
              <div style={{fontSize:11,color:TXT2,fontFamily:"'Inter',sans-serif"}}>Valentina registró/actualizó datos manuales en Área Comercial. El cash oficial lo seguimos tomando del ledger de pagos; revisar que el dato manual no duplique ni contradiga la realidad.</div>
            </div>
          </div>
          <span style={{fontSize:12,color:C.amber,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{fD(manualCommercialCash)}</span>
        </div>
      )}

      {/* PAGOS A REVISAR — amber alert, clickable to open the reviewRequired drill-down */}
      {reviewCount>0&&(
        <div onClick={()=>openDrill("Pagos a revisar","reviewRequired")} role="button" tabIndex={0}
          onKeyDown={(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();openDrill("Pagos a revisar","reviewRequired");}}}
          style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,cursor:"pointer",
            background:C.amber+"14",border:`1px solid ${C.amber}66`,borderRadius:10,padding:"12px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>⚠️</span>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:TXT,fontFamily:"'Inter',sans-serif"}}>Pagos a revisar</div>
              <div style={{fontSize:11,color:TXT2,fontFamily:"'Inter',sans-serif"}}>{reviewCount} {reviewCount===1?"pago de fuente no oficial":"pagos de fuente no oficial"} · {fD(reviewAmount)}</div>
            </div>
          </div>
          <span style={{fontSize:12,color:C.amber,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>Ver detalle ›</span>
        </div>
      )}

      {/* CONFIG EDIT PANEL */}
      {editConfig&&(
        <div style={{...block,padding:"16px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontSize:12,fontWeight:700,color:TXT}}>Configuración del mes</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={handleSaveCfg} disabled={savingCfg} style={{background:BRAND,color:"#fff",border:"none",borderRadius:7,padding:"6px 14px",fontSize:11,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:700,opacity:savingCfg?0.7:1}}>{savingCfg?"...":"✓ Guardar"}</button>
              <button onClick={()=>setEditConfig(false)} style={{background:"transparent",border:`1px solid ${BORDER}`,borderRadius:7,padding:"6px 12px",fontSize:11,cursor:"pointer",color:TXT2}}>Cancelar</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10}}>
            <Inp label="Meta mensual $" prefix="$" value={cfg.metaMensual} onChange={v=>setCfg(p=>({...p,metaMensual:v}))}/>
            <Inp label="Inversión planeada $" prefix="$" value={cfg.inversionPlaneada} onChange={v=>setCfg(p=>({...p,inversionPlaneada:v}))}/>
            <Inp label="ROAS objetivo" value={cfg.roasObj} onChange={v=>setCfg(p=>({...p,roasObj:v}))}/>
            <Inp label="Día actual del mes" value={cfg.day} onChange={v=>setCfg(p=>({...p,day:v}))}/>
            <Inp label="% Leads → Agendadas meta" value={cfg.pctLeadsAg} onChange={v=>setCfg(p=>({...p,pctLeadsAg:v}))} hint="%"/>
            <Inp label="% Agendadas → Asistidas meta" value={cfg.pctAgAsis} onChange={v=>setCfg(p=>({...p,pctAgAsis:v}))} hint="%"/>
            <Inp label="Close Rate meta" value={cfg.closeRateMeta} onChange={v=>setCfg(p=>({...p,closeRateMeta:v}))} hint="%"/>
          </div>
        </div>
      )}

      {/* TOP GRID: CONFIG + REALIDAD */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>

        {/* CONFIGURACIÓN */}
        <div style={block}>
          <SectionTitle>Configuración</SectionTitle>
          <Row2 label="Mes" value={MONTHS[month]}/>
          <Row2 label="Año" value={year}/>
          <Row2 label="Días del mes" value={dm}/>
          <Row2 label="Meta mensual ventas ($)" value={fD(metaMensual)} bold color={BRAND}/>
          <Row2 label="ROAS objetivo" value={`${roasObj}x`}/>
          <Row2 label="% Leads → Agendadas (meta)" value={fP(pctLeadsAg)}/>
          <Row2 label="% Agendadas → Asistidas (meta)" value={fP(pctAgAsis)}/>
          <Row2 label="Close rate (meta)" value={fP(closeRateMeta)}/>
          <Row2 label="Leads necesarios por dólar" value={leadsPorDolar>0?leadsPorDolar.toFixed(5):"—"}/>
        </div>

        {/* REALIDAD DEL MES */}
        <div style={block}>
          <SectionTitle>Realidad del mes (ejecución)</SectionTitle>
          <Row2 label="Valor Total Venta (comprometido)" value={fD(totalValor)} bold color={BRAND}/>
          <Row2 label="Ventas $ (cash cobrado)" value={fD(dispCash)} bold color={C.green} onClick={cashApi?()=>openDrill("Cash Collected","cashCollected"):null}/>
          <Row2 label="Upfront Cash HT" value={fD(dispHighT)} color={C.green} onClick={cashApi?()=>openDrill("High Ticket","highTicket"):null}/>
          <Row2 label="Cash Low Ticket" value={fD(dispLowT)} color={C.teal} onClick={cashApi?()=>openDrill("Cash Low Ticket","lowTicket"):null}/>
          {cashApi&&<Row2 label="Reservas (cash)" value={fD(dispReservas)} color={C.amber} onClick={()=>openDrill("Reservas","reservas")}/>}
          <Row2 label="Ventas reales (unidades)" value={fN(totalVentas)}/>
          <Row2 label="Leads calificados reales" value={fN(totalLeads)}/>
          <Row2 label="Citas agendadas reales" value={fN(totalAgendas)}/>
          <Row2 label="Citas Show Up (asistidas)" value={fN(totalAsistidas)}/>
          <Row2 label="Ticket promedio (comprometido)" value={fD(ticketProm)} bold/>
          <Row2 label="Close rate real" value={fP(closeRateReal)} bold color={cH(closeRateReal,closeRateMeta*0.9,closeRateMeta*0.7)}/>
        </div>
      </div>

      {/* RITMO + PROYECCIÓN */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>

        <div style={block}>
          <SectionTitle>Ritmo del mes (tiempo + dinero)</SectionTitle>
          <Row2 label="Fecha hoy" value={today()}/>
          <Row2 label="Días totales mes" value={dm}/>
          <Row2 label="Día del mes" value={day}/>
          <Row2 label="% mes transcurrido" value={fP(pctTranscurrido*100,1)}/>
          <div style={{height:1,background:BORDER,margin:"4px 0"}}/>
          <Row2 label="Meta mensual ($)" value={fD(metaMensual)}/>
          <Row2 label="Meta esperada a hoy ($)" value={fD(metaEsperadaHoy)} bold/>
          <Row2 label="Ventas reales acumuladas ($)" value={fD(dispCash)} bold color={C.green} onClick={cashApi?()=>openDrill("Cash Collected","cashCollected"):null}/>
          <Row2 label="Gap vs ritmo ($)" value={fD(gapVsRitmo)} bold color={gapVsRitmo>=0?C.green:C.red} bg={gapVsRitmo>=0?"#f0fdf4":"#fef2f2"}/>
        </div>

        <div style={block}>
          <SectionTitle>Proyección fin de mes (si seguimos así)</SectionTitle>
          <div style={{padding:"18px 14px",display:"flex",flexDirection:"column",gap:0}}>
            <Row2 label="Ventas proyectadas fin de mes ($)" value={proyeccion?fD(proyeccion):"—"} bold color={proyeccion&&proyeccion>=metaMensual?C.green:C.red}/>
            <Row2 label="% cumplimiento proyectado" value={fP(pctCumplProy)} bold color={cH(pctCumplProy,85,65)}/>
            <Row2 label="Gap proyectado vs meta ($)" value={gapProy!=null?fD(gapProy):"—"} bold color={gapProy!=null&&gapProy>=0?C.green:C.red} bg={gapProy!=null&&gapProy>=0?"#f0fdf4":"#fef2f2"}/>
          </div>
          {dispCash>0&&(
            <div style={{padding:"0 10px 12px"}}>
              <Barz value={dispCash} max={metaMensual} color={cH(pctCumpl,85,60)} h={10} label={`Cash actual: ${fP(pctCumpl)}`} right={fD(dispCash)}/>
              {proyeccion&&<div style={{marginTop:6}}><Barz value={proyeccion} max={metaMensual} color={C.blue} h={5} label={`Proyección: ${fP(pctCumplProy)}`} right={fD(proyeccion)}/></div>}
            </div>
          )}
        </div>
      </div>

      {/* FUNNEL A HOY */}
      <div style={block}>
        <SectionTitle>Funnel a hoy — Plan vs Real · Día {day}/{dm} ({fP(pctTranscurrido*100,0)} transcurrido)</SectionTitle>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"'DM Mono',monospace",fontSize:11}}>
            <thead>
              <tr style={{background:SURFACE2,borderBottom:`1px solid ${BORDER}`}}>
                {["Métrica","Requerido a hoy","Real a hoy","Gap","Estado"].map(h=>(
                  <th key={h} style={{padding:"9px 14px",color:TXT3,textAlign:h==="Métrica"?"left":"center",fontSize:8,letterSpacing:"0.1em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {funnelRows.map(r=>{
                const gap=r.real-r.req;
                const pctR=r.req>0?(r.real/r.req)*100:null;
                const fmt=v=>r.fmt==="$"?fD(v):fN(v);
                return(
                  <tr key={r.l} style={{borderBottom:`1px solid ${BORDER2}`}}>
                    <td style={{padding:"10px 14px",color:TXT,fontWeight:600}}>{r.l}</td>
                    <td style={{padding:"10px 14px",color:TXT2,textAlign:"center"}}>{fmt(r.req)}</td>
                    <td style={{padding:"10px 14px",color:TXT,fontWeight:700,textAlign:"center"}}>{fmt(r.real)}</td>
                    <td style={{padding:"10px 14px",color:gap>=0?C.green:C.red,fontWeight:700,textAlign:"center",background:gap>=0?"#f0fdf4":"#fef2f2"}}>
                      {gap>=0?"▲":"▼"} {fmt(Math.abs(gap))}
                    </td>
                    <td style={{padding:"10px 14px",textAlign:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
                        <div style={{background:"#ebe9e3",borderRadius:100,height:5,width:60,overflow:"hidden"}}>
                          <div style={{width:Math.min(100,pctR||0)+"%",height:"100%",background:cH(pctR,90,70)}}/>
                        </div>
                        <span style={{fontSize:10,color:cH(pctR,90,70),fontWeight:600}}>{fP(pctR,0)}</span>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* SALUD DEL EMBUDO + ADS */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>

        <div style={block}>
          <SectionTitle>Salud del embudo — Meta vs Real · Ticket promedio: {fD(ticketProm)}</SectionTitle>
          <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"'DM Mono',monospace",fontSize:11}}>
            <thead>
              <tr style={{background:SURFACE2,borderBottom:`1px solid ${BORDER}`}}>
                {["Métrica","Meta","Real","Estado"].map(h=>(
                  <th key={h} style={{padding:"8px 12px",color:TXT3,textAlign:h==="Métrica"?"left":"center",fontSize:8,letterSpacing:"0.1em",textTransform:"uppercase"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[
                {l:"% Leads → Agendadas",meta:pctLeadsAg,real:pctLeadsAgReal},
                {l:"% Agendadas → Asistidas",meta:pctAgAsis,real:pctAgAsisReal},
                {l:"Close Rate",meta:closeRateMeta,real:closeRateReal},
              ].map(r=>{
                const color=cH(r.real,r.meta*0.95,r.meta*0.75);
                return(
                  <tr key={r.l} style={{borderBottom:`1px solid ${BORDER2}`}}>
                    <td style={{padding:"9px 12px",color:TXT,fontWeight:600}}>{r.l}</td>
                    <td style={{padding:"9px 12px",color:TXT2,textAlign:"center"}}>{fP(r.meta)}</td>
                    <td style={{padding:"9px 12px",textAlign:"center",background:r.real!=null?(r.real>=r.meta*0.95?"#f0fdf4":"#fef2f2"):"transparent"}}>
                      <span style={{color,fontWeight:700}}>{fP(r.real)}</span>
                    </td>
                    <td style={{padding:"9px 12px",textAlign:"center"}}>
                      <div style={{background:"#ebe9e3",borderRadius:100,height:5,overflow:"hidden",width:50,margin:"0 auto"}}>
                        <div style={{width:Math.min(100,r.real||0)+"%",height:"100%",background:color}}/>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div style={block}>
          <SectionTitle>Apoyo — Control Ads & ROAS</SectionTitle>
          <Row2 label="Inversión planeada mes ($)" value={fD(inversionPlaneada)}/>
          <Row2 label="Inversión Ads real acumulada ($)" value={fD(totalGasto)} bold/>
          <Row2 label="Inversión Ads esperada a hoy ($)" value={fD(invEsperadaHoy)}/>
          <Row2 label="Gap inversión ($)" value={fD(gapInversion)} color={gapInversion>500?C.red:gapInversion<-500?C.green:TXT} bg={gapInversion>500?"#fef2f2":gapInversion<-500?"#f0fdf4":"transparent"}/>
          <div style={{height:1,background:BORDER,margin:"2px 0"}}/>

  const metrics=[
    {l:"ROAS",v:fX(dv(rev,ads)),c:cH(dv(rev,ads),3.5,2.5),h:"Revenue/Ads"},
    {l:"CPL",v:fD(dv(ads,leads)),c:cL(dv(ads,leads),5,15),h:"Ads/Leads"},
    {l:"Costo/Agenda",v:fD(dv(ads,ag)),c:TXT2,h:"Ads/Agendas"},
    {l:"Costo/Show",v:fD(dv(ads,shows)),c:TXT2,h:"Ads/Shows"},

const HistoricoView=({allKpi,allDaily})=>{

    const prefix=`${y}-${String(mi+1).padStart(2,"0")}`;
    const entries=Object.entries(allDaily).filter(([k])=>k.startsWith(prefix)).map(([,v])=>v);
    return{key:ym,label:`${MONTHS[mi].substring(0,3)} ${y}`,
      rev:nv(d.funnel?.revenue),ads:nv(d.funnel?.adSpend),meta:nv(d.meta?.revenue),
      newBk:sumF(entries,"newBkTotal"),qBk:sumF(entries,"qualBkTotal"),shows:sumF(entries,"showsTotal"),

                      {r.meta&&<div style={{width:"38%",height:mH,background:BORDER,borderRadius:"3px 3px 0 0",minHeight:2}}/>}
                      {r.rev&&<div style={{width:"38%",height:rH,background:c,borderRadius:"3px 3px 0 0"}}/>}

                    <div style={{fontSize:8,color:TXT3,textAlign:"center"}}>{r.label}</div>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:12,marginTop:4}}>
              <div style={{display:"flex",gap:4,alignItems:"center"}}><div style={{width:7,height:7,background:BORDER,borderRadius:2,border:`1px solid ${TXT3}`}}/><span style={{fontSize:8,color:TXT3}}>Meta</span></div>

          <Card style={{padding:0,overflow:"hidden"}}>
            <div style={{padding:"13px 16px 7px",borderBottom:`1px solid ${BORDER}`}}>

const AgendasLeadsForm=({allCloser,onSave})=>{

  const [saved,setSaved]=useState(false);

  useEffect(()=>{
    const ex=allCloser[date];
    setForm(ex?{...blankCloser(),...ex}:blankCloser());

  },[date,allCloser]);

  const sf=(k,v)=>setForm(p=>({...p,[k]:Number(v)||0}));

  const totalAgendas=AG_CANAL_KEYS.reduce((s,c)=>s+(form[`agendas_${c}`]||0),0);
  const totalCal=AG_CANAL_KEYS.reduce((s,c)=>s+(form[`cal_${c}`]||0),0);
  const totalHoy=AG_CANAL_KEYS.reduce((s,c)=>s+(form[`hoy_${c}`]||0),0);
  const totalShow=AG_CANAL_KEYS.reduce((s,c)=>s+(form[`show_${c}`]||0),0);

            <Inp label={`# ${label} ${canal}`} value={form[`${prefix}_${AG_CANAL_KEYS[i]}`]}

          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <Lbl>Fecha</Lbl>

                color:TXT,padding:"7px 11px",fontSize:12,outline:"none",fontFamily:"'DM Mono',monospace"}}/>
          </div>
          {allCloser[date]&&(
            <div style={{fontSize:10,color:C.amber,fontFamily:"'DM Mono',monospace",paddingBottom:4,display:"flex",alignItems:"center",gap:5}}>
              <span style={{width:6,height:6,borderRadius:100,background:C.amber,display:"inline-block"}}/>
              Editando entrada existente
            </div>
          )}
        </div>
      </Card>

      {(totalAgendas>0||totalCal>0||totalShow>0)&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8}}>
          <Stat label="Total Agendas" value={fN(totalAgendas)} color={C.blue}/>
          <Stat label="Cualificadas" value={fN(totalCal)} color={C.purple}/>
          <Stat label="Hoy (en agenda)" value={fN(totalHoy)} color={C.teal}/>
          <Stat label="Show Ups" value={fN(totalShow)} color={C.green}/>
          <Stat label="Show Rate" value={fP(showRate)} color={cH(showRate,60,40)}/>
          <Stat label="% Cualif." value={fP(calRate)} color={cH(calRate,50,30)}/>

          borderRadius:10,padding:"11px 28px",fontWeight:700,fontSize:13,
          cursor:"pointer",fontFamily:"'Inter',sans-serif",letterSpacing:"-0.01em",
          transition:"all .2s",boxShadow:`0 4px 16px ${saved?C.green:BRAND}40`,
          opacity:saving?0.6:1}}>

// ─── DETALLE DIARIO ────────────────────────────────────────────────────────────
const DetalleView=({allDaily,allCloser,year,month})=>{
  const [cash,setCash]=useState(null);
  const dm=MDAYS[month];
  const pad=n=>String(n).padStart(2,"0");
  const mp=`${year}-${pad(month+1)}`;
  const DOW=["D","L","M","M","J","V","S"];
  const getDoW=d=>{const dt=new Date(d+"T12:00:00");return DOW[dt.getDay()];};
  const isWeekend=d=>{const dt=new Date(d+"T12:00:00");return dt.getDay()===0||dt.getDay()===6;};

  useEffect(()=>{
    let active=true;
    setCash(null);
    fetch(`/api/payments/summary?year=${year}&month=${month+1}`,{credentials:"same-origin"})
      .then(r=>r.ok?r.json():null)
      .then(j=>{if(active)setCash(j);})
      .catch(()=>{if(active)setCash({available:false});});
    return()=>{active=false;};
  },[year,month]);

  const cashGroups=(cash&&cash.available&&cash.groups)||{};
  const localPayDate=iso=>{
    if(!iso)return null;
    try{return new Date(iso).toLocaleDateString("en-CA",{timeZone:"America/Bogota"});}
    catch(e){return String(iso).slice(0,10);}
  };
  const ledgerByDay={};
  const addLedger=(metric,rows)=>{(rows||[]).forEach(r=>{const d=localPayDate(r.paidAt);if(!d)return;ledgerByDay[d]=ledgerByDay[d]||{};ledgerByDay[d][metric]=(ledgerByDay[d][metric]||0)+(Number(r.amountUsd)||0);});};
  addLedger("cashCollected",cashGroups.cashCollected);
  addLedger("highTicket",cashGroups.highTicket);
  addLedger("lowTicket",cashGroups.lowTicket);
  addLedger("reservas",cashGroups.reservas);
  addLedger("reviewRequired",cashGroups.reviewRequired);

  const dayData=Array.from({length:dm},(_,i)=>{
    const d=`${mp}-${pad(i+1)}`;
    const entries=Object.entries(allDaily).filter(([k])=>k.startsWith(d+":")).map(([,v])=>v);
    // Marketing aggregates skip commercial collaborators so closer rows don't
    // inflate mensajes/follow-ups/ig in the Detalle Diario marketing section.
    const mktEntries=entries.filter(e=>e&&!isCommercialMember(e.member));
    const closer=allCloser[d]||{};
    const ledger=ledgerByDay[d]||{};
    const sd=f=>sumF(entries,f);
    const sdMkt=f=>sumF(mktEntries,f);
    const totalGastoDay=sd("gastoMeta")+sd("gastoGoogle")+sd("gastoTikTok")+sd("gastoOtros");
    return{day:i+1,d,entries,mktEntries,closer,ledger,sd,sdMkt,totalGastoDay};
  });

  const cellTxt=(v,fmt)=>{
    if(v===null||v===undefined||v===0)return null;
    if(fmt==="$")return fD(v);
    if(fmt==="%")return fP(v);
    return fN(v);
  };

  // For ratio rows (cost/rate), total uses monthly aggregates instead of day average
  const rowTotalVal=(row)=>{
    if(row.totFn) return row.totFn();
    if(row.fmt==="%"){
      const vals=dayData.map(d=>row.fn(d)).filter(v=>v!==null&&v!==undefined);
      return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
    }
    const t=dayData.reduce((s,d)=>{const v=row.fn(d);return s+(v||0);},0);
    return t||null;
  };

  // Monthly aggregates for cost calculations
  const mGastoMeta=dayData.reduce((s,d)=>s+d.sd("gastoMeta"),0);
  const mGastoGoogle=dayData.reduce((s,d)=>s+d.sd("gastoGoogle"),0);
  const mGastoTikTok=dayData.reduce((s,d)=>s+d.sd("gastoTikTok"),0);
  const mGastoOtros=dayData.reduce((s,d)=>s+d.sd("gastoOtros"),0);
  const mGastoTotal=mGastoMeta+mGastoGoogle+mGastoTikTok+mGastoOtros;
  const mAgTotal=dayData.reduce((s,d)=>{const ks=["organicas","meta","google","tiktok","otros"];return s+ks.reduce((a,c)=>a+(d.closer[`agendas_${c}`]||0),0);},0);
  const mAgMeta=dayData.reduce((s,d)=>s+(d.closer.agendas_meta||0),0);
  const mAgGoogle=dayData.reduce((s,d)=>s+(d.closer.agendas_google||0),0);
  const mAgTikTok=dayData.reduce((s,d)=>s+(d.closer.agendas_tiktok||0),0);
  const mAgOtros=dayData.reduce((s,d)=>s+(d.closer.agendas_otros||0),0);
  const mCalTotal=dayData.reduce((s,d)=>s+(d.closer.agendas_calificadas||0),0);
  const mCalMeta=dayData.reduce((s,d)=>s+(d.closer.cal_meta||0),0);
  const mCalGoogle=dayData.reduce((s,d)=>s+(d.closer.cal_google||0),0);
  const mCalTikTok=dayData.reduce((s,d)=>s+(d.closer.cal_tiktok||0),0);
  const mCalOtros=dayData.reduce((s,d)=>s+(d.closer.cal_otros||0),0);
  const mShows=dayData.reduce((s,d)=>s+(d.closer.citas_asistidas||0),0);
  const mVentasHT=dayData.reduce((s,d)=>s+(d.closer.q_ventas_ht||0),0);
  const mValorHT=dayData.reduce((s,d)=>s+(d.closer.valor_venta_ht||0),0);
  const mLedgerCash=dayData.reduce((s,d)=>s+(d.ledger.cashCollected||0),0);
  const mLedgerHT=dayData.reduce((s,d)=>s+(d.ledger.highTicket||0),0);
  const mLedgerLT=dayData.reduce((s,d)=>s+(d.ledger.lowTicket||0),0);
  const mLedgerReservas=dayData.reduce((s,d)=>s+(d.ledger.reservas||0),0);
  const mCashHT=mLedgerHT||dayData.reduce((s,d)=>s+(d.closer.ventas_cash||0),0);
  const mRecurring=dayData.reduce((s,d)=>s+(d.closer.recurring_cash||0),0);

  const GROUPS=[
    {title:"Gasto Publicitario",bg:"#1e40af",rows:[
      {l:"$ Total Gasto",fn:d=>d.totalGastoDay||null,fmt:"$"},
      {l:"Meta",fn:d=>d.sd("gastoMeta")||null,fmt:"$",sub:true},
      {l:"Google",fn:d=>d.sd("gastoGoogle")||null,fmt:"$",sub:true},
      {l:"TikTok",fn:d=>d.sd("gastoTikTok")||null,fmt:"$",sub:true},
      {l:"Otros",fn:d=>d.sd("gastoOtros")||null,fmt:"$",sub:true},
    ]},
    {title:"Actividad Marketing",bg:"#6d28d9",rows:[
      {l:"# IG Seguidores",fn:d=>d.sdMkt("igFollowers")||null,fmt:"n"},
      {l:"# Posts + CTA",fn:d=>d.sdMkt("posts")||null,fmt:"n"},
      {l:"# Mensajes",fn:d=>d.sdMkt("mensajes")||null,fmt:"n"},
      {l:"# Follow Ups",fn:d=>d.sdMkt("followUps")||null,fmt:"n"},
      {l:"# Booking Offers",fn:d=>d.sdMkt("bkOffers")||null,fmt:"n"},
    ]},
    {title:"Agendas / Leads",bg:"#0f766e",rows:[
      {l:"Agendas Total",fn:d=>{const ks=["organicas","meta","google","tiktok","otros"];return ks.reduce((s,c)=>s+(d.closer[`agendas_${c}`]||0),0)||null;},fmt:"n"},
      {l:"Orgánicas",fn:d=>d.closer.agendas_organicas||null,fmt:"n",sub:true},
      {l:"Meta",fn:d=>d.closer.agendas_meta||null,fmt:"n",sub:true},
      {l:"Google",fn:d=>d.closer.agendas_google||null,fmt:"n",sub:true},
      {l:"TikTok",fn:d=>d.closer.agendas_tiktok||null,fmt:"n",sub:true},
      {l:"Otros",fn:d=>d.closer.agendas_otros||null,fmt:"n",sub:true},
      {l:"Cualificadas Total",fn:d=>d.closer.agendas_calificadas||null,fmt:"n"},
      {l:"% Cualificadas",fn:d=>{const t=["organicas","meta","google","tiktok","otros"].reduce((s,c)=>s+(d.closer[`agendas_${c}`]||0),0);return t>0?pv(d.closer.agendas_calificadas||0,t):null;},fmt:"%",
        totFn:()=>mAgTotal>0?pv(mCalTotal,mAgTotal):null},
      {l:"Hoy (en agenda)",fn:d=>d.closer.agendas_final||null,fmt:"n"},
      {l:"Show Ups",fn:d=>d.closer.citas_asistidas||null,fmt:"n"},
      {l:"% Show Up Rate",fn:d=>{const h=d.closer.agendas_final||0,s=d.closer.citas_asistidas||0;return h>0?pv(s,h):null;},fmt:"%",
        totFn:()=>{const mHoy=dayData.reduce((s,d)=>s+(d.closer.agendas_final||0),0);return mHoy>0?pv(mShows,mHoy):null;}},
    ]},
    {title:"Costos por Lead",bg:"#92400e",rows:[
      {l:"CPL (Costo/Agenda)",fn:d=>{const ag=["organicas","meta","google","tiktok","otros"].reduce((s,c)=>s+(d.closer[`agendas_${c}`]||0),0);return ag>0?d.totalGastoDay/ag:null;},fmt:"$",
        totFn:()=>mAgTotal>0?mGastoTotal/mAgTotal:null},
      {l:"CPL Meta",fn:d=>d.closer.agendas_meta>0?d.sd("gastoMeta")/d.closer.agendas_meta:null,fmt:"$",sub:true,
        totFn:()=>mAgMeta>0?mGastoMeta/mAgMeta:null},
      {l:"CPL Google",fn:d=>d.closer.agendas_google>0?d.sd("gastoGoogle")/d.closer.agendas_google:null,fmt:"$",sub:true,
        totFn:()=>mAgGoogle>0?mGastoGoogle/mAgGoogle:null},
      {l:"CPL TikTok",fn:d=>d.closer.agendas_tiktok>0?d.sd("gastoTikTok")/d.closer.agendas_tiktok:null,fmt:"$",sub:true,
        totFn:()=>mAgTikTok>0?mGastoTikTok/mAgTikTok:null},
      {l:"CPL Otros",fn:d=>d.closer.agendas_otros>0?d.sd("gastoOtros")/d.closer.agendas_otros:null,fmt:"$",sub:true,
        totFn:()=>mAgOtros>0?mGastoOtros/mAgOtros:null},
      {l:"CP Cualificada",fn:d=>{const cal=d.closer.agendas_calificadas||0;return cal>0?d.totalGastoDay/cal:null;},fmt:"$",
        totFn:()=>mCalTotal>0?mGastoTotal/mCalTotal:null},
      {l:"CP Cualif. Meta",fn:d=>d.closer.cal_meta>0?d.sd("gastoMeta")/d.closer.cal_meta:null,fmt:"$",sub:true,
        totFn:()=>mCalMeta>0?mGastoMeta/mCalMeta:null},
      {l:"CP Cualif. Google",fn:d=>d.closer.cal_google>0?d.sd("gastoGoogle")/d.closer.cal_google:null,fmt:"$",sub:true,
        totFn:()=>mCalGoogle>0?mGastoGoogle/mCalGoogle:null},
      {l:"CP Cualif. TikTok",fn:d=>d.closer.cal_tiktok>0?d.sd("gastoTikTok")/d.closer.cal_tiktok:null,fmt:"$",sub:true,
        totFn:()=>mCalTikTok>0?mGastoTikTok/mCalTikTok:null},
      {l:"CP Cualif. Otros",fn:d=>d.closer.cal_otros>0?d.sd("gastoOtros")/d.closer.cal_otros:null,fmt:"$",sub:true,
        totFn:()=>mCalOtros>0?mGastoOtros/mCalOtros:null},
    ]},
    {title:"Ventas — Area Comercial",bg:"#c2410c",rows:[
      {l:"# Ventas HT",fn:d=>d.closer.q_ventas_ht||null,fmt:"n"},
      {l:"$ Venta HT",fn:d=>d.closer.valor_venta_ht||null,fmt:"$"},
      {l:"Upfront Cash HT",fn:d=>d.ledger.highTicket||d.closer.upfront_cash_ht||null,fmt:"$",totFn:()=>mLedgerHT||null},
      {l:"Cash Collected HT",fn:d=>d.ledger.highTicket||d.closer.ventas_cash||null,fmt:"$",totFn:()=>mLedgerHT||mCashHT||null},
      {l:"Recurring Cash",fn:d=>d.closer.recurring_cash||null,fmt:"$"},
      {l:"Cash + Recurring",fn:d=>{const c=d.ledger.highTicket||d.closer.ventas_cash||0;const t=c+(d.closer.recurring_cash||0);return t||null;},fmt:"$",
        totFn:()=>mCashHT+mRecurring||null},
      {l:"% Cash Collected",fn:d=>{const c=d.ledger.highTicket||d.closer.ventas_cash||0,v=d.closer.valor_venta_ht||0;return v>0?pv(c,v):null;},fmt:"%",
        totFn:()=>mValorHT>0?pv(mCashHT,mValorHT):null},
      {l:"% Closing Rate",fn:d=>{const s=d.closer.citas_asistidas||0,v=d.closer.q_ventas_ht||0;return s>0?pv(v,s):null;},fmt:"%",
        totFn:()=>mShows>0?pv(mVentasHT,mShows):null},
      {l:"# Ventas LT",fn:d=>d.closer.q_ventas_lt||null,fmt:"n"},
      {l:"$ Venta LT",fn:d=>d.ledger.lowTicket||d.closer.valor_venta_lt||null,fmt:"$",totFn:()=>mLedgerLT||null},
      {l:"# Reservas",fn:d=>d.closer.q_reservas||null,fmt:"n"},
      {l:"$ Cash Reservas",fn:d=>d.ledger.reservas||d.closer.cash_reservas||null,fmt:"$",totFn:()=>mLedgerReservas||null},
      {l:"# Reembolsos",fn:d=>d.closer.q_reembolsos||null,fmt:"n"},
      {l:"$ Valor Reembolsos",fn:d=>d.closer.valor_reembolsos||null,fmt:"$"},
      {l:"# Clientes Activos",fn:d=>d.closer.total_clientes_activos||null,fmt:"n"},
    ]},
  ];

  const HDR_BG=IS_DARK?"#0D1526":"#1e293b";
  const WKD_BG=IS_DARK?"#0A1020":SURFACE2;
  const HDR_TXT="#f1f5f9";
  const thBase={padding:"5px 3px",textAlign:"center",fontSize:9,fontWeight:700,
    fontFamily:"'DM Mono',monospace",borderRight:`1px solid rgba(255,255,255,0.1)`};
  const tdBase={padding:"3px 4px",textAlign:"right",fontSize:9,fontFamily:"'DM Mono',monospace",
    borderRight:`1px solid ${BORDER2}`,borderBottom:`1px solid ${BORDER2}`,height:21};
  const stickyCol={position:"sticky",left:0,zIndex:2};

  return(
    <div>
      <div style={{fontSize:11,color:TXT2,fontFamily:"'Inter',sans-serif",marginBottom:8,padding:"0 2px"}}>
        {MONTHS[month]} {year} · Scroll horizontal para ver todos los días
      </div>
      {cash&&cash.available&&(
        <div style={{fontSize:11,color:C.green,fontFamily:"'Inter',sans-serif",marginBottom:8,padding:"8px 10px",background:C.green+"10",border:`1px solid ${C.green}44`,borderRadius:8}}>
          Cash/Upfront/Low Ticket/Reservas en este detalle se llenan desde el ledger real de pagos; si Valentina pone dato manual, queda solo como referencia para verificar.

// ─── DETALLE POR COLABORADOR ──────────────────────────────────────────────────
// Manual collaborator reporting center.
//   - Marketing role (Karen Anquiz, stored as "Karen"): IG / posts / mensajes /
//     follow ups / booking offers. Ad spend is automatic (sync job) and shown
//     read-only.
//   - Closer role (Carlos Velez, Daryi Uribe, Juan Diego Afanador): agendas,
//     calificadas, agendas hoy, show ups, ventas HT, $ venta HT, upfront/cash,
//     recurring cash, follow ups, pendientes cierre día anterior, pendientes
//     cierre acumulados, reservas.
// Persists through onSave(`${date}:${memberId}`, entry) → daily_entries (the
// closer fields reuse the schema columns mapped in rowToEntry/saveEntry).
// Detalle Diario continues to aggregate daily_closer for commercial totals and
// filters commercial members out of its marketing rows so closer activity
// here does not inflate the marketing aggregates there.

const closerCanonId=m=>{
  if(!m)return m;
  const cl=COMMERCIAL_COLLABORATORS.find(c=>c.legacy===m);
  return cl?cl.id:m;
};

const DetalleColaborador=({allDaily,year,month,onSave})=>{
  const [view,setView]=useState("llenar"); // llenar | tabla | dia
  const dm=MDAYS[month];
  const pad=n=>String(n).padStart(2,"0");
  const mp=`${year}-${pad(month+1)}`;

  const entriesByCollab={};
  MANUAL_COLLABORATORS.forEach(c=>{entriesByCollab[c.id]=[];});
  Object.entries(allDaily)
    .filter(([k])=>k.startsWith(mp+"-"))
    .forEach(([,v])=>{
      if(!v||!v.member)return;
      const cid=closerCanonId(v.member);
      if(entriesByCollab[cid])entriesByCollab[cid].push(v);
    });

  const monthEntries=Object.entries(allDaily).filter(([k])=>k.startsWith(mp+"-")).map(([,v])=>v);
  const mGastoMeta=sumF(monthEntries,"gastoMeta");
  const mGastoGoogle=sumF(monthEntries,"gastoGoogle");
  const mGastoTikTok=sumF(monthEntries,"gastoTikTok");
  const mGastoOtros=sumF(monthEntries,"gastoOtros");
  const monthAdSpend={meta:mGastoMeta,google:mGastoGoogle,tiktok:mGastoTikTok,otros:mGastoOtros,
    total:mGastoMeta+mGastoGoogle+mGastoTikTok+mGastoOtros};

  const collabAgg=cid=>{
    const rows=entriesByCollab[cid]||[];
    const s=k=>sumF(rows,k);
    return{
      member:cid,days:rows.length,
      igFollowers:s("igFollowers"),posts:s("posts"),mensajes:s("mensajes"),
      followUps:s("followUps"),bkOffers:s("bkOffers"),
      agendas:s("agendas"),calificadas:s("calificadas"),agendasHoy:s("agendasHoy"),
      showUps:s("showUps"),
      ventasHT:s("ventasHT"),valorVentaHT:s("valorVentaHT"),
      upfrontCash:s("upfrontCash"),recurringCash:s("recurringCash"),
      pendDiaAnterior:s("pendDiaAnterior"),pendAcumulados:s("pendAcumulados"),
      reservas:s("reservas"),
    };
  };

  const subBtn=v=>({background:view===v?TXT:"transparent",border:`1px solid ${view===v?TXT:BORDER}`,
    borderRadius:8,padding:"6px 14px",cursor:"pointer",color:view===v?"#fff":TXT2,
    fontSize:11,fontFamily:"'Inter',sans-serif",fontWeight:view===v?700:400,outline:"none"});

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {[["llenar","Llenar reporte"],["tabla","Tabla mensual"],["dia","Detalle por día"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={subBtn(v)}>{l}</button>
        ))}
      </div>
      {view==="llenar"&&<LlenarReporte allDaily={allDaily} onSave={onSave} monthAdSpend={monthAdSpend}/>}
      {view==="tabla"&&<TablaMensual collabAgg={collabAgg} monthAdSpend={monthAdSpend} year={year} month={month}/>}
      {view==="dia"&&<DetallePorDia entriesByCollab={entriesByCollab} year={year} month={month} dm={dm} mp={mp} pad={pad}/>}
    </div>
  );
};

// ─── TABLA MENSUAL (KPI rows × collaborator columns) ──────────────────────────
const TablaMensual=({collabAgg,monthAdSpend,year,month})=>{
  const cellTxt=(v,fmt)=>{
    if(v===null||v===undefined||v===0||(typeof v==="number"&&isNaN(v)))return null;
    if(fmt==="$")return fD(v);
    if(fmt==="%")return fP(v);
    return fN(v);
  };
  const HDR_BG=IS_DARK?"#0D1526":"#1e293b";
  const HDR_TXT="#f1f5f9";
  const thBase={padding:"5px 6px",textAlign:"center",fontSize:9,fontWeight:700,
    fontFamily:"'DM Mono',monospace",borderRight:`1px solid rgba(255,255,255,0.1)`};
  const tdBase={padding:"4px 8px",textAlign:"right",fontSize:10,fontFamily:"'DM Mono',monospace",
    borderRight:`1px solid ${BORDER2}`,borderBottom:`1px solid ${BORDER2}`,height:23};
  const stickyCol={position:"sticky",left:0,zIndex:2};

  const aggByCollab={};
  MANUAL_COLLABORATORS.forEach(c=>{aggByCollab[c.id]=collabAgg(c.id);});
  const marketingCols=MARKETING_COLLABORATORS;
  const closerCols=COMMERCIAL_COLLABORATORS;
  const allCols=[...marketingCols,...closerCols];

  const sumCloser=k=>closerCols.reduce((s,c)=>s+(aggByCollab[c.id][k]||0),0);
  const sumMarketing=k=>marketingCols.reduce((s,c)=>s+(aggByCollab[c.id][k]||0),0);

  const SECTIONS=[
    {title:"Actividad Marketing",bg:"#6d28d9",role:"marketing",rows:[
      {l:"Días con registro",k:"days",fmt:"n"},
      {l:"# IG Seguidores",k:"igFollowers",fmt:"n"},
      {l:"# Posts + CTA",k:"posts",fmt:"n"},
      {l:"# Mensajes",k:"mensajes",fmt:"n"},
      {l:"# Follow Ups",k:"followUps",fmt:"n"},
      {l:"# Booking Offers",k:"bkOffers",fmt:"n"},
    ]},
    {title:"Agendas / Leads",bg:"#0f766e",role:"closer",rows:[
      {l:"# Agendas",k:"agendas",fmt:"n"},
      {l:"# Calificadas",k:"calificadas",fmt:"n"},
      {l:"# Agendas hoy",k:"agendasHoy",fmt:"n"},
      {l:"# Show Ups",k:"showUps",fmt:"n"},
    ]},
    {title:"Ventas — Área Comercial",bg:"#c2410c",role:"closer",rows:[
      {l:"# Ventas HT",k:"ventasHT",fmt:"n"},
      {l:"$ Venta HT",k:"valorVentaHT",fmt:"$"},
      {l:"Upfront / Cash Collected",k:"upfrontCash",fmt:"$"},
      {l:"Recurring Cash",k:"recurringCash",fmt:"$"},
      {l:"# Follow Ups",k:"followUps",fmt:"n"},
      {l:"Pendientes cierre día anterior",k:"pendDiaAnterior",fmt:"n"},
      {l:"Pendientes cierre acumulados",k:"pendAcumulados",fmt:"n"},
      {l:"# Reservas",k:"reservas",fmt:"n"},
    ]},
  ];

  const ADS_ROWS=[
    {l:"$ Total Gasto",v:monthAdSpend.total,fmt:"$"},
    {l:"Meta",v:monthAdSpend.meta,fmt:"$",sub:true},
    {l:"Google",v:monthAdSpend.google,fmt:"$",sub:true},
    {l:"TikTok",v:monthAdSpend.tiktok,fmt:"$",sub:true},
    {l:"Otros",v:monthAdSpend.otros,fmt:"$",sub:true},
  ];
  const totalAgendas=sumCloser("agendas");
  const totalCal=sumCloser("calificadas");
  const COSTS_ROWS=[
    {l:"CPL (Costo / Agenda)",v:totalAgendas>0?monthAdSpend.total/totalAgendas:null,fmt:"$"},
    {l:"CP Cualificada",v:totalCal>0?monthAdSpend.total/totalCal:null,fmt:"$"},
  ];

  return(
    <div>
      <div style={{fontSize:11,color:TXT2,fontFamily:"'Inter',sans-serif",marginBottom:8,padding:"0 2px"}}>
        {MONTHS[month]} {year} · {allCols.length} colaboradores · acumulado mensual manual
      </div>
      <div style={{overflow:"auto",borderRadius:10,border:`1px solid ${BORDER}`,background:SURFACE,
        height:"calc(100vh - 200px)"}}>
        <table style={{borderCollapse:"separate",borderSpacing:0,minWidth:"100%"}}>
          <thead style={{position:"sticky",top:0,zIndex:10}}>
            <tr>
              <th style={{...thBase,...stickyCol,background:HDR_BG,color:HDR_TXT,textAlign:"left",
                padding:"8px 10px",minWidth:215,zIndex:11,borderRight:`2px solid ${BORDER}`}}>
                KPI
              </th>
              {allCols.map(c=>{
                const agg=aggByCollab[c.id];
                return(
                  <th key={c.id} style={{...thBase,background:HDR_BG,color:HDR_TXT,minWidth:120,padding:"8px 8px"}}>
                    <div style={{display:"inline-flex",alignItems:"center",gap:6}}>
                      <span style={{width:7,height:7,borderRadius:100,background:c.color,display:"inline-block"}}/>
                      <span>{c.label}</span>
                    </div>
                    <div style={{opacity:0.55,fontSize:8,fontWeight:500,marginTop:2}}>
                      {c.role==="marketing"?"Marketing":"Closer"} · {agg.days} días
                    </div>
                  </th>
                );
              })}
              <th style={{...thBase,background:BRAND,color:"#fff",minWidth:110,
                borderLeft:`2px solid ${BORDER}`,padding:"8px 8px"}}>
                Total / Mes
              </th>
            </tr>
          </thead>
          <tbody>
            {SECTIONS.map(g=>(
              <React.Fragment key={g.title}>
                <tr>
                  <td colSpan={allCols.length+2} style={{background:g.bg,color:"#fff",padding:"5px 10px",
                    fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",
                    fontFamily:"'Inter',sans-serif",position:"sticky",left:0,zIndex:3}}>
                    {g.title}
                  </td>
                </tr>
                {g.rows.map(row=>{
                  const includeCol=c=>g.role===c.role;
                  const tot=g.role==="marketing"?(sumMarketing(row.k)||null):(sumCloser(row.k)||null);
                  return(
                    <tr key={row.l}>
                      <td style={{...tdBase,...stickyCol,textAlign:"left",
                        paddingLeft:row.sub?20:10,
                        color:row.sub?TXT2:TXT,
                        fontWeight:row.sub?400:600,
                        fontSize:row.sub?9:10,
                        background:SURFACE,
                        borderRight:`2px solid ${BORDER}`,
                        fontFamily:"'Inter',sans-serif",
                        whiteSpace:"nowrap"}}>
                        {row.l}
                      </td>
                      {allCols.map(c=>{
                        if(!includeCol(c))return(
                          <td key={c.id} style={{...tdBase,background:SURFACE,color:TXT3}}>—</td>
                        );
                        const v=aggByCollab[c.id][row.k];
                        const txt=cellTxt(v,row.fmt);
                        return(
                          <td key={c.id} style={{...tdBase,background:SURFACE,color:txt?TXT:TXT3}}>
                            {txt||"·"}
                          </td>
                        );
                      })}
                      <td style={{...tdBase,background:SURFACE2,
                        color:tot?TXT:TXT3,fontWeight:700,
                        borderLeft:`2px solid ${BORDER}`,textAlign:"right"}}>
                        {cellTxt(tot,row.fmt)||"—"}
                      </td>
                    </tr>
                  );
                })}
              </React.Fragment>
            ))}

            <tr>
              <td colSpan={allCols.length+2} style={{background:"#1e40af",color:"#fff",padding:"5px 10px",
                fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",
                fontFamily:"'Inter',sans-serif",position:"sticky",left:0,zIndex:3}}>
                Gasto Publicitario (automático · total mes)
              </td>
            </tr>
            {ADS_ROWS.map(row=>(
              <tr key={row.l}>
                <td style={{...tdBase,...stickyCol,textAlign:"left",
                  paddingLeft:row.sub?20:10,
                  color:row.sub?TXT2:TXT,
                  fontWeight:row.sub?400:600,
                  fontSize:row.sub?9:10,
                  background:SURFACE,
